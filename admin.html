<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUSA ESPN Viewership — Admin Portal</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root {
    --navy: #00263A;
    --gray: #BFCED6;
    --white: #FFFFFF;
    --red: #E40046;
    --blue: #00B5E2;
    --green: #A7D500;
    --espn-red: #EF4035;
    --light: #f0f2f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: var(--light); min-height: 100vh; color: #222; }

  /* ── Header ── */
  .header {
    background: var(--navy);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .header img { height: 26px; filter: brightness(0) invert(1); }
  .header h1 { color: var(--white); font-size: 16px; margin: 0; flex: 1; font-weight: 700; }
  .header a { color: var(--gray); font-size: 11px; text-decoration: none; white-space: nowrap; }
  .header a:hover { color: var(--white); }

  /* ── Controls bar ── */
  .controls {
    background: var(--white);
    border-bottom: 3px solid var(--espn-red);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn {
    padding: 7px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: filter 0.15s;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(0.9); }
  .btn-import { background: var(--espn-red); color: var(--white); }
  .btn-append { background: var(--blue); color: var(--white); }
  .btn-export { background: var(--navy); color: var(--white); }
  .btn-clear { background: #888; color: var(--white); }
  .btn-save { background: var(--green); color: var(--navy); }
  .btn-toggle { background: #fff; color: var(--navy); border: 1px solid var(--gray); }
  .btn-toggle.active { background: var(--green); color: var(--navy); border-color: var(--green); }
  .btn-toggle[disabled] { opacity: 0.5; cursor: not-allowed; }
  .file-input-wrapper { position: relative; display: inline-block; }
  .file-input-wrapper input[type=file] { position: absolute; left: -9999px; }
  .status {
    margin-left: auto;
    padding: 5px 12px;
    background: var(--light);
    border-radius: 6px;
    font-size: 11px;
    color: var(--navy);
    font-weight: 600;
    border: 1px solid var(--gray);
    transition: background 0.3s, border-color 0.3s, color 0.3s;
  }
  .status.saved-cloud {
    background: rgba(167,213,0,0.18);
    border-color: var(--green);
    color: #4a6600;
  }
  .status.saved-local {
    background: rgba(245,158,11,0.15);
    border-color: #f59e0b;
    color: #78350f;
  }

  /* ── Tab bar ── */
  .tab-bar {
    background: var(--white);
    border-bottom: 3px solid var(--espn-red);
    display: flex;
    overflow-x: auto;
  }
  .tab-bar button {
    padding: 11px 18px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    background: transparent;
    color: var(--navy);
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
    margin-bottom: -3px;
  }
  .tab-bar button.active { background: var(--espn-red); color: var(--white); border-bottom-color: var(--navy); }
  .tab-bar button:hover:not(.active) { background: #f5f5f5; }

  /* ── Content ── */
  .content { padding: 20px; max-width: 1400px; margin: 0 auto; }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--navy);
    color: var(--white);
    padding: 18px 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,38,58,0.15);
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.75;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--espn-red); }

  /* ── Tables ── */
  .table-container {
    overflow-x: auto;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid #ddd;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--navy); color: var(--white); position: sticky; top: 0; z-index: 10; }
  th { padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  thead .filter-row th {
    background: #f0f2f5;
    color: var(--navy);
    padding: 5px 8px;
    text-transform: none;
    letter-spacing: normal;
    font-weight: 400;
    border-bottom: 2px solid var(--gray);
  }
  .filter-row input {
    width: 100%;
    min-width: 70px;
    padding: 4px 6px;
    border: 1px solid var(--gray);
    border-radius: 4px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 400;
    color: var(--navy);
    background: #fff;
  }
  .filter-row input:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(0,181,226,0.2);
  }
  td { padding: 9px 12px; border-bottom: 1px solid #eee; }
  tbody tr:hover { background: #f8f9fa; }
  tbody tr:nth-child(even) td { background: rgba(191,206,214,0.08); }
  .rank { font-weight: 700; color: var(--espn-red); font-size: 14px; }
  .number { font-family: 'Courier New', monospace; font-weight: 600; }

  /* ── Search bar ── */
  .search-bar {
    background: var(--white);
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .search-field { flex: 1; min-width: 180px; }
  .search-field label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 11px; color: var(--navy); text-transform: uppercase; letter-spacing: 0.5px; }
  .search-field input, .search-field select {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--gray);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .search-field input:focus, .search-field select:focus { outline: none; border-color: var(--blue); }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--navy); opacity: 0.5; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; }

  /* ── School search section ── */
  .section-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }

  /* ── Lock icon on protected tabs ── */
  .tab-bar button.locked::after { content: ' 🔒'; font-size: 10px; }

  /* ── Password modal ── */
  .pw-overlay { display:none; position:fixed; inset:0; background:rgba(0,38,58,0.7); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .pw-overlay.open { display:flex; }
  .pw-box { background:#fff; border-radius:12px; padding:32px; max-width:360px; width:100%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
  .pw-box h2 { font-size:18px; color:var(--navy); margin-bottom:6px; }
  .pw-box p { font-size:12px; color:#666; margin-bottom:20px; }
  .pw-input { width:100%; padding:10px 14px; border:2px solid #ddd; border-radius:8px; font-size:14px; text-align:center; letter-spacing:2px; font-family:inherit; margin-bottom:12px; }
  .pw-input:focus { outline:none; border-color:var(--blue); }
  .pw-err { color:var(--espn-red); font-size:12px; margin-bottom:10px; display:none; }
  .pw-actions { display:flex; gap:8px; justify-content:center; }

  @media (max-width: 640px) {
    .controls { flex-direction: column; align-items: stretch; }
    .btn { justify-content: center; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <img src="Logos/Hub/cusa%20espn%20cobrand%201C%20white.png" alt="CUSA ESPN"
       onerror="this.style.display='none'">
  <h1>ESPN+ Viewership — Admin Portal</h1>
  <button id="lockBtn" onclick="lockViewer()" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;">🔒 Sign Out</button>
  <a href="viewership.html">← Public View</a>
</div>

<!-- Password modal — full-page gate -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <h2>🔒 Admin Portal</h2>
    <p>Enter the admin password to access this portal</p>
    <input class="pw-input" id="pwInput" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitPw()">
    <div class="pw-err" id="pwErr">Incorrect password. Try again.</div>
    <div class="pw-actions">
      <button onclick="window.location.href='viewership.html'" style="background:#eee;color:#555;border:none;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>
      <button onclick="submitPw()" style="background:var(--espn-red);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Unlock</button>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="file-input-wrapper">
    <label for="fileInput" class="btn btn-import">📂 Import Excel</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </div>
  <button class="btn btn-save" id="saveBtn" title="Save current data to Supabase">💾 Save</button>
  <div class="file-input-wrapper">
    <label for="appendInput" class="btn btn-append">➕ Add New Period</label>
    <input type="file" id="appendInput" accept=".xlsx,.xls">
  </div>
  <button class="btn btn-toggle" id="producedToggle" onclick="toggleProducedFilter()" title="Show only events produced by CUSA schools" disabled>○ CUSA Produced Only</button>
  <button class="btn btn-export" id="exportBtn">📤 Export Current Tab</button>
  <button class="btn btn-export" id="exportAllBtn">📥 Export All Data</button>
  <button class="btn btn-clear" id="clearBtn">🗑 Clear All Data</button>
  <div class="status" id="status">No data loaded</div>
</div>

<!-- Meta bar -->
<div id="metaBar" style="display:none;background:var(--white);border-bottom:1px solid #ddd;padding:7px 20px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;font-size:11px;">
  <span style="font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px;">Reporting Period:</span>
  <span id="metaPeriodText" style="color:var(--espn-red);font-weight:700;display:none;">—</span>
  <select id="metaPeriodSelect" style="display:none;border:1px solid var(--gray);border-radius:5px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--espn-red);font-family:inherit;background:#fff;cursor:pointer;" onchange="saveSelectedPeriod(this.value)"></select>
  <button id="removePeriodBtn" onclick="removeSelectedPeriod()" style="display:none;background:none;border:1px solid #fca5a5;border-radius:4px;padding:2px 8px;font-size:11px;color:#991b1b;cursor:pointer;font-family:inherit;font-weight:600;">🗑 Remove</button>
  <span style="color:#ccc;">|</span>
  <span style="font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px;">Last Modified:</span>
  <span id="metaModified" style="color:#555;">—</span>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="active" data-tab="dashboard">Dashboard</button>
  <button data-tab="football">Football</button>
  <button data-tab="volleyball">Volleyball</button>
  <button data-tab="soccer">Soccer</button>
  <button data-tab="baseball">Baseball</button>
  <button data-tab="softball">Softball</button>
  <button data-tab="mbb">Men's Basketball</button>
  <button data-tab="wbb">Women's Basketball</button>
  <button data-tab="championships">Championships</button>
  <button data-tab="shows">Shows</button>
  <button data-tab="rawdata">Raw Data</button>
</div>

<!-- Tab content -->
<div class="content">

  <div id="dashboard" class="tab-content active">
    <div class="stats-grid" id="dashboardStats"></div>
    <h3 style="margin-bottom:12px;color:var(--navy);font-size:15px;">Viewership by Sport</h3>
    <div class="table-container" id="dashboardTable"></div>
  </div>

  <div id="football"      class="tab-content" style="display:none"></div>
  <div id="volleyball"    class="tab-content" style="display:none"></div>
  <div id="soccer"        class="tab-content" style="display:none"></div>
  <div id="baseball"      class="tab-content" style="display:none"></div>
  <div id="softball"      class="tab-content" style="display:none"></div>
  <div id="mbb"           class="tab-content" style="display:none"></div>
  <div id="wbb"           class="tab-content" style="display:none"></div>
  <div id="championships" class="tab-content" style="display:none"></div>
  <div id="shows"         class="tab-content" style="display:none"></div>
  <div id="rawdata"       class="tab-content" style="display:none"></div>

</div>

<script>
  // Global state
  let rawData = [];
  const STORAGE_KEY = 'cusa_tracker_data';
  const META_KEY = 'cusa_tracker_meta';
  const PERIOD_KEY = 'cusa_tracker_period';
  const VW_UNLOCK_KEY = 'cusa_viewer_unlocked';
  const VW_PW_HASH = '9a874f8b06ebb0eb63336db78b70ca149513a237de8395d8e858ee8f0c702ae2';
  const PROTECTED_TABS = new Set(['dashboard','football','volleyball','soccer','baseball','softball','mbb','wbb','championships','shows','rawdata']);
  let adminUnlocked = localStorage.getItem(VW_UNLOCK_KEY) === 'true';
  let pendingTab = null;
  let _db = null;
  let _producedOnly = localStorage.getItem('cusa_produced_only') === 'true';
  let _producedSet = new Set();

  async function hashPw(pw) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  function openPwModal(tab) {
    pendingTab = tab;
    document.getElementById('pwInput').value = '';
    document.getElementById('pwErr').style.display = 'none';
    document.getElementById('pwOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pwInput').focus(), 80);
  }
  function closePwModal() {
    document.getElementById('pwOverlay').classList.remove('open');
    pendingTab = null;
  }
  async function submitPw() {
    const h = await hashPw(document.getElementById('pwInput').value);
    if (h === VW_PW_HASH) {
      adminUnlocked = true;
      localStorage.setItem(VW_UNLOCK_KEY, 'true');
      closePwModal();
      await initAdminPortal();
    } else {
      document.getElementById('pwErr').style.display = 'block';
    }
  }
  function lockViewer() {
    localStorage.removeItem(VW_UNLOCK_KEY);
    window.location.href = 'viewership.html';
  }
  function updateTabLocks() { /* no-op — admin portal is fully gated */ }

  /* ── Supabase ── */
  function initSupabase() {
    if (typeof supabase !== 'undefined' && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
      _db = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }
  }

  function rowToDb(r) {
    return {
      sport: r.SPORT || '',
      airing_title: r.AIRING_TITLE || '',
      event_date: String(r.DATE || ''),
      away_team: r.AWAY_TEAM || '',
      home_team: r.HOME_TEAM || '',
      unique_viewers: Math.round(r.UNIQUE_VIEWERS || 0),
      total_minutes: Math.round(r.TOTAL_MINUTES || 0),
      min_per_viewer: parseFloat(r.MIN_PER_VIEWER || 0),
      report_period: r.REPORT_PERIOD || '',
      extra_data: r
    };
  }

  function rowFromDb(r) {
    const base = r.extra_data || {};
    return {
      ...base,
      SPORT: r.sport,
      AIRING_TITLE: r.airing_title,
      DATE: r.event_date,
      AWAY_TEAM: r.away_team,
      HOME_TEAM: r.home_team,
      UNIQUE_VIEWERS: r.unique_viewers,
      TOTAL_MINUTES: r.total_minutes,
      MIN_PER_VIEWER: parseFloat(r.min_per_viewer),
      REPORT_PERIOD: r.report_period
    };
  }

  async function loadFromSupabase() {
    if (!_db) return false;
    try {
      updateStatus('Loading from database…');
      let all = [];
      let from = 0;
      const PAGE = 1000;
      while (true) {
        const { data, error } = await _db.from('viewership_events').select('*').range(from, from + PAGE - 1);
        if (error) throw error;
        if (!data || data.length === 0) break;
        all = all.concat(data.map(rowFromDb));
        if (data.length < PAGE) break;
        from += PAGE;
      }
      rawData = all;
      return true;
    } catch(e) {
      console.error('Supabase load error:', e);
      return false;
    }
  }

  async function saveToSupabase() {
    if (!_db || !rawData.length) return false;
    try {
      const rows = rawData.map(rowToDb);
      for (let i = 0; i < rows.length; i += 500) {
        const { error } = await _db.from('viewership_events')
          .upsert(rows.slice(i, i + 500), { onConflict: 'sport,airing_title,event_date' });
        if (error) throw error;
      }
      return true;
    } catch(e) {
      console.error('Supabase save error:', e);
      return false;
    }
  }

  function deleteSupabasePeriod(period) {
    if (!_db) return;
    _db.from('viewership_events').delete().eq('report_period', period);
  }

  function clearSupabase() {
    if (!_db) return;
    _db.from('viewership_events').delete().not('id', 'is', null);
  }

  /* ── CUSA-Produced filter ── */
  async function loadProducedEvents() {
    try {
      const r = await fetch('produced_events.json', { cache: 'no-cache' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const events = await r.json();
      _producedSet = new Set(events.map(e => `${e.date}|${e.school}`));
      const btn = document.getElementById('producedToggle');
      if (btn) btn.disabled = false;
    } catch(e) {
      console.warn('Produced events list not available:', e);
    }
  }

  function isProduced(r) {
    if (!_producedSet.size) return false;
    const d = formatDateForFilter(r.DATE);
    if (!d) return false;
    if (r.HOME_TEAM && _producedSet.has(`${d}|${r.HOME_TEAM}`)) return true;
    if (r.AWAY_TEAM && _producedSet.has(`${d}|${r.AWAY_TEAM}`)) return true;
    return false;
  }

  function activeData() {
    return _producedOnly ? rawData.filter(isProduced) : rawData;
  }

  function toggleProducedFilter() {
    if (!_producedSet.size) return;
    _producedOnly = !_producedOnly;
    localStorage.setItem('cusa_produced_only', _producedOnly);
    updateProducedToggleUI();
    if (rawData.length > 0) renderAllTabs();
  }

  function updateProducedToggleUI() {
    const btn = document.getElementById('producedToggle');
    if (!btn) return;
    btn.classList.toggle('active', _producedOnly);
    btn.textContent = (_producedOnly ? '✓' : '○') + ' CUSA Produced Only';
  }

  function getSchoolRankBySport(school, sportName) {
    const cusaSet = new Set(CUSA_SCHOOLS);
    const sportRows = activeData().filter(r => r.SPORT === sportName);
    const totals = {};
    sportRows.forEach(r => {
      [r.AWAY_TEAM, r.HOME_TEAM].filter(t => t && cusaSet.has(t)).forEach(t => {
        totals[t] = (totals[t] || 0) + (r.UNIQUE_VIEWERS || 0);
      });
    });
    const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]);
    const rank = sorted.findIndex(([t]) => t === school) + 1;
    return rank > 0 ? `#${rank} of ${sorted.length}` : '—';
  }

  const CUSA_SCHOOLS = [
    'Delaware','Florida International','Jacksonville State','Kennesaw State',
    'Liberty','Middle Tennessee','Missouri State','New Mexico State','Sam Houston','Western Kentucky'
  ];

  const SPORT_MAP = {
    'football':   "NCAA Football",
    'volleyball': "NCAA Women's Volleyball",
    'soccer':     "NCAA Women's Soccer",
    'baseball':   "NCAA Baseball",
    'softball':   "NCAA Softball",
    'mbb':        "NCAA Men's Basketball",
    'wbb':        "NCAA Women's Basketball"
  };

  document.addEventListener('DOMContentLoaded', async () => {
    if (!adminUnlocked) {
      document.getElementById('pwOverlay').classList.add('open');
      setTimeout(() => document.getElementById('pwInput').focus(), 80);
      return;
    }
    await initAdminPortal();
  });

  async function initAdminPortal() {
    initSupabase();
    loadProducedEvents();
    updateProducedToggleUI();
    const dbLoaded = await loadFromSupabase();
    if (dbLoaded) {
      updateStatus(`Loaded ${rawData.length} events from database`);
      const lastMod = await loadLastModified();
      updateMetaBar({ modified: lastMod, period: getCurrentPeriod() });
    } else {
      loadFromStorage();
    }
    setupEventListeners();
    if (rawData.length > 0) renderAllTabs();
  }

  async function loadLastModified() {
    if (!_db) return null;
    try {
      const { data, error } = await _db.from('viewership_events')
        .select('created_at').order('created_at', { ascending: false }).limit(1);
      if (error) throw error;
      return data && data[0] ? data[0].created_at : null;
    } catch(e) {
      console.error('last modified load error:', e);
      return null;
    }
  }

  function setupEventListeners() {
    document.getElementById('fileInput').addEventListener('change', e => handleFileImport(e, false));
    document.getElementById('appendInput').addEventListener('change', e => handleFileImport(e, true));
    document.querySelectorAll('.tab-bar button').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    document.getElementById('exportBtn').addEventListener('click', exportCurrentTab);
    document.getElementById('exportAllBtn').addEventListener('click', exportAllData);
    document.getElementById('clearBtn').addEventListener('click', clearAllData);
    document.getElementById('saveBtn').addEventListener('click', saveData);
  }

  function handleFileImport(event, appendMode = false) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

        let headerRow = -1;
        for (let i = 0; i < jsonData.length; i++) {
          if (jsonData[i][0] === 'SPORT') { headerRow = i; break; }
        }
        if (headerRow === -1) { alert('Could not find header row with "SPORT" column'); return; }

        const headers = jsonData[headerRow];
        const newData = jsonData.slice(headerRow + 1).filter(row => row[0]).map(row => {
          const obj = {};
          headers.forEach((h, i) => { obj[h] = row[i]; });
          return obj;
        });

        if (appendMode) {
          const result = mergeData(rawData, newData);
          rawData = result.data;
          saveToStorage();
          updateStatus('Syncing to database…');
          const ok = await saveToSupabase();
          renderAllTabs();
          updateStatus(
            ok
              ? `☁️ Added ${result.added} new events — synced to database (${result.duplicates} duplicates skipped)`
              : `💻 Added ${result.added} new events — saved locally (${result.duplicates} duplicates skipped)`,
            ok ? 'saved-cloud' : 'saved-local'
          );
        } else {
          rawData = newData;
          saveToStorage();
          updateStatus('Syncing to database…');
          const ok = await saveToSupabase();
          renderAllTabs();
          updateStatus(
            ok ? `☁️ Loaded ${rawData.length} events — synced to database` : `💻 Loaded ${rawData.length} events — saved locally`,
            ok ? 'saved-cloud' : 'saved-local'
          );
        }
        event.target.value = '';
      } catch (err) { alert('Error reading file: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  }

  function mergeData(existing, newData) {
    const getKey = r => `${r.SPORT}|${r.AIRING_TITLE}|${r.DATE}`;
    const keys = new Set(existing.map(getKey));
    let added = 0, duplicates = 0;
    newData.forEach(r => {
      const k = getKey(r);
      if (!keys.has(k)) { existing.push(r); keys.add(k); added++; }
      else duplicates++;
    });
    return { data: existing, added, duplicates };
  }

  function saveToStorage() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(rawData));
      const meta = { modified: new Date().toISOString(), period: getCurrentPeriod() };
      localStorage.setItem(META_KEY, JSON.stringify(meta));
      updateMetaBar(meta);
    } catch(e) {}
  }

  async function saveData() {
    if (!rawData.length) { updateStatus('No data to save'); return; }
    saveToStorage();
    const btn = document.getElementById('saveBtn');
    btn.textContent = '⏳ Saving…';
    btn.disabled = true;
    const ok = await saveToSupabase();
    btn.disabled = false;
    btn.textContent = '✓ Saved';
    updateStatus(
      ok ? `☁️ Saved to database — ${rawData.length} events` : `💻 Saved locally only — no database connection`,
      ok ? 'saved-cloud' : 'saved-local'
    );
    setTimeout(() => { btn.textContent = '💾 Save'; }, 2000);
  }

  function getCurrentPeriod() {
    const periods = getAllPeriods();
    const saved = localStorage.getItem(PERIOD_KEY);
    return (saved && periods.includes(saved)) ? saved : (periods.length ? periods[periods.length - 1] : '—');
  }

  function getAllPeriods() {
    return [...new Set(rawData.map(r => r.REPORT_PERIOD).filter(p => p))].sort();
  }

  function saveSelectedPeriod(val) {
    localStorage.setItem(PERIOD_KEY, val);
    document.getElementById('metaPeriodText').textContent = val || '—';
  }

  function removeSelectedPeriod() {
    const sel = document.getElementById('metaPeriodSelect');
    const period = sel.value;
    if (!period) return;
    const count = rawData.filter(r => r.REPORT_PERIOD === period).length;
    if (!confirm(`Remove all ${count} events from period "${period}"? This cannot be undone.`)) return;
    rawData = rawData.filter(r => r.REPORT_PERIOD !== period);
    localStorage.removeItem(PERIOD_KEY);
    saveToStorage();
    deleteSupabasePeriod(period);
    renderAllTabs();
    updateMetaBar(JSON.parse(localStorage.getItem(META_KEY) || 'null'));
    updateStatus(`Removed period "${period}" — ${rawData.length} events remaining`);
  }

  function updateMetaBar(meta) {
    const bar = document.getElementById('metaBar');
    if (!rawData.length) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    const periods = getAllPeriods();
    const selected = getCurrentPeriod();
    const textEl = document.getElementById('metaPeriodText');
    const selectEl = document.getElementById('metaPeriodSelect');
    const removeBtn = document.getElementById('removePeriodBtn');
    if (adminUnlocked) {
      textEl.style.display = 'none';
      selectEl.style.display = 'inline-block';
      selectEl.innerHTML = periods.map(p => `<option value="${p}" ${p === selected ? 'selected' : ''}>${p}</option>`).join('');
      removeBtn.style.display = 'inline-block';
    } else {
      selectEl.style.display = 'none';
      removeBtn.style.display = 'none';
      textEl.style.display = 'inline';
      textEl.textContent = selected || '—';
    }
    document.getElementById('metaModified').textContent = meta?.modified
      ? new Date(meta.modified).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' })
      : '—';
  }

  function loadFromStorage() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        rawData = JSON.parse(stored);
        updateStatus(`Loaded ${rawData.length} events from storage`);
        const meta = JSON.parse(localStorage.getItem(META_KEY) || 'null');
        updateMetaBar(meta || { modified: null, period: getCurrentPeriod() });
      }
    } catch(e) {}
  }

  function clearAllData() {
    if (!confirm('Clear all data? This cannot be undone.')) return;
    rawData = [];

  function filterSchoolEvents(school) {
    const matchup = document.getElementById('school-filter-matchup').value.toLowerCase().trim();

    const date = document.getElementById('school-filter-date').value;
    const period = document.getElementById('school-filter-period').value;
    const minV = parseFloat(document.getElementById('school-filter-viewers').value) || 0;
    const minTotalMin = parseFloat(document.getElementById('school-filter-totalmin').value) || 0;
    const minMinViewer = parseFloat(document.getElementById('school-filter-minviewer').value) || 0;
    let data = activeData().filter(r => r.AWAY_TEAM === school || r.HOME_TEAM === school)
      .sort((a,b) => parseDateForSort(a.DATE) - parseDateForSort(b.DATE));
    if (matchup) data = data.filter(r => (r.AIRING_TITLE||'').toLowerCase().includes(matchup) || (r.AWAY_TEAM||'').toLowerCase().includes(matchup) || (r.HOME_TEAM||'').toLowerCase().includes(matchup));
    if (sport) data = data.filter(r => r.SPORT === sport);

    if (minMinViewer) data = data.filter(r => (r.MIN_PER_VIEWER||0) >= minMinViewer);

    const schoolData = activeData().filter(r => r.AWAY_TEAM === school || r.HOME_TEAM === school)
      .sort((a,b) => parseDateForSort(a.DATE) - parseDateForSort(b.DATE));

    const ws = XLSX.utils.json_to_sheet(schoolData);

  /* ── Styled Excel export — mirrors Viewership Tracker Example ── */
  const EX_NAVY = '062538';
  const EX_LIGHT = 'E8EFF4';
  const EX_FONT = 'Arial Narrow';
  function exBorder() {
    return {
      top:    { style: 'thin', color: { rgb: EX_NAVY } },
      bottom: { style: 'thin', color: { rgb: EX_NAVY } },
      left:   { style: 'thin', color: { rgb: EX_NAVY } },
      right:  { style: 'thin', color: { rgb: EX_NAVY } }
    };
  }
  const EX_STYLE = {
    title:    { font: { name: EX_FONT, sz: 14, bold: true, color: { rgb: 'FFFFFF' } }, fill: { patternType: 'solid', fgColor: { rgb: EX_NAVY } }, alignment: { horizontal: 'center', vertical: 'center' } },
    subtitle: { font: { name: EX_FONT, sz: 10, italic: true, color: { rgb: '666666' } }, alignment: { horizontal: 'center', vertical: 'center' } },
    section:  { font: { name: EX_FONT, sz: 11, bold: true, color: { rgb: EX_NAVY } }, fill: { patternType: 'solid', fgColor: { rgb: EX_LIGHT } }, alignment: { horizontal: 'left',   vertical: 'center' } },
    statHead: { font: { name: EX_FONT, sz: 11, bold: true, color: { rgb: 'FFFFFF' } }, fill: { patternType: 'solid', fgColor: { rgb: EX_NAVY  } }, alignment: { horizontal: 'center', vertical: 'center' } },
    statVal:  { font: { name: EX_FONT, sz: 14, bold: true, color: { rgb: EX_NAVY } }, fill: { patternType: 'solid', fgColor: { rgb: EX_LIGHT } }, alignment: { horizontal: 'center', vertical: 'center' } },
    colHead:  { font: { name: EX_FONT, sz: 11, bold: true, color: { rgb: 'FFFFFF' } }, fill: { patternType: 'solid', fgColor: { rgb: EX_NAVY  } }, alignment: { horizontal: 'center', vertical: 'center' } },
    cellTxt:  { font: { name: EX_FONT, sz: 11 }, alignment: { horizontal: 'left',   vertical: 'center' } },
    cellNum:  { font: { name: EX_FONT, sz: 11 }, alignment: { horizontal: 'right',  vertical: 'center' } },
    cellDate: { font: { name: EX_FONT, sz: 11 }, alignment: { horizontal: 'center', vertical: 'center' } }
  };

  function toExcelDate(v) {
    if (!v) return null;
    let d;
    if (v instanceof Date) d = v;
    else if (typeof v === 'number') return v; // already serial
    else if (typeof v === 'string') {
      if (v.includes('/')) {
        const [m, day, y] = v.split('/');
        d = new Date(+y, +m - 1, +day);
      } else d = new Date(v);
    }
    if (!d || isNaN(d.getTime())) return null;
    // Excel epoch 1899-12-30, account for tz offset so the date stays the same in Excel
    const tzMin = d.getTimezoneOffset();
    return (d.getTime() - tzMin * 60000) / 86400000 + 25569;
  }

  function buildFormattedSheet(cfg) {
    const dataCols = cfg.columns.length;
    const summaryCols = cfg.summary ? cfg.summary.labels.length : 0;
    const numCols = Math.max(dataCols, summaryCols);

    const blank = (n) => Array(n).fill('');
    const aoa = [];
    aoa.push([cfg.title, ...blank(numCols - 1)]);
    aoa.push([cfg.subtitle || '', ...blank(numCols - 1)]);
    aoa.push(blank(numCols));
    if (cfg.summary) {
      aoa.push(['SUMMARY STATISTICS', ...blank(numCols - 1)]);
      aoa.push([...cfg.summary.labels, ...blank(numCols - summaryCols)]);
      aoa.push([...cfg.summary.values, ...blank(numCols - summaryCols)]);
      aoa.push(blank(numCols));
    }
    const headerR = aoa.length;
    aoa.push([...cfg.columns.map(c => c.label), ...blank(numCols - dataCols)]);
    cfg.rows.forEach(row => {
      aoa.push([
        ...cfg.columns.map(c => {
          const val = row[c.key];
          if (c.format === 'date' && val) return toExcelDate(val) ?? val;
          return val == null ? '' : val;
        }),
        ...blank(numCols - dataCols)
      ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const setStyle = (r, c, style, extras = {}) => {
      const a = XLSX.utils.encode_cell({ r, c });
      if (!ws[a]) ws[a] = { v: '' };
      ws[a].s = { ...style, border: exBorder() };
      Object.assign(ws[a], extras);
    };

    for (let c = 0; c < numCols; c++) setStyle(0, c, EX_STYLE.title);
    for (let c = 0; c < numCols; c++) setStyle(1, c, EX_STYLE.subtitle);

    let r = 3;
    if (cfg.summary) {
      for (let c = 0; c < numCols; c++) setStyle(3, c, EX_STYLE.section);
      for (let c = 0; c < summaryCols; c++) setStyle(4, c, EX_STYLE.statHead);
      for (let c = 0; c < summaryCols; c++) {
        const fmt = cfg.summary.formats?.[c];
        const extras = fmt ? { t: 'n', z: fmt } : {};
        setStyle(5, c, EX_STYLE.statVal, extras);
      }
      r = 7;
    }

    for (let c = 0; c < dataCols; c++) setStyle(headerR, c, EX_STYLE.colHead);
    cfg.rows.forEach((_, i) => {
      const rowR = headerR + 1 + i;
      cfg.columns.forEach((col, c) => {
        const fmt = col.format;
        let style = EX_STYLE.cellTxt;
        const extras = {};
        if (fmt === 'integer')  { style = EX_STYLE.cellNum;  extras.t = 'n'; extras.z = '#,##0'; }
        else if (fmt === 'decimal1') { style = EX_STYLE.cellNum; extras.t = 'n'; extras.z = '0.0'; }
        else if (fmt === 'percent')  { style = EX_STYLE.cellNum; extras.t = 'n'; extras.z = '0.0%'; }
        else if (fmt === 'date')     { style = EX_STYLE.cellDate; extras.t = 'n'; extras.z = 'mm-dd-yy'; }
        setStyle(rowR, c, style, extras);
      });
    });

    const merges = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: numCols - 1 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: numCols - 1 } }
    ];
    if (cfg.summary) merges.push({ s: { r: 3, c: 0 }, e: { r: 3, c: numCols - 1 } });
    ws['!merges'] = merges;

    const cols = cfg.columns.map(c => ({ wch: c.width || 15 }));
    while (cols.length < numCols) cols.push({ wch: 15 });
    ws['!cols'] = cols;

    const rows = [{ hpt: 30 }, { hpt: 16 }, { hpt: 8 }];
    if (cfg.summary) rows.push({ hpt: 20 }, { hpt: 26 }, { hpt: 28 }, { hpt: 10 });
    rows.push({ hpt: 24 });
    cfg.rows.forEach(() => rows.push({ hpt: 16 }));
    ws['!rows'] = rows;

    return ws;
  }

  /* ── Per-tab export builders ── */
  const SPORT_EMOJI = {
    football:   '🏈  FOOTBALL — NCAA',
    volleyball: "🏐  VOLLEYBALL — WOMEN'S",
    soccer:     "⚽  SOCCER — WOMEN'S",
    mbb:        "🏀  MEN'S BASKETBALL",
    wbb:        "🏀  WOMEN'S BASKETBALL",
    baseball:   '⚾  BASEBALL — NCAA',
    softball:   '🥎  SOFTBALL — NCAA'
  };
  const SUBTITLE = 'ESPN+ DTC Viewership Data  |  CUSA';

  function buildSportSheet(games, tabId, totalAllSportsViewers) {
    const totalEvents  = games.length;
    const totalViewers = games.reduce((s,g) => s + (g.UNIQUE_VIEWERS||0), 0);
    const pctOfAll = totalAllSportsViewers ? totalViewers / totalAllSportsViewers : 0;
    const avgViewers = totalEvents ? Math.round(totalViewers / totalEvents) : 0;
    const avgMpv = totalEvents ? +(games.reduce((s,g) => s + (g.MIN_PER_VIEWER||0), 0) / totalEvents).toFixed(1) : 0;
    return buildFormattedSheet({
      title:    SPORT_EMOJI[tabId] || tabId,
      subtitle: SUBTITLE,
      summary: {

        { key: 'date',    label: 'DATE',    format: 'date',     width: 14 },
        { key: 'viewers', label: 'UNIQUE VIEWERS', format: 'integer',  width: 18 },
        { key: 'minutes', label: 'TOTAL MINUTES',  format: 'integer',  width: 16 },
        { key: 'mpv',     label: 'MIN/VIEWER',     format: 'decimal1', width: 14 }
      ],

  function buildAllEventsSheet(events) {
    const total = events.length;

    const avgViewers = total ? Math.round(totalViewers / total) : 0;
    const avgMpv = total ? +(events.reduce((s,g) => s + (g.MIN_PER_VIEWER||0), 0) / total).toFixed(1) : 0;
    return buildFormattedSheet({
      title:    '📊  ALL EVENTS — RAW DATA',
      subtitle: SUBTITLE,

      }))
    });
  }

  function buildDashboardSheet() {
    const data = activeData();
    const total = data.length;
    const totalViewers = data.reduce((s,r) => s + (r.UNIQUE_VIEWERS||0), 0);
    const totalMinutes = data.reduce((s,r) => s + (r.TOTAL_MINUTES||0), 0);
    const avgMpv = total ? +(data.reduce((s,r) => s + (r.MIN_PER_VIEWER||0), 0) / total).toFixed(1) : 0;
    const sportStats = {};
    data.forEach(r => {
      const sp = r.SPORT || 'Unknown';
      if (!sportStats[sp]) sportStats[sp] = { events:0, viewers:0, minutes:0, mpvSum:0 };
      sportStats[sp].events++;
      sportStats[sp].viewers += r.UNIQUE_VIEWERS||0;
      sportStats[sp].minutes += r.TOTAL_MINUTES||0;
      sportStats[sp].mpvSum  += r.MIN_PER_VIEWER||0;
    });
    const rows = Object.entries(sportStats)
      .map(([sp, st]) => ({
        sport: sp,
        events: st.events,
        viewers: st.viewers,
        pct: totalViewers ? st.viewers / totalViewers : 0,
        avgViewers: st.events ? Math.round(st.viewers / st.events) : 0,
        minutes: st.minutes,
        avgMpv: st.events ? +(st.mpvSum / st.events).toFixed(1) : 0
      }))
      .sort((a,b) => b.viewers - a.viewers);
    return buildFormattedSheet({
      title:    'CONFERENCE USA — ESPN DTC VIEWERSHIP DASHBOARD',
      subtitle: SUBTITLE,
      summary: {
        labels:  ['TOTAL EVENTS', 'TOTAL UNIQUE VIEWERS', 'TOTAL VIEW MINUTES', 'AVG MIN/VIEWER'],
        values:  [total, totalViewers, totalMinutes, avgMpv],
        formats: ['#,##0', '#,##0', '#,##0', '0.0']
      },
      columns: [
        { key: 'sport',      label: 'SPORT',             width: 26 },
        { key: 'events',     label: 'EVENTS',            format: 'integer',  width: 12 },
        { key: 'viewers',    label: 'UNIQUE VIEWERS',    format: 'integer',  width: 18 },
        { key: 'pct',        label: '% OF TOTAL',        format: 'percent',  width: 12 },
        { key: 'avgViewers', label: 'AVG VIEWERS/EVENT', format: 'integer',  width: 18 },
        { key: 'minutes',    label: 'TOTAL MINUTES',     format: 'integer',  width: 16 },
        { key: 'avgMpv',     label: 'AVG MIN/VIEWER',    format: 'decimal1', width: 16 }
      ],
      rows
    });
  }

  function parseDateForSort(v) {
    if (!v && v !== 0) return 0;
    if (typeof v === 'number') return v;
    try {
      if (typeof v === 'string' && v.includes('/')) {
        const [m, d, y] = v.split('/');
        return new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`).getTime();
      }
      const t = new Date(v).getTime();
      return isNaN(t) ? 0 : t;
    } catch { return 0; }
  }

  function formatDate(v) {
    if (!v) return '-';
    try {
      if (typeof v === 'string' && v.includes('/')) return v;
      const d = new Date(v);
      return isNaN(d.getTime()) ? String(v) : d.toLocaleDateString('en-US');
    } catch { return String(v); }
  }

  function formatDateForFilter(v) {
    if (!v) return '';
    try {
      if (typeof v === 'string' && v.includes('/')) {
        const [m,d,y] = v.split('/');
        return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      }
      const d = new Date(v);
      return isNaN(d.getTime()) ? '' : d.toISOString().split('T')[0];
    } catch { return ''; }
  }
