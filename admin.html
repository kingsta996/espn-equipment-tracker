<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUSA ESPN Viewership — Admin Portal</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root {
    --navy: #00263A;
    --gray: #BFCED6;
    --white: #FFFFFF;
    --red: #E40046;
    --blue: #00B5E2;
    --green: #A7D500;
    --espn-red: #EF4035;
    --light: #f0f2f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: var(--light); min-height: 100vh; color: #222; }

  /* ── Header ── */
  .header {
    background: var(--navy);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .header img { height: 26px; filter: brightness(0) invert(1); }
  .header h1 { color: var(--white); font-size: 16px; margin: 0; flex: 1; font-weight: 700; }
  .header a { color: var(--gray); font-size: 11px; text-decoration: none; white-space: nowrap; }
  .header a:hover { color: var(--white); }

  /* ── Controls bar ── */
  .controls {
    background: var(--white);
    border-bottom: 3px solid var(--espn-red);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn {
    padding: 7px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: filter 0.15s;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(0.9); }
  .btn-import { background: var(--espn-red); color: var(--white); }
  .btn-append { background: var(--blue); color: var(--white); }
  .btn-export { background: var(--navy); color: var(--white); }
  .btn-clear { background: #888; color: var(--white); }
  .btn-archive { background: #b45309; color: var(--white); }
  .btn-save { background: var(--green); color: var(--navy); }
  .btn-toggle { background: #fff; color: var(--navy); border: 1px solid var(--gray); }
  .btn-toggle.active { background: var(--green); color: var(--navy); border-color: var(--green); }
  .btn-toggle[disabled] { opacity: 0.5; cursor: not-allowed; }
  .live-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; background: rgba(167,213,0,0.2); color: #4a6600; border: 1px solid var(--green); border-radius: 12px; font-size: 10px; font-weight: 700; margin-left: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .live-badge::before { content: ''; width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: live-pulse 1.6s ease-in-out infinite; }
  @keyframes live-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }
  .live-badge.flash { background: var(--green); color: var(--navy); transition: background 0.4s, color 0.4s; }
  .file-input-wrapper { position: relative; display: inline-block; }
  .file-input-wrapper input[type=file] { position: absolute; left: -9999px; }
  .status {
    margin-left: auto;
    padding: 5px 12px;
    background: var(--light);
    border-radius: 6px;
    font-size: 11px;
    color: var(--navy);
    font-weight: 600;
    border: 1px solid var(--gray);
    transition: background 0.3s, border-color 0.3s, color 0.3s;
  }
  .status.saved-cloud {
    background: rgba(167,213,0,0.18);
    border-color: var(--green);
    color: #4a6600;
  }
  .status.saved-local {
    background: rgba(245,158,11,0.15);
    border-color: #f59e0b;
    color: #78350f;
  }

  /* ── Tab bar ── */
  .tab-bar {
    background: var(--white);
    border-bottom: 3px solid var(--espn-red);
    display: flex;
    overflow-x: auto;
  }
  .tab-bar button {
    padding: 11px 18px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    background: transparent;
    color: var(--navy);
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
    margin-bottom: -3px;
  }
  .tab-bar button.active { background: var(--espn-red); color: var(--white); border-bottom-color: var(--navy); }
  .tab-bar button:hover:not(.active) { background: #f5f5f5; }

  /* ── Content ── */
  .content { padding: 20px; max-width: 1400px; margin: 0 auto; }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--navy);
    color: var(--white);
    padding: 18px 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,38,58,0.15);
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.75;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--espn-red); }

  /* ── Tables ── */
  .table-container {
    overflow-x: auto;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid #ddd;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--navy); color: var(--white); position: sticky; top: 0; z-index: 10; }
  th { padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  thead .filter-row th {
    background: #f0f2f5;
    color: var(--navy);
    padding: 5px 8px;
    text-transform: none;
    letter-spacing: normal;
    font-weight: 400;
    border-bottom: 2px solid var(--gray);
  }
  .filter-row input {
    width: 100%;
    min-width: 70px;
    padding: 4px 6px;
    border: 1px solid var(--gray);
    border-radius: 4px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 400;
    color: var(--navy);
    background: #fff;
  }
  .filter-row input:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 2px rgba(0,181,226,0.2);
  }
  td { padding: 9px 12px; border-bottom: 1px solid #eee; }
  tbody tr:hover { background: #f8f9fa; }
  tbody tr:nth-child(even) td { background: rgba(191,206,214,0.08); }
  .rank { font-weight: 700; color: var(--espn-red); font-size: 14px; }
  .number { font-family: 'Courier New', monospace; font-weight: 600; }

  /* ── Search bar ── */
  .search-bar {
    background: var(--white);
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .search-field { flex: 1; min-width: 180px; }
  .search-field label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 11px; color: var(--navy); text-transform: uppercase; letter-spacing: 0.5px; }
  .search-field input, .search-field select {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--gray);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .search-field input:focus, .search-field select:focus { outline: none; border-color: var(--blue); }

  /* ── Empty state ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--navy); opacity: 0.5; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; }

  /* Production Tracker Reconciliation panel */
  .recon-panel {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 12px;
  }
  .recon-panel.recon-warn { border-left: 4px solid #f59e0b; background: #fffbeb; }
  .recon-panel.recon-ok   { border-left: 4px solid var(--green); background: rgba(167,213,0,0.08); }
  .recon-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .recon-counts { font-size: 11px; color: #555; font-weight: 600; }
  .recon-section { margin-top: 10px; padding-top: 8px; border-top: 1px dashed #e5e7eb; }
  .recon-section-title { color: #92400e; font-weight: 600; padding: 4px 0; font-size: 12px; }
  .recon-list { margin: 6px 0 0 4px; padding: 0; font-size: 11px; max-height: 320px; overflow-y: auto; }
  .recon-list li { padding: 3px 0; color: #444; font-family: 'Courier New', monospace; list-style: none; border-bottom: 1px dashed #eee; }
  .recon-list li:last-child { border-bottom: none; }
  .recon-ok-msg { color: #4a6600; font-weight: 600; font-size: 12px; }

  /* Per-row edit / confirm buttons */
  .row-edit-btn {
    margin-left: 8px;
    padding: 2px 8px;
    border: 1px solid var(--blue);
    background: #fff;
    color: var(--blue);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .row-edit-btn:hover { background: var(--blue); color: #fff; }
  .row-edit-btn.add { background: var(--green); border-color: var(--green); color: var(--navy); }
  .row-edit-btn.add:hover { background: #b8e510; }
  .row-edit-btn.remove { background: #fff; color: var(--espn-red); border-color: var(--espn-red); }
  .row-edit-btn.remove:hover { background: var(--espn-red); color: #fff; }

  /* Edit/Add Event modal */
  .ee-overlay { display: none; position: fixed; inset: 0; background: rgba(0,38,58,0.7); z-index: 250; align-items: center; justify-content: center; padding: 20px; }
  .ee-overlay.open { display: flex; }
  .ee-modal {
    background: #fff;
    border-radius: 12px;
    padding: 24px 28px;
    max-width: 580px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .ee-modal h2 { font-size: 18px; color: var(--navy); margin: 0 0 14px; }
  .ee-modal .ee-row { display: grid; grid-template-columns: 1fr; gap: 10px 12px; margin-bottom: 10px; }
  .ee-modal .ee-row.two { grid-template-columns: 1fr 1fr; }
  .ee-modal .ee-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .ee-modal label { display: block; font-size: 10px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .ee-modal input, .ee-modal select { width: 100%; padding: 7px 10px; border: 1px solid var(--gray); border-radius: 5px; font-family: inherit; font-size: 13px; box-sizing: border-box; }
  .ee-modal input:focus, .ee-modal select:focus { outline: none; border-color: var(--blue); }
  .ee-modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .ee-modal .actions button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 13px; font-family: inherit; }
  .ee-cancel { background: #eee; color: #555; }
  .ee-save { background: var(--green); color: var(--navy); }
  .ee-err { color: var(--espn-red); font-size: 12px; margin-top: 6px; display: none; }
  .ee-matched { background: rgba(167,213,0,0.15); border: 1px solid var(--green); color: #4a6600; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-bottom: 12px; }

  /* Master schedule indicator */
  .ms-tag { display: inline-block; margin-left: 6px; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 700; vertical-align: middle; }
  .ms-tag.found { background: rgba(167,213,0,0.25); color: #4a6600; border: 1px solid var(--green); }
  .ms-tag.not-found { background: rgba(239,64,53,0.15); color: #991b1b; border: 1px solid #fca5a5; }

  /* Production Tracker placeholder rows (events without viewership data yet) */
  .placeholder-row td { color: #6b7280; font-style: italic; background: rgba(0,181,226,0.05) !important; }
  .ph-badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    background: rgba(0,181,226,0.15);
    color: var(--blue);
    border: 1px solid rgba(0,181,226,0.4);
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    font-style: normal;
    vertical-align: middle;
  }

  /* ── School search section ── */
  .section-title { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }

  /* ── Lock icon on protected tabs ── */
  .tab-bar button.locked::after { content: ' 🔒'; font-size: 10px; }

  /* ── Password modal ── */
  .pw-overlay { display:none; position:fixed; inset:0; background:rgba(0,38,58,0.7); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .pw-overlay.open { display:flex; }
  .pw-box { background:#fff; border-radius:12px; padding:32px; max-width:360px; width:100%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
  .pw-box h2 { font-size:18px; color:var(--navy); margin-bottom:6px; }
  .pw-box p { font-size:12px; color:#666; margin-bottom:20px; }
  .pw-input { width:100%; padding:10px 14px; border:2px solid #ddd; border-radius:8px; font-size:14px; text-align:center; letter-spacing:2px; font-family:inherit; margin-bottom:12px; }
  .pw-input:focus { outline:none; border-color:var(--blue); }
  .pw-err { color:var(--espn-red); font-size:12px; margin-bottom:10px; display:none; }
  .pw-actions { display:flex; gap:8px; justify-content:center; }

  @media (max-width: 640px) {
    .controls { flex-direction: column; align-items: stretch; }
    .btn { justify-content: center; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <img src="Logos/Hub/cusa%20espn%20cobrand%201C%20white.png" alt="CUSA ESPN"
       onerror="this.style.display='none'">
  <h1>ESPN+ Viewership — Admin Portal <span id="liveBadge" class="live-badge" style="display:none">Live</span></h1>
  <span id="currentUser" style="color:rgba(255,255,255,0.8);font-size:11px;font-weight:600"></span>
  <button id="lockBtn" onclick="lockViewer()" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;">🔒 Sign Out</button>
  <a href="viewership.html">← Public View</a>
</div>

<!-- Password modal — full-page gate -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <h2>🔒 Admin Portal</h2>
    <p>Sign in with your admin email and password</p>
    <input class="pw-input" id="pwEmail" type="email" placeholder="you@example.com" autocomplete="email" style="text-align:left;letter-spacing:0">
    <input class="pw-input" id="pwInput" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitPw()">
    <div class="pw-err" id="pwErr">Incorrect email or password.</div>
    <div class="pw-actions">
      <button onclick="window.location.href='viewership.html'" style="background:#eee;color:#555;border:none;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>
      <button onclick="submitPw()" style="background:var(--espn-red);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Sign In</button>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="file-input-wrapper">
    <label for="fileInput" class="btn btn-import">📂 Import Excel</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </div>
  <button class="btn btn-save" id="saveBtn" title="Flush viewership events to the database (produced-event changes auto-save as you make them)">💾 Save All</button>
  <div class="file-input-wrapper">
    <label for="appendInput" class="btn btn-append">➕ Add New Period</label>
    <input type="file" id="appendInput" accept=".xlsx,.xls">
  </div>
  <button class="btn btn-toggle" id="producedToggle" onclick="toggleProducedFilter()" title="Show only events produced by CUSA schools" disabled>○ CUSA Produced Only</button>
  <div class="file-input-wrapper">
    <label for="prodInput" class="btn btn-append" title="Upload CUSA_ESPN_Production_Tracker.xlsx">📋 Import Production Tracker</label>
    <input type="file" id="prodInput" accept=".xlsx,.xls">
  </div>
  <button class="btn" id="msFetchBtn" title="Fetch and parse the Master Schedule from Google Sheets" style="background:#6366f1;color:#fff">🌐 Cross-check Master Schedule</button>
  <button class="btn" id="dbDiagBtn" title="Test the Supabase connection and show table status" style="background:#94a3b8;color:#fff">🔍 Diagnose DB</button>
  <button class="btn btn-archive" id="archiveBtn" title="Download a full Excel backup, then clear the database to start a new athletic year">📦 Archive Year</button>
  <div class="status" id="status">No data loaded</div>
</div>

<!-- Edit / Add Event modal -->
<div class="ee-overlay" id="eeOverlay">
  <div class="ee-modal">
    <h2 id="eeTitle">Edit Event</h2>
    <div class="ee-matched" id="ee-matched" style="display:none">📊 <span id="ee-matched-text">Found existing viewership data — numbers pre-filled.</span></div>
    <div class="ee-row">
      <div>
        <label>Sport</label>
        <select id="ee-sport">
          <option value="NCAA Football">NCAA Football</option>
          <option value="NCAA Women's Volleyball">NCAA Women's Volleyball</option>
          <option value="NCAA Women's Soccer">NCAA Women's Soccer</option>
          <option value="NCAA Baseball">NCAA Baseball</option>
          <option value="NCAA Softball">NCAA Softball</option>
          <option value="NCAA Men's Basketball">NCAA Men's Basketball</option>
          <option value="NCAA Women's Basketball">NCAA Women's Basketball</option>
        </select>
      </div>
    </div>
    <div class="ee-row">
      <div>
        <label>Matchup (Airing Title)</label>
        <input type="text" id="ee-airing" placeholder="Away vs. Home">
      </div>
    </div>
    <div class="ee-row two">
      <div><label>Date</label><input type="date" id="ee-date"></div>
      <div><label>Report Period</label><input type="text" id="ee-period" placeholder="e.g. Aug-Oct 2025"></div>
    </div>
    <div class="ee-row two">
      <div><label>Away Team</label><input type="text" id="ee-away"></div>
      <div><label>Home Team</label><input type="text" id="ee-home"></div>
    </div>
    <div class="ee-row three">
      <div><label>Unique Viewers</label><input type="number" id="ee-viewers" min="0" step="1"></div>
      <div><label>Total Minutes</label><input type="number" id="ee-minutes" min="0" step="1"></div>
      <div><label>Min/Viewer</label><input type="number" id="ee-mpv" min="0" step="0.1"></div>
    </div>
    <div class="ee-err" id="ee-err"></div>
    <div class="actions">
      <button class="ee-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="ee-save" onclick="saveEditModal()">Save</button>
    </div>
  </div>
</div>

<!-- Meta bar -->
<div id="metaBar" style="display:none;background:var(--white);border-bottom:1px solid #ddd;padding:7px 20px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;font-size:11px;">
  <span style="font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px;">Reporting Period:</span>
  <span id="metaPeriodText" style="color:var(--espn-red);font-weight:700;display:none;">—</span>
  <select id="metaPeriodSelect" style="display:none;border:1px solid var(--gray);border-radius:5px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--espn-red);font-family:inherit;background:#fff;cursor:pointer;" onchange="saveSelectedPeriod(this.value)"></select>
  <button id="removePeriodBtn" onclick="removeSelectedPeriod()" style="display:none;background:none;border:1px solid #fca5a5;border-radius:4px;padding:2px 8px;font-size:11px;color:#991b1b;cursor:pointer;font-family:inherit;font-weight:600;">🗑 Remove</button>
  <span style="color:#ccc;">|</span>
  <span style="font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px;">Last Modified:</span>
  <span id="metaModified" style="color:#555;">—</span>
</div>

<!-- Tab bar -->
<div class="tab-bar">
  <button class="active" data-tab="dashboard">Dashboard</button>
  <button data-tab="football">Football</button>
  <button data-tab="volleyball">Volleyball</button>
  <button data-tab="soccer">Soccer</button>
  <button data-tab="baseball">Baseball</button>
  <button data-tab="softball">Softball</button>
  <button data-tab="mbb">Men's Basketball</button>
  <button data-tab="wbb">Women's Basketball</button>
  <button data-tab="championships">Championships</button>
  <button data-tab="shows">Shows</button>
  <button data-tab="rawdata">Raw Data</button>
  <button data-tab="activity">📋 Activity Log</button>
  <button data-tab="schools">🏫 Schools</button>
</div>

<!-- Tab content -->
<div class="content">

  <div id="dashboard" class="tab-content active">
    <div class="stats-grid" id="dashboardStats"></div>
    <h3 style="margin-bottom:12px;color:var(--navy);font-size:15px;">Viewership by Sport</h3>
    <div class="table-container" id="dashboardTable"></div>
  </div>

  <div id="football"      class="tab-content" style="display:none"></div>
  <div id="volleyball"    class="tab-content" style="display:none"></div>
  <div id="soccer"        class="tab-content" style="display:none"></div>
  <div id="baseball"      class="tab-content" style="display:none"></div>

</div>

<script>
  // Global state
  let rawData = [];
  const STORAGE_KEY = 'cusa_tracker_data';
  const META_KEY = 'cusa_tracker_meta';
  const PERIOD_KEY = 'cusa_tracker_period';
  const VW_UNLOCK_KEY = 'cusa_viewer_unlocked';
  const VW_PW_HASH = '9a874f8b06ebb0eb63336db78b70ca149513a237de8395d8e858ee8f0c702ae2';
  const CURRENT_USER_KEY = 'cusa_admin_current_user';
  let _currentUser = null; // { email, display_name }
  const PROTECTED_TABS = new Set(['dashboard','football','volleyball','soccer','baseball','softball','mbb','wbb','championships','shows','rawdata']);
  let adminUnlocked = localStorage.getItem(VW_UNLOCK_KEY) === 'true';
  let pendingTab = null;
  let _db = null;
  let _producedOnly = localStorage.getItem('cusa_produced_only') === 'true';
  let _producedSet = new Set();
  let _producedEvents = [];

  const PROD_TO_VIEW_SPORT = {
    'Football': 'NCAA Football',
    'Soccer': "NCAA Women's Soccer",
    'Volleyball': "NCAA Women's Volleyball",
    "Men's Basketball": "NCAA Men's Basketball",
    "Women's Basketball": "NCAA Women's Basketball",
    'Baseball': 'NCAA Baseball',
    'Softball': 'NCAA Softball'
  };
  // Default lists used as a fallback if the conference_schools table can't be
  // reached. Kept in sync with the seed in supabase/migrations/conference_schools.sql.
  let PROD_SCHOOL_MAP = {
    'FIU': 'Florida International',
    'MTSU': 'Middle Tennessee',
    'WKU': 'Western Kentucky',
    'LA Tech': 'Louisiana Tech'
  };
  // Common abbreviations that show up in viewership rows where the canonical
  // CUSA school name is expected. Used by mergeProducedPlaceholders so a row
  // with HOME_TEAM = 'WKU' still counts as a match for school 'Western Kentucky'.
  let CUSA_ALIAS = {
    'FIU': 'Florida International',
    'MTSU': 'Middle Tennessee',
    'WKU': 'Western Kentucky',
    'NMSU': 'New Mexico State',
    'JSU': 'Jacksonville State',
    'KSU': 'Kennesaw State',
    'SHSU': 'Sam Houston',
    'Sam Houston State': 'Sam Houston',
    'Jax State': 'Jacksonville State',
    'Mid Tenn': 'Middle Tennessee',
    'Middle Tenn': 'Middle Tennessee',
    'LA Tech': 'Louisiana Tech',
    'Louisiana Tech University': 'Louisiana Tech',
    'Texas El Paso': 'UTEP',
    'Texas-El Paso': 'UTEP',
    'University of Texas at El Paso': 'UTEP',
    'DBU': 'Dallas Baptist',
    'Dallas Baptist University': 'Dallas Baptist'
  };
  function canonCusa(name) {
    if (!name) return name;
    const t = String(name).trim();
    return CUSA_ALIAS[t] || t;
  }

  /* Master Schedule (Google Sheets, scraped from school sites) */
  const MASTER_SCHEDULE_URL = 'https://docs.google.com/spreadsheets/d/1FyknP3xzkfHNAfzXo7gsqgQ5D84K7iUNl5sq-ecYs04/export?format=csv&gid=1847745486';
  let _masterSchedule = []; // [{ date, school, opponent, sport, homeAway }]
  let _masterScheduleLoaded = false;
  const MS_SCHOOL_MAP = {
    'FIU': 'Florida International', 'Florida International University': 'Florida International',
    'MTSU': 'Middle Tennessee', 'Middle Tennessee State University': 'Middle Tennessee', 'Middle Tennessee State': 'Middle Tennessee',
    'WKU': 'Western Kentucky', 'Western Kentucky University': 'Western Kentucky',
    'Sam Houston State University': 'Sam Houston', 'Sam Houston State': 'Sam Houston',
    'Liberty University': 'Liberty',
    'New Mexico State University': 'New Mexico State',
    'Jacksonville State University': 'Jacksonville State',
    'Kennesaw State University': 'Kennesaw State',
    'Missouri State University': 'Missouri State',
    'University of Delaware': 'Delaware'
  };
  function normalizeMsSchool(s) { s = (s || '').trim(); return MS_SCHOOL_MAP[s] || s; }

  /* Edit/Add Event modal state */
  let _editingEventRef = null; // existing rawData row reference
  let _editingProdEvent = null;

  async function hashPw(pw) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  function openPwModal(tab) {
    pendingTab = tab;
    document.getElementById('pwInput').value = '';
    document.getElementById('pwErr').style.display = 'none';
    document.getElementById('pwOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pwInput').focus(), 80);
  }
  function closePwModal() {
    document.getElementById('pwOverlay').classList.remove('open');
    pendingTab = null;
  }
  async function submitPw() {
    const email = (document.getElementById('pwEmail').value || '').trim().toLowerCase();
    const pw = document.getElementById('pwInput').value;
    if (!email || !pw) { document.getElementById('pwErr').textContent = 'Email and password are required.'; document.getElementById('pwErr').style.display = 'block'; return; }
    const h = await hashPw(pw);
    // Need a Supabase client to look up the user — create a temporary one if needed
    let tmpDb = _db;
    if (!tmpDb && typeof supabase !== 'undefined' && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
      tmpDb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }
    let user = null;
    if (tmpDb) {
      try {
        const { data } = await tmpDb.from('admin_users').select('email, pw_hash, display_name, is_active').eq('email', email).maybeSingle();
        if (data && data.is_active && data.pw_hash === h) user = { email: data.email, display_name: data.display_name || data.email };
      } catch (e) { console.warn('admin_users lookup failed:', e); }
    }
    // Legacy fallback: shared admin hash still works for any email so existing
    // bookmarks keep functioning if the admin_users table isn't seeded yet.
    if (!user && h === VW_PW_HASH) {
      user = { email: email || 'legacy-admin', display_name: 'Legacy Admin' };
    }
    if (!user) { document.getElementById('pwErr').textContent = 'Incorrect email or password.'; document.getElementById('pwErr').style.display = 'block'; return; }
    _currentUser = user;
    localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
    adminUnlocked = true;
    localStorage.setItem(VW_UNLOCK_KEY, 'true');
    closePwModal();
    await initAdminPortal();
    logActivity('login', null, `Signed in to Viewership admin`);
  }
  function lockViewer() {
    if (_currentUser) logActivity('sign-out', null, 'Signed out of Viewership admin');
    localStorage.removeItem(VW_UNLOCK_KEY);
    localStorage.removeItem(CURRENT_USER_KEY);
    window.location.href = 'viewership.html';
  }
  function loadCurrentUser() {
    try { _currentUser = JSON.parse(localStorage.getItem(CURRENT_USER_KEY) || 'null'); }
    catch { _currentUser = null; }
    const el = document.getElementById('currentUser');
    if (el) el.textContent = _currentUser ? `Signed in as ${_currentUser.display_name || _currentUser.email}` : '';
  }
  function updateTabLocks() { /* no-op — admin portal is fully gated */ }

  /* ── Supabase ── */
  function initSupabase() {
    if (typeof supabase !== 'undefined' && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
      _db = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }
  }

  /* Append an activity-log row. Fire-and-forget — never blocks the UI. */
  function logActivity(action, target, details) {
    if (!_db) return;
    const u = _currentUser;
    const row = {
      email: u?.email || 'unknown',
      display_name: u?.display_name || null,
      app: 'viewership',
      action,
      target: target || null,
      details: details || null
    };
    _db.from('admin_activity_log').insert(row).then(({error}) => {
      if (error) console.warn('logActivity failed:', error);
    });
  }
  function currentUserEmail() { return _currentUser?.email || null; }

  function rowToDb(r) {
    return {
      sport: r.SPORT || '',
      airing_title: r.AIRING_TITLE || '',
      event_date: String(r.DATE || ''),
      away_team: r.AWAY_TEAM || '',
      home_team: r.HOME_TEAM || '',
      unique_viewers: Math.round(r.UNIQUE_VIEWERS || 0),
      total_minutes: Math.round(r.TOTAL_MINUTES || 0),
      min_per_viewer: parseFloat(r.MIN_PER_VIEWER || 0),
      report_period: r.REPORT_PERIOD || '',
      extra_data: r
    };
  }

  function rowFromDb(r) {
    const base = r.extra_data || {};
    return {
      ...base,
      SPORT: r.sport,
      AIRING_TITLE: r.airing_title,
      DATE: r.event_date,
      AWAY_TEAM: r.away_team,
      HOME_TEAM: r.home_team,
      UNIQUE_VIEWERS: r.unique_viewers,
      TOTAL_MINUTES: r.total_minutes,
      MIN_PER_VIEWER: parseFloat(r.min_per_viewer),
      REPORT_PERIOD: r.report_period
    };
  }

  async function loadFromSupabase() {
    if (!_db) return false;
    try {
      updateStatus('Loading from database…');
      let all = [];
      let from = 0;
      const PAGE = 1000;
      while (true) {
        const { data, error } = await _db.from('viewership_events').select('*').range(from, from + PAGE - 1);
        if (error) throw error;
        if (!data || data.length === 0) break;
        all = all.concat(data.map(rowFromDb));
        if (data.length < PAGE) break;
        from += PAGE;
      }
      rawData = mergeProducedPlaceholders(all);
      return true;
    } catch(e) {
      console.error('Supabase load error:', e);
      return false;
    }
  }

  /* Merge produced_events rows as placeholders for any event we don't already
     have viewership data for. Placeholders show up in sport tabs / school
     search so admins can see the full schedule from the Production Tracker. */
  function mergeProducedPlaceholders(viewership) {
    if (!_producedEvents.length) return viewership;
    const cusaSet = new Set(CUSA_SCHOOLS);
    const haveKey = new Set();
    viewership.forEach(v => {
      const d = formatDateForFilter(v.DATE);
      if (!d) return;
      const home = canonCusa(v.HOME_TEAM);
      const away = canonCusa(v.AWAY_TEAM);
      if (home && cusaSet.has(home)) haveKey.add(`${d}|${home}`);
      if (away && cusaSet.has(away)) haveKey.add(`${d}|${away}`);
    });
    const placeholders = [];
    _producedEvents.forEach(p => {
      const sportName = PROD_TO_VIEW_SPORT[p.sport];
      if (!sportName) return;
      if (!p.event_date) return;
      if (haveKey.has(`${p.event_date}|${canonCusa(p.school)}`)) return;
      const home = p.home_team || p.school || '';
      const away = p.away_team || '';
      const title = (away && home) ? `${away} vs. ${home}` : (home || away || `${p.school} (produced)`);
      placeholders.push({
        SPORT: sportName,
        AIRING_TITLE: title,
        DATE: p.event_date,
        AWAY_TEAM: away,
        HOME_TEAM: home,
        UNIQUE_VIEWERS: 0,
        TOTAL_MINUTES: 0,
        MIN_PER_VIEWER: 0,
        REPORT_PERIOD: '',
        _placeholder: true,
        _prodKey: { sport: p.sport, school: p.school, event_date: p.event_date, home_team: p.home_team || '', away_team: p.away_team || '' }
      });
    });
    return viewership.concat(placeholders);
  }

  async function saveToSupabase() {
    if (!_db) return false;
    const real = rawData.filter(r => !r._placeholder);
    if (!real.length) return false;
    try {
      const rows = real.map(rowToDb);
      for (let i = 0; i < rows.length; i += 500) {
        const { error } = await _db.from('viewership_events')
          .upsert(rows.slice(i, i + 500), { onConflict: 'sport,airing_title,event_date' });
        if (error) throw error;
      }
      return true;
    } catch(e) {
      console.error('Supabase save error:', e);
      return false;
    }
  }

  async function deleteSupabasePeriod(period) {
    if (!_db) return false;
    try { const { error } = await _db.from('viewership_events').delete().eq('report_period', period); if (error) throw error; return true; }
    catch (e) { console.error('Period delete failed:', e); return false; }
  }

  async function clearSupabase() {
    if (!_db) return false;
    try { const { error } = await _db.from('viewership_events').delete().not('id', 'is', null); if (error) throw error; return true; }
    catch (e) { console.error('Clear failed:', e); return false; }
  }

  /* ── CUSA-Produced filter ── */
  async function loadProducedEvents() {
    let events = null;
    if (_db) {
      try {
        const { data, error } = await _db.from('produced_events').select('*');
        if (error) throw error;
        if (data && data.length) events = data;
      } catch(e) { console.warn('Supabase produced_events fetch failed:', e); }
    }
    if (!events) {
      try {
        const r = await fetch('produced_events.json', { cache: 'no-cache' });
        if (r.ok) {
          const arr = await r.json();
          events = arr.map(e => ({
            sport: e.sport, school: e.school,
            event_date: e.date, home_team: e.home, away_team: e.away
          }));
        }
      } catch(e) { console.warn('Static produced_events.json not available:', e); }
    }
    _producedEvents = applyRemovedFilter(events || []);
    _producedSet = new Set(_producedEvents.map(e => `${e.event_date}|${canonCusa(e.school)}`));
    const btn = document.getElementById('producedToggle');
    if (btn) btn.disabled = !_producedEvents.length;
  }

  function handleProductionTrackerImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array', cellDates: true });
        const events = [];
        ['Fall Data', 'Winter Data', 'Spring Data'].forEach(sn => {
          const sheet = wb.Sheets[sn];
          if (!sheet) return;
          const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          let headerRow = -1;
          for (let i = 0; i < json.length; i++) {
            if (json[i] && json[i][0] === 'SPORT') { headerRow = i; break; }
          }
          if (headerRow === -1) return;
          const h = json[headerRow];
          const idx = name => h.indexOf(name);
          const iSport = idx('SPORT'), iStatus = idx('STATUS'), iSchool = idx('SCHOOL');
          const iDate = idx('DATE'), iAway = idx('AWAY'), iHome = idx('HOME');
          for (let i = headerRow + 1; i < json.length; i++) {
            const row = json[i];
            if (!row || !row[iSport]) continue;
            if (row[iStatus] !== 'Produced') continue;
            const d = row[iDate];
            let dateStr = '';
            if (d instanceof Date && !isNaN(d.getTime())) {
              const tz = d.getTimezoneOffset() * 60000;
              dateStr = new Date(d.getTime() - tz).toISOString().split('T')[0];
            } else if (typeof d === 'string' && d.trim()) {
              dateStr = formatDateForFilter(d) || d.trim();
            } else if (typeof d === 'number') {
              const js = new Date(Math.round((d - 25569) * 86400 * 1000));
              if (!isNaN(js.getTime())) dateStr = js.toISOString().split('T')[0];
            }
            if (!dateStr) continue;
            const schoolRaw = String(row[iSchool] || '').trim();
            const school = PROD_SCHOOL_MAP[schoolRaw] || schoolRaw;
            events.push({
              sport: String(row[iSport] || '').trim(),
              school,
              event_date: dateStr,
              home_team: String(row[iHome] || '').trim(),
              away_team: String(row[iAway] || '').trim()
            });
          }
        });
        if (!events.length) { alert('No produced events found in this file (looking for STATUS = "Produced" rows in Fall/Winter/Spring sheets)'); event.target.value = ''; return; }
        if (!_db) { alert('Supabase not connected — cannot save Production Tracker'); event.target.value = ''; return; }
        updateStatus('Uploading Production Tracker…');
        // Replace all rows: delete then insert. The xlsx legitimately contains
        // doubleheaders (e.g. softball Delaware vs Georgetown 2026-02-14 12:00
        // PM + 2:30 PM), so we keep them as separate rows. The old
        // (sport,school,event_date,home_team,away_team) unique constraint on
        // produced_events must be dropped — see the SQL migration.
        const del = await _db.from('produced_events').delete().not('sport', 'is', null);
        if (del.error) throw del.error;
        for (let i = 0; i < events.length; i += 500) {
          const chunk = events.slice(i, i + 500);
          const ins = await _db.from('produced_events').insert(chunk);
          if (ins.error) throw ins.error;
        }
        await loadProducedEvents();
        // Refresh placeholders so the newly-imported produced events appear
        rawData = mergeProducedPlaceholders(rawData.filter(r => !r._placeholder));
        renderAllTabs();
        updateStatus(`☁️ Imported ${events.length} produced events from Production Tracker`, 'saved-cloud');
        logActivity('import', 'produced_events', `Imported ${events.length} rows from Production Tracker`);
        event.target.value = '';
      } catch (err) {
        console.error(err);
        alert('Production Tracker import failed: ' + (err.message || err));
        updateStatus('Import failed', 'saved-local');
        event.target.value = '';
      }
    };
    reader.readAsArrayBuffer(file);
  }

  /* ── Sport-by-sport reconciliation ── */
  function normalizeName(s) { return (s || '').toLowerCase().replace(/[^a-z0-9]/g, ''); }

  function renderReconciliation(viewSportName) {
    if (!_producedEvents.length) return '';
    const prodSportKeys = Object.entries(PROD_TO_VIEW_SPORT)
      .filter(([_, v]) => v === viewSportName).map(([k]) => k);
    if (!prodSportKeys.length) return '';
    const today = new Date().toISOString().split('T')[0];
    const prodEvents = _producedEvents
      .filter(e => prodSportKeys.includes(e.sport) && e.event_date && e.event_date <= today)
      .sort((a,b) => (a.event_date || '').localeCompare(b.event_date || ''));
    if (!prodEvents.length) return '';

    const cusaSet = new Set(CUSA_SCHOOLS);
    // Only count REAL viewership rows — placeholders don't have viewership data
    const viewEvents = rawData.filter(r => r.SPORT === viewSportName && !r._placeholder);

    // Doubleheader-aware matching: each viewership row can only "satisfy"
    // ONE produced event. We try to match by opponent name first, then fall
    // back to first available candidate.
    const claimed = new Set();
    const missing = [];

    prodEvents.forEach(p => {
      // Canonicalize so 'LA Tech' and 'Louisiana Tech' (and other aliases)
      // collapse to one name on both sides of the comparison.
      const pSchool = canonCusa(p.school);
      const candidates = [];
      viewEvents.forEach((v, idx) => {
        if (claimed.has(idx)) return;
        const d = formatDateForFilter(v.DATE);
        if (d !== p.event_date) return;
        const vHome = canonCusa(v.HOME_TEAM);
        const vAway = canonCusa(v.AWAY_TEAM);
        const isHome = vHome === pSchool;
        const isAway = vAway === pSchool;
        if (!isHome && !isAway) return;
        candidates.push({ idx, v, isHome });
      });
      if (!candidates.length) { missing.push(p); return; }
      if (candidates.length === 1) { claimed.add(candidates[0].idx); return; }
      // Multiple candidates → match by opponent name
      const prodOppA = normalizeName(canonCusa(p.away_team));
      const prodOppH = normalizeName(canonCusa(p.home_team));
      let chosen = candidates.find(c => {
        const opp = c.isHome ? c.v.AWAY_TEAM : c.v.HOME_TEAM;
        const oppN = normalizeName(canonCusa(opp));
        const titleN = normalizeName(c.v.AIRING_TITLE);
        if (!oppN) return false;
        if (prodOppA && (oppN.includes(prodOppA) || prodOppA.includes(oppN))) return true;
        if (prodOppH && (oppN.includes(prodOppH) || prodOppH.includes(oppN))) return true;
        if (prodOppA && titleN.includes(prodOppA)) return true;
        if (prodOppH && titleN.includes(prodOppH)) return true;
        return false;
      });
      if (!chosen) chosen = candidates[0];
      claimed.add(chosen.idx);
    });

    const matched = prodEvents.length - missing.length;
    const allMatch = missing.length === 0;
    return `
      <div class="recon-panel ${allMatch ? 'recon-ok' : 'recon-warn'}">
        <div class="recon-header">
          <span>📋 Production Tracker Reconciliation</span>
          <span class="recon-counts">Tracker: ${prodEvents.length} produced (to date) • With viewership data: ${matched}/${prodEvents.length}${_masterScheduleLoaded ? ' • Master Schedule loaded' : ''}</span>
        </div>
        ${missing.length ? `
          <div class="recon-section">
            <div class="recon-section-title">⚠ ${missing.length} produced event${missing.length === 1 ? '' : 's'} without a viewership row</div>
            <ul class="recon-list">
              ${missing.map(e => {
                const ms = _masterScheduleLoaded ? checkMasterSchedule(e) : null;
                const msTag = ms === true ? '<span class="ms-tag found" title="Found in Master Schedule">✓ MS</span>'
                            : ms === false ? '<span class="ms-tag not-found" title="Not found in Master Schedule">✗ MS</span>'
                            : '';
                const data = JSON.stringify(e).replace(/'/g, '&#39;');
                return `<li>
                  ${escapeReconText(e.event_date)} — ${escapeReconText(e.away_team || '?')} @ ${escapeReconText(e.home_team || '?')}
                  <span style="color:#888">(${escapeReconText(e.school)})</span>
                  ${msTag}
                  <button class="row-edit-btn add" data-recon-event='${data}' data-recon-sport="${escapeReconText(viewSportName)}">+ Confirm</button>
                  <button class="row-edit-btn remove" data-recon-event='${data}' data-action="remove">× Remove</button>
                </li>`;
              }).join('')}
            </ul>
          </div>
        ` : '<div class="recon-ok-msg">✓ Every produced event in the Production Tracker has a matching viewership row</div>'}
      </div>
    `;
  }

  /* ── Master Schedule (Google Sheets) ── */
  async function loadMasterSchedule() {
    try {
      updateStatus('Fetching Master Schedule…');
      const res = await fetch(MASTER_SCHEDULE_URL, { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const csv = await res.text();
      _masterSchedule = parseMasterScheduleCsv(csv);
      _masterScheduleLoaded = true;
      updateStatus(`☁️ Master Schedule loaded — ${_masterSchedule.length} events`, 'saved-cloud');
      renderAllTabs();
    } catch (err) {
      console.error('Master Schedule fetch failed:', err);
      updateStatus('Master Schedule fetch failed: ' + (err.message || err), 'saved-local');
    }
  }

  function parseCsvRow(line) {
    const out = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (inQ) {
        if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
        else if (c === '"') inQ = false;
        else cur += c;
      } else {
        if (c === ',') { out.push(cur); cur = ''; }
        else if (c === '"') inQ = true;
        else cur += c;
      }
    }
    out.push(cur);
    return out;
  }

  function parseMasterScheduleCsv(csv) {
    const lines = csv.split(/\r?\n/);
    const events = [];
    // Find the header row that has 'Date', 'Day', 'Time', 'Home/Away', 'Opponent', 'School'
    let headerCols = null, headerIdx = -1;
    for (let i = 0; i < lines.length; i++) {
      const cols = parseCsvRow(lines[i]).map(c => c.trim());
      const dateCol = cols.indexOf('Date');
      if (dateCol !== -1 && cols.includes('Opponent') && cols.includes('School')) {
        headerCols = cols; headerIdx = i; break;
      }
    }
    if (!headerCols) return [];
    const idx = name => headerCols.indexOf(name);
    const iDate = idx('Date'), iHA = idx('Home/Away'), iOpp = idx('Opponent'),
          iSport = idx('Sport'), iSeason = idx('Season'), iSchool = idx('School'), iCode = idx('Code');
    const today = new Date();
    const currYear = today.getFullYear();
    for (let i = headerIdx + 1; i < lines.length; i++) {
      const cols = parseCsvRow(lines[i]);
      if (!cols[iDate]) continue;
      const dateStr = (cols[iDate] || '').trim();
      // Date format like "Apr 2" — infer year from Code (e.g. "402" = April 2)
      // For year, use heuristic: if month >= 7 (Jul-Dec), it's the start of academic year
      const parts = dateStr.split(/\s+/);
      if (parts.length < 2) continue;
      const monthNames = { Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Sept:8, Oct:9, Nov:10, Dec:11 };
      const m = monthNames[parts[0]];
      const day = parseInt(parts[1], 10);
      if (m == null || isNaN(day)) continue;
      // Infer academic year — use season hint if present
      const season = (cols[iSeason] || '').toLowerCase();
      let year = currYear;
      if (season.includes('fall')) year = (m >= 6) ? currYear : currYear - 1;
      else if (season.includes('winter')) year = (m >= 9 || m <= 4) ? (m >= 9 ? currYear : currYear) : currYear;
      else if (season.includes('spring')) year = (m <= 7) ? currYear : currYear - 1;
      else year = (m >= 7) ? currYear : currYear + 1;
      const isoDate = `${year}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      events.push({
        date: isoDate,
        school: normalizeMsSchool(cols[iSchool] || cols[iCode] || ''),
        opponent: (cols[iOpp] || '').trim(),
        sport: (cols[iSport] || '').trim(),
        homeAway: (cols[iHA] || '').trim()
      });
    }
    return events;
  }

  function checkMasterSchedule(prodEvent) {
    if (!_masterScheduleLoaded) return null;
    const opp = normalizeName(prodEvent.away_team) + ' ' + normalizeName(prodEvent.home_team);
    const found = _masterSchedule.some(m =>
      m.date === prodEvent.event_date &&
      m.school === prodEvent.school &&
      (opp.includes(normalizeName(m.opponent)) || normalizeName(m.opponent).length > 2 && opp.includes(normalizeName(m.opponent).slice(0, 4)))
    );
    return found;
  }

  /* Local blocklist of produced events the admin removed.
     Used as a fallback when the Supabase produced_events table doesn't
     exist yet (schema migration not run) and as a safety net for the
     bundled produced_events.json fallback. */
  const REMOVED_PROD_KEY = 'cusa_removed_produced_events';
  function prodKeyString(p) {
    return `${p.sport || ''}|${p.school || ''}|${p.event_date || ''}|${p.home_team || ''}|${p.away_team || ''}`;
  }
  function getRemovedProdSet() {
    try {
      const raw = localStorage.getItem(REMOVED_PROD_KEY);
      return raw ? new Set(JSON.parse(raw)) : new Set();
    } catch { return new Set(); }
  }
  function addToRemovedProdSet(prodKey) {
    const set = getRemovedProdSet();
    set.add(prodKeyString(prodKey));
    try { localStorage.setItem(REMOVED_PROD_KEY, JSON.stringify([...set])); } catch {}
  }
  function applyRemovedFilter(events) {
    const removed = getRemovedProdSet();
    if (!removed.size) return events;
    return events.filter(e => !removed.has(prodKeyString(e)));
  }

  async function removeProducedEvent(prodKey) {
    let supabaseOk = false;
    let supabaseErr = null;
    if (_db) {
      try {
        let q = _db.from('produced_events').delete()
          .eq('sport', prodKey.sport || '')
          .eq('school', prodKey.school || '')
          .eq('event_date', prodKey.event_date || '');
        if (prodKey.home_team) q = q.eq('home_team', prodKey.home_team);
        if (prodKey.away_team) q = q.eq('away_team', prodKey.away_team);
        const { error } = await q;
        if (error) throw error;
        supabaseOk = true;
      } catch(err) {
        console.warn('Supabase remove failed — falling back to local blocklist:', err);
        supabaseErr = err;
      }
    }

    // Always persist locally so the placeholder doesn't reappear on reload
    addToRemovedProdSet(prodKey);

    _producedEvents = _producedEvents.filter(p =>
      !(p.sport === prodKey.sport
        && p.school === prodKey.school
        && p.event_date === prodKey.event_date
        && (p.home_team || '') === (prodKey.home_team || '')
        && (p.away_team || '') === (prodKey.away_team || ''))
    );
    _producedSet = new Set(_producedEvents.map(e => `${e.event_date}|${canonCusa(e.school)}`));
    rawData = mergeProducedPlaceholders(rawData.filter(r => !r._placeholder));
    renderAllTabs();

    if (supabaseOk) {
      updateStatus('☁️ Produced event removed (database)', 'saved-cloud');
      logActivity('delete', `produced:${prodKey.event_date}|${prodKey.school}`, `Removed ${prodKey.away_team || '?'} @ ${prodKey.home_team || '?'} (${prodKey.school})`);
    } else {
      const tableMissing = supabaseErr && /produced_events|schema cache/i.test(supabaseErr.message || '');
      updateStatus(
        tableMissing
          ? '💻 Removed locally — run the produced_events SQL migration in Supabase to sync across browsers'
          : '💻 Removed locally — Supabase delete failed',
        'saved-local'
      );
    }
    return true;
  }

  /* Look for an existing viewership row that already covers the produced event
     so Confirm can pre-fill the user's numbers (and we update that row in
     place instead of creating a duplicate). Returns the rawData row or null. */
  function findMatchingViewershipRow(prodEvent, viewSportName) {
    const targetDate = prodEvent.event_date;
    if (!targetDate) return null;
    const sameSlot = rawData.filter(r =>
      !r._placeholder &&
      r.SPORT === viewSportName &&
      formatDateForFilter(r.DATE) === targetDate
    );
    if (!sameSlot.length) return null;
    const sN = normalizeName(canonCusa(prodEvent.school));
    const hN = normalizeName(canonCusa(prodEvent.home_team));
    const aN = normalizeName(canonCusa(prodEvent.away_team));
    let best = null, bestScore = 0;
    for (const c of sameSlot) {
      const cH = normalizeName(canonCusa(c.HOME_TEAM));
      const cA = normalizeName(canonCusa(c.AWAY_TEAM));
      const cT = normalizeName(c.AIRING_TITLE);
      let score = 0;
      if (sN) {
        if (cH && (cH === sN || cH.includes(sN) || sN.includes(cH))) score += 3;
        else if (cA && (cA === sN || cA.includes(sN) || sN.includes(cA))) score += 3;
        else if (cT.includes(sN)) score += 1;
      }
      if (hN) {
        if (cH && (cH === hN || cH.includes(hN) || hN.includes(cH))) score += 2;
        else if (cT.includes(hN)) score += 1;
      }
      if (aN) {
        if (cA && (cA === aN || cA.includes(aN) || aN.includes(cA))) score += 2;
        else if (cT.includes(aN)) score += 1;
      }
      if (score > bestScore) { best = c; bestScore = score; }
    }
    return bestScore >= 3 ? best : null;
  }

  /* ── Edit / Add Event modal ── */

        }
        set('ee-sport', sport);
        set('ee-airing', match.AIRING_TITLE || t);
        set('ee-date', formatDateForFilter(match.DATE) || p.event_date);
        set('ee-period', match.REPORT_PERIOD || getCurrentPeriod());
        set('ee-away', away);
        set('ee-home', home);
        set('ee-viewers', match.UNIQUE_VIEWERS || 0);
        set('ee-minutes', match.TOTAL_MINUTES || 0);
        set('ee-mpv', (match.MIN_PER_VIEWER || 0).toFixed(1));
      } else {
        if (banner) banner.style.display = 'none';
        set('ee-sport', sport);
        set('ee-airing', t);
        set('ee-date', p.event_date);
        set('ee-period', getCurrentPeriod());
        set('ee-away', away);
        set('ee-home', home);
        set('ee-viewers', 0);
        set('ee-minutes', 0);
        set('ee-mpv', '0.0');
      }
    } else {
      // Blank new event — pre-select sport if provided
      set('ee-sport', opts.sportName || 'NCAA Football');
      set('ee-airing', '');
      set('ee-date', new Date().toISOString().split('T')[0]);
      set('ee-period', getCurrentPeriod());
      set('ee-away', '');
      set('ee-home', '');
      set('ee-viewers', 0);
      set('ee-minutes', 0);

    document.getElementById('ee-err').style.display = 'none';

  }

    document.getElementById('eeOverlay').classList.remove('open');

  async function saveEditModal() {
    const errEl = document.getElementById('ee-err');
    errEl.style.display = 'none';
    const sport = document.getElementById('ee-sport').value.trim();
    const airing = document.getElementById('ee-airing').value.trim();
    const date = document.getElementById('ee-date').value;
    const away = document.getElementById('ee-away').value.trim();
    const home = document.getElementById('ee-home').value.trim();
    const viewers = parseFloat(document.getElementById('ee-viewers').value) || 0;
    const minutes = parseFloat(document.getElementById('ee-minutes').value) || 0;
    const mpv = parseFloat(document.getElementById('ee-mpv').value) || 0;
    const period = document.getElementById('ee-period').value.trim();
    if (!sport || !airing || !date) {
      errEl.textContent = 'Sport, Matchup, and Date are required';
      errEl.style.display = 'block';
      return;
    }
    const newRow = {
      SPORT: sport,
      AIRING_TITLE: airing,
      DATE: date,
      AWAY_TEAM: away,
      HOME_TEAM: home,
      UNIQUE_VIEWERS: Math.round(viewers),
      TOTAL_MINUTES: Math.round(minutes),
      MIN_PER_VIEWER: mpv,
      REPORT_PERIOD: period
    };

    let savedToDatabase = false;
    if (_db) {
      try {
        // If editing existing AND key fields changed, delete the old row first
        if (_editingEventRef && !_editingEventRef._placeholder) {
          const oldKey = {
            sport: _editingEventRef.SPORT || '',
            airing_title: _editingEventRef.AIRING_TITLE || '',
            event_date: String(_editingEventRef.DATE || '')
          };
          const newKey = { sport, airing_title: airing, event_date: date };
          if (oldKey.sport !== newKey.sport || oldKey.airing_title !== newKey.airing_title || oldKey.event_date !== newKey.event_date) {
            await _db.from('viewership_events').delete()
              .eq('sport', oldKey.sport).eq('airing_title', oldKey.airing_title).eq('event_date', oldKey.event_date);
          }
        }
        const { error } = await _db.from('viewership_events')
          .upsert([rowToDb(newRow)], { onConflict: 'sport,airing_title,event_date' });
        if (error) throw error;
        savedToDatabase = true;
      } catch (err) {
        console.error(err);
        errEl.textContent = 'Database save failed: ' + (err.message || err);
        errEl.style.display = 'block';
        return;
      }
    }

    // Update local state
    if (_editingEventRef) {
      const idx = rawData.indexOf(_editingEventRef);
      if (idx !== -1) {
        if (_editingEventRef._placeholder) {
          rawData.splice(idx, 1);
          rawData.push(newRow);
        } else {
          rawData[idx] = newRow;
        }
      }
    } else {
      rawData.push(newRow);
    }
    rawData = mergeProducedPlaceholders(rawData.filter(r => !r._placeholder));
    saveToStorage();
    closeEditModal();
    renderAllTabs();
    const verb = _editingEventRef ? 'updated' : 'added';
    updateStatus(
      savedToDatabase
        ? `☁️ Event ${verb} — saved to database`
        : `💻 Event ${verb} locally only — Supabase not connected`,
      savedToDatabase ? 'saved-cloud' : 'saved-local'
    );
    if (savedToDatabase) logActivity(verb === 'updated' ? 'edit' : 'add', `event:${sport}|${airing}|${date}`, `${airing} on ${date} (${viewers.toLocaleString()} viewers)`);
  }

  function escapeReconText(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function isProduced(r) {
    if (!_producedSet.size) return false;
    const d = formatDateForFilter(r.DATE);
    if (!d) return false;
    if (r.HOME_TEAM && _producedSet.has(`${d}|${canonCusa(r.HOME_TEAM)}`)) return true;
    if (r.AWAY_TEAM && _producedSet.has(`${d}|${canonCusa(r.AWAY_TEAM)}`)) return true;
    return false;
  }

  function activeData() {
    return _producedOnly ? rawData.filter(isProduced) : rawData;
  }

  function toggleProducedFilter() {
    if (!_producedSet.size) return;
    _producedOnly = !_producedOnly;
    localStorage.setItem('cusa_produced_only', _producedOnly);

  function getSchoolRankBySport(school, sportName) {
    const cusaSet = new Set(CUSA_SCHOOLS);
    const sportRows = activeData().filter(r => r.SPORT === sportName);
    const totals = {};
    sportRows.forEach(r => {
      [r.AWAY_TEAM, r.HOME_TEAM].filter(t => t && cusaSet.has(t)).forEach(t => {
        totals[t] = (totals[t] || 0) + (r.UNIQUE_VIEWERS || 0);
      });
    });
    const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]);
    const rank = sorted.findIndex(([t]) => t === school) + 1;
    return rank > 0 ? `#${rank} of ${sorted.length}` : '—';
  }

  let CUSA_SCHOOLS = [
    'Dallas Baptist','Delaware','Florida International','Jacksonville State','Kennesaw State',
    'Liberty','Louisiana Tech','Middle Tennessee','Missouri State','New Mexico State',
    'Sam Houston','UTEP','Western Kentucky'
  ];

  function setupEventListeners() {
    document.getElementById('fileInput').addEventListener('change', e => handleFileImport(e, false));
    document.getElementById('appendInput').addEventListener('change', e => handleFileImport(e, true));
    document.getElementById('prodInput').addEventListener('change', handleProductionTrackerImport);

    document.querySelector('.content').addEventListener('click', async (e) => {
      // ── In-tab Export buttons (rendered per sport) ──
      const exportBtn = e.target.closest('button[data-action="export-current"], button[data-action="export-all"]');
      if (exportBtn) {
        e.stopPropagation();
        if (exportBtn.dataset.action === 'export-current') exportCurrentTab();

      if (schoolBtn) {
        e.stopPropagation();
        if (schoolBtn.dataset.action === 'save-school')   return saveSchoolRow(schoolBtn);
        if (schoolBtn.dataset.action === 'remove-school') return removeSchoolRow(schoolBtn);
        if (schoolBtn.dataset.action === 'add-school')    return addNewSchool(schoolBtn);
      }

      const btn = e.target.closest('.row-edit-btn');
      if (!btn) return;
      e.stopPropagation();

      // ── Remove action ──
      if (btn.dataset.action === 'remove') {
        let prodKey = null;
        if (btn.dataset.reconEvent) {
          try {
            const ev = JSON.parse(btn.dataset.reconEvent);
            prodKey = { sport: ev.sport, school: ev.school, event_date: ev.event_date, home_team: ev.home_team || '', away_team: ev.away_team || '' };
          } catch (err) { console.error(err); return; }
        } else if (btn.dataset.rowIdx) {
          const row = rawData[+btn.dataset.rowIdx];
          if (row?._prodKey) prodKey = row._prodKey;
        }
        if (!prodKey) return;
        const label = `${prodKey.event_date} — ${prodKey.away_team || '?'} @ ${prodKey.home_team || '?'}`;
        if (!confirm(`Remove this event from the Production Tracker?\n\n${label}\n\nThis deletes the produced_events row and clears the scheduled placeholder.`)) return;
        btn.disabled = true;
        await removeProducedEvent(prodKey);
        return;
      }

      // ── Add New Event (manual, blank) ──
      if (btn.dataset.addSport) {
        openEditModal({ sportName: btn.dataset.addSport });
        return;
      }

      // ── Confirm (from reconciliation) ──
      if (btn.dataset.reconEvent) {
        try {
          const prod = JSON.parse(btn.dataset.reconEvent);
          openEditModal({ prodEvent: prod, sportName: btn.dataset.reconSport });
        } catch (err) { console.error(err); }
        return;
      }

      // ── Edit / Confirm (from sport tab row) ──
      if (btn.dataset.rowIdx) {
        const idx = +btn.dataset.rowIdx;
        const row = rawData[idx];
        if (!row) return;
        if (row._placeholder) {
          const k = row._prodKey || {};
          openEditModal({ prodEvent: { sport: k.sport || '', school: k.school || row.HOME_TEAM, event_date: k.event_date || row.DATE, home_team: k.home_team || row.HOME_TEAM, away_team: k.away_team || row.AWAY_TEAM }, sportName: row.SPORT });
        } else {
          openEditModal({ existingEvent: row });
        }
      }
    });
    document.querySelectorAll('.tab-bar button').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    document.getElementById('archiveBtn').addEventListener('click', archiveYearData);
    document.getElementById('saveBtn').addEventListener('click', saveData);
  }

  function handleFileImport(event, appendMode = false) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

        let headerRow = -1;
        for (let i = 0; i < jsonData.length; i++) {
          if (jsonData[i][0] === 'SPORT') { headerRow = i; break; }
        }
        if (headerRow === -1) { alert('Could not find header row with "SPORT" column'); return; }

        const headers = jsonData[headerRow];
        const newData = jsonData.slice(headerRow + 1).filter(row => row[0]).map(row => {
          const obj = {};
          headers.forEach((h, i) => { obj[h] = row[i]; });
          return obj;
        });

        if (appendMode) {
          const existingReal = rawData.filter(r => !r._placeholder);
          const result = mergeData(existingReal, newData);
          rawData = mergeProducedPlaceholders(result.data);
          saveToStorage();
          updateStatus('Syncing to database…');
          const ok = await saveToSupabase();
          renderAllTabs();
          updateStatus(
            ok
              ? `☁️ Added ${result.added} new events — synced to database (${result.duplicates} duplicates skipped)`
              : `💻 Added ${result.added} new events — saved locally (${result.duplicates} duplicates skipped)`,
            ok ? 'saved-cloud' : 'saved-local'
          );
        } else {
          rawData = mergeProducedPlaceholders(newData);
          saveToStorage();
          updateStatus('Syncing to database…');
          const ok = await saveToSupabase();
          renderAllTabs();
          const realCount = rawData.filter(r => !r._placeholder).length;
          updateStatus(
            ok ? `☁️ Loaded ${realCount} events — synced to database` : `💻 Loaded ${realCount} events — saved locally`,
            ok ? 'saved-cloud' : 'saved-local'
          );
        }
        event.target.value = '';
      } catch (err) { alert('Error reading file: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  }

  function mergeData(existing, newData) {
    const getKey = r => `${r.SPORT}|${r.AIRING_TITLE}|${r.DATE}`;
    const keys = new Set(existing.map(getKey));
    let added = 0, duplicates = 0;
    newData.forEach(r => {
      const k = getKey(r);
      if (!keys.has(k)) { existing.push(r); keys.add(k); added++; }
      else duplicates++;
    });
    return { data: existing, added, duplicates };
  }

  function saveToStorage() {
    try {
      const real = rawData.filter(r => !r._placeholder);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(real));
      const meta = { modified: new Date().toISOString(), period: getCurrentPeriod() };
      localStorage.setItem(META_KEY, JSON.stringify(meta));
      updateMetaBar(meta);
    } catch(e) {}
  }

  async function diagnoseDatabase() {
    const lines = [];
    const url = (window.SUPABASE_URL || '').replace(/^https?:\/\//, '');
    lines.push(`Project: ${url || '(not set)'}`);
    lines.push(`Anon key: ${window.SUPABASE_ANON_KEY ? '✓ set (' + window.SUPABASE_ANON_KEY.length + ' chars)' : '✗ missing'}`);
    if (!_db) {
      lines.push('_db client: ✗ not initialised');
      alert(lines.join('\n'));
      return;
    }
    lines.push('_db client: ✓ initialised');

    // Probe each table independently
    const tables = ['viewership_events', 'produced_events', 'schools', 'app_settings'];
    for (const t of tables) {
      try {
        const { data, error, count } = await _db.from(t).select('*', { count: 'exact', head: true });
        if (error) {
          lines.push(`${t}: ✗ ${error.code || ''} — ${error.message}`);
        } else {
          lines.push(`${t}: ✓ exists (${count ?? '?'} rows visible)`);
        }
      } catch (err) {
        lines.push(`${t}: ✗ ${err.message || err}`);
      }
    }
    console.log('DB diagnostics:\n' + lines.join('\n'));
    alert(lines.join('\n'));
  }

  async function saveData() {

    btn.textContent = '⏳ Saving…';

    // Produced-event add / confirm / remove and Production Tracker import all
    // write to Supabase individually as they happen, so Save All only needs
    // to flush viewership rows.
    const viewOk = await saveToSupabase();

    // Refresh Last Modified timestamp after the writes land
    let lastMod = null;
    try { lastMod = await loadLastModified(); } catch(e) {}
    updateMetaBar({ modified: lastMod, period: getCurrentPeriod() });

    btn.disabled = false;
    btn.textContent = '✓ Saved';

    updateStatus(
      viewOk
        ? `☁️ Saved to database — ${real.length} viewership events ✓`
        : `⚠ Save failed — ${real.length} viewership events ✗`,

  /* Archive the current athletic year: download a complete xlsx backup,
     then clear the database so the next year starts fresh. */
  async function archiveYearData() {
    const real = rawData.filter(r => !r._placeholder);
    if (!real.length) { alert('Nothing to archive — no viewership events loaded.'); return; }

    // Default the year label to the current US athletic year (Aug → Jul).
    const now = new Date();
    const startYr = now.getMonth() >= 7 ? now.getFullYear() : now.getFullYear() - 1;
    const defaultLabel = `${startYr}-${String((startYr + 1) % 100).padStart(2, '0')}`;

    const label = (prompt(
      `Archive ${real.length.toLocaleString()} viewership events?\n\n` +
      `Step 1 — An Excel backup downloads to your computer.\n` +
      `Step 2 — The database clears so you can start a new year.\n\n` +
      `Label this archive (e.g., 2024-25):`,
      defaultLabel
    ) || '').trim();
    if (!label) return;

    // Step 1: Download backup — bypass the CUSA-Produced-Only filter so the
    // archive captures every event in the database, and include per-period
    // tabs alongside the standard sport / championships / shows aggregates.
    const wasProducedOnly = _producedOnly;
    if (wasProducedOnly) _producedOnly = false;
    try {
      exportAllData(`CUSA_Viewership_Archive_${label}.xlsx`, { byPeriod: true });
    } finally {
      _producedOnly = wasProducedOnly;
    }

    // Step 2: Confirm before destroying
    if (!confirm(
      `✓ Backup downloaded as CUSA_Viewership_Archive_${label}.xlsx\n\n` +
      `Keep that file safe — it is the only copy.\n\n` +
      `Click OK to clear the database and start a new athletic year.`
    )) {
      updateStatus(`📦 Backup downloaded — database NOT cleared`, 'saved-local');
      return;
    }

    const dbOk = await clearSupabase();
    if (!dbOk) {
      updateStatus(`⚠ Backup downloaded but database clear failed — try Diagnose DB`, 'saved-local');
      return;
    }
    rawData = mergeProducedPlaceholders([]);
    localStorage.removeItem(STORAGE_KEY);
    renderAllTabs();
    updateMetaBar({ modified: null, period: null });
    updateStatus(`📦 Archived ${real.length.toLocaleString()} events as ${label} — database cleared`, 'saved-cloud');
    logActivity('archive', `period:${label}`, `Archived ${real.length} viewership events as ${label}`);
  }

    const schoolData = activeData().filter(r => r.AWAY_TEAM === school || r.HOME_TEAM === school)
      .sort((a,b) => parseDateForSort(a.DATE) - parseDateForSort(b.DATE));

    if (!schoolData.length) {
      document.getElementById('schoolResults').innerHTML = `<div class="empty-state"><h3>No events found for ${school}</h3></div>`;

      .sort((a,b) => parseDateForSort(a.DATE) - parseDateForSort(b.DATE));

    if (minMinViewer) data = data.filter(r => (r.MIN_PER_VIEWER||0) >= minMinViewer);

  function exportSchoolData() {
    const school = document.getElementById('schoolSelect').value;
    if (!school) { alert('Please select a school and search first'); return; }
    const schoolData = activeData().filter(r => r.AWAY_TEAM === school || r.HOME_TEAM === school)
      .sort((a,b) => parseDateForSort(a.DATE) - parseDateForSort(b.DATE));
    if (!schoolData.length) { alert('No data to export'); return; }
    const ws = XLSX.utils.json_to_sheet(schoolData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, school.substring(0,30));
    XLSX.writeFile(wb, `CUSA_${school.replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.xlsx`);
    updateStatus(`Exported ${schoolData.length} events for ${school}`);
  }

  function filterShows() {
    const isShow = r => { const t=(r.AIRING_TITLE||'').toLowerCase(); return t.includes('kickoff')||t.includes('tip off'); };
    const name = document.getElementById('shows-filter-show').value.toLowerCase().trim();
    const sport = document.getElementById('shows-filter-sport').value;
    const date = document.getElementById('shows-filter-date').value;
    const period = document.getElementById('shows-filter-period').value;
    const minV = parseFloat(document.getElementById('shows-filter-viewers').value) || 0;
    const minTotalMin = parseFloat(document.getElementById('shows-filter-totalmin').value) || 0;
    const minMinViewer = parseFloat(document.getElementById('shows-filter-minviewer').value) || 0;
    let shows = activeData().filter(isShow).sort((a,b) => parseDateForSort(a.DATE) - parseDateForSort(b.DATE));
    if (name) shows = shows.filter(g => (g.AIRING_TITLE||'').toLowerCase().includes(name));
    if (sport) shows = shows.filter(g => g.SPORT === sport);
    if (date) shows = shows.filter(g => formatDateForFilter(g.DATE) === date);
    if (period) shows = shows.filter(g => g.REPORT_PERIOD === period);
    if (minV) shows = shows.filter(g => (g.UNIQUE_VIEWERS||0) >= minV);
    if (minTotalMin) shows = shows.filter(g => (g.TOTAL_MINUTES||0) >= minTotalMin);
    if (minMinViewer) shows = shows.filter(g => (g.MIN_PER_VIEWER||0) >= minMinViewer);
    const total = activeData().filter(isShow).length;
    const el = document.getElementById('shows-table');
    if (!shows.length) { el.innerHTML = `<div class="empty-state"><h3>No shows match your filter</h3></div>`; return; }
    el.innerHTML = `
      <div class="table-container">
        <table><thead><tr><th>#</th><th>Show</th><th>Sport</th><th>Date</th><th>Unique Viewers</th><th>Min/Viewer</th><th>Report Period</th></tr></thead>
        <tbody>${shows.map((g,i) => `<tr><td class="rank">${i+1}</td><td>${g.AIRING_TITLE||'-'}</td><td>${g.SPORT||'-'}</td>
          <td>${formatDate(g.DATE)}</td><td class="number">${(g.UNIQUE_VIEWERS||0).toLocaleString()}</td>
          <td class="number">${(g.MIN_PER_VIEWER||0).toFixed(1)}</td><td>${g.REPORT_PERIOD||'-'}</td></tr>`).join('')}
        </tbody></table>
        ${shows.length < total ? `<p style="padding:10px 12px;font-size:12px;color:#666;">Showing ${shows.length} of ${total} shows</p>` : ''}
      </div>`;
  }
