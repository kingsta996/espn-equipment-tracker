<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUSA ESPN Campus Survey — Production Compliance</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js" onerror="console.warn('config.js not found — running in offline mode')"></script>
<style>
  :root {
    --navy: #00263A;
    --gray: #BFCED6;
    --white: #FFFFFF;
    --red: #E40046;
    --blue: #00B5E2;
    --green: #A7D500;
    --espn-red: #EF4035;
    --pass-bg: #dcfce7;
    --pass-fg: #15803d;
    --fail-bg: #fee2e2;
    --fail-fg: #991b1b;
    --warn-bg: #fef3c7;
    --warn-fg: #92400e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    color: #222;
  }
  .header {
    background: var(--navy);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header img {
    height: 28px;
    filter: brightness(0) invert(1);
  }
  .header h1 {
    color: var(--white);
    font-size: 18px;
    margin: 0;
    flex: 1;
    font-weight: 700;
  }
  .header .subtitle { color: var(--gray); font-size: 12px; }
  .tab-bar {
    background: var(--white);
    border-bottom: 3px solid var(--espn-red);
    display: flex;
    overflow-x: auto;
  }
  .tab-bar button {
    padding: 12px 24px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    background: transparent;
    color: var(--navy);
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: inherit;
  }
  .tab-bar button.active {
    background: var(--espn-red);
    color: var(--white);
    border-bottom-color: var(--navy);
  }
  .tab-bar button:hover:not(.active) {
    background: #f5f5f5;
  }
  .content {
    padding: 20px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  h2 {
    color: var(--navy);
    margin: 0;
    font-size: 20px;
  }
  .section-title { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .section-title img { height: 22px; }
  .muted { color: #666; font-size: 12px; margin: 0 0 16px; }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
    background: var(--white);
  }
  th {
    padding: 8px 10px;
    font-size: 11px;
    font-weight: 700;
    border-bottom: 2px solid var(--navy);
    text-align: left;
    white-space: nowrap;
    background: var(--gray);
    color: var(--navy);
  }
  th.school-col { background: var(--navy); color: var(--white); text-align: center; min-width: 110px; position: relative; }
  th.school-col.recently-updated {
    background: linear-gradient(180deg, var(--navy) 0%, #15405b 100%);
    box-shadow: inset 0 -4px 0 var(--green);
  }
  th.school-col.recently-updated::after {
    content: '●';
    position: absolute;
    top: 4px;
    right: 8px;
    color: var(--green);
    font-size: 12px;
    line-height: 1;
    text-shadow: 0 0 4px rgba(167,213,0,0.6);
  }
  .mark-toggle {
    display: inline-block;
    margin-top: 8px;
    padding: 5px 10px;
    border: 1px solid var(--gray);
    border-radius: 5px;
    font-size: 10px;
    font-weight: 700;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    cursor: pointer;
    background: #fff;
    color: var(--navy);
    transition: all 0.15s;
  }
  .mark-toggle:hover { background: #f3f6f9; border-color: var(--blue); }
  .mark-toggle.on { background: var(--green); color: var(--navy); border-color: var(--green); }
  .mark-toggle.on:hover { background: #b8e510; }
  .mark-toggle:disabled { opacity: 0.5; cursor: not-allowed; }
  .school-card.active .mark-toggle { background: rgba(255,255,255,0.12); color: var(--white); border-color: rgba(255,255,255,0.35); }
  .school-card.active .mark-toggle:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.6); }
  .school-card.active .mark-toggle.on { background: var(--green); color: var(--navy); border-color: var(--green); }
  .mark-meta { font-size: 10px; color: var(--gray); margin-top: 4px; }
  .school-card.active .mark-meta { color: rgba(255,255,255,0.65); }
  td { padding: 6px 10px; border-bottom: 1px solid #eee; }
  tr:nth-child(even) td { background: #fafafa; }
  td.label { font-weight: 600; color: var(--navy); }
  td.status-pass { background: var(--pass-bg) !important; color: var(--pass-fg); font-weight: 700; text-align: center; }
  td.status-fail { background: var(--fail-bg) !important; color: var(--fail-fg); font-weight: 700; text-align: center; }
  td.status-warn { background: var(--warn-bg) !important; color: var(--warn-fg); font-weight: 700; text-align: center; }
  td.total-row { font-weight: 800; font-size: 14px; }
  .table-wrap { overflow-x: auto; }
  .card {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--gray);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .card-header {
    background: var(--navy);
    color: var(--white);
    padding: 10px 16px;
    font-weight: 700;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-header.red { background: var(--espn-red); }
  .card-header.red img { height: 16px; filter: brightness(0) invert(1); margin-right: 10px; }
  .lens-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: #eee;
  }
  .lens-item {
    padding: 10px 14px;
    font-size: 11px;
  }
  .lens-item .school { font-weight: 700; color: var(--navy); margin-bottom: 2px; }
  .ref-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .ref-row { display: flex; border-bottom: 1px solid #eee; }
  .ref-row .k { width: 140px; padding: 8px 12px; font-weight: 600; font-size: 12px; color: var(--navy); background: #f8f9fa; flex-shrink: 0; }
  .ref-row .v { padding: 8px 12px; font-size: 12px; color: #333; flex: 1; }
  /* Editor */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .btn { padding: 8px 16px; color: var(--white); border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; font-family: inherit; }
  .btn.blue { background: var(--blue); }
  .btn.gray { background: #888; }
  .btn.red { background: var(--espn-red); }
  .school-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .school-card {
    padding: 12px 14px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid var(--gray);
    background: var(--white);
    color: var(--navy);
    transition: all 0.15s;
  }
  .school-card:hover { border-color: var(--blue); }
  .school-card.active { background: var(--navy); color: var(--white); border-color: var(--espn-red); }
  .school-card.is-marked-updated {
    border-color: #2f5500;
    box-shadow: 0 0 0 2px #2f5500 inset;
  }
  .school-card.is-marked-updated.active {
    border-color: #2f5500;
    box-shadow: 0 0 0 2px #2f5500 inset, 0 0 0 4px var(--espn-red);
  }
  .school-card .name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .school-card .stats { font-size: 11px; opacity: 0.7; }
  .editor-wrap {
    background: var(--white);
    border-radius: 8px;
    border: 2px solid var(--espn-red);
    overflow: hidden;
  }
  .editor-header {
    background: var(--espn-red);
    color: var(--white);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .editor-header span { font-weight: 700; font-size: 16px; }
  .editor-body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .editor-body { grid-template-columns: 1fr 1fr; } .ref-grid { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { .editor-body { grid-template-columns: 1fr; } }
  .field-section { margin-bottom: 12px; }
  .field-section-title {
    font-weight: 700;
    font-size: 12px;
    color: var(--navy);
    border-bottom: 2px solid var(--espn-red);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }
  .field { margin-bottom: 6px; }
  .field label { display: block; font-size: 10px; font-weight: 600; color: #666; margin-bottom: 2px; }
  .field input {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 12px;
    font-family: inherit;
  }
  .field input.below-min { border-color: var(--red); background: var(--fail-bg); }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .toggle {
    width: 36px;
    height: 20px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    background: #ccc;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--green); }
  .toggle .knob {
    width: 16px;
    height: 16px;
    border-radius: 8px;
    background: var(--white);
    position: absolute;
    top: 2px;
    left: 2px;
    transition: left 0.2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .toggle.on .knob { left: 18px; }
  .toggle-label { font-size: 11px; color: #444; }
  .sport-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .sport-chip {
    padding: 3px 8px;
    font-size: 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #ccc;
    background: #f5f5f5;
    color: #555;
    transition: all 0.15s;
  }
  .sport-chip.on { background: var(--blue); color: var(--white); border-color: var(--blue); }
  .empty-state { color: #888; font-size: 14px; text-align: center; padding: 40px; }
  .sport-school-header {
    background: var(--navy);
    color: var(--white);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sport-school-header .name { font-weight: 700; font-size: 14px; }
  .sport-school-header .inv { font-size: 11px; color: var(--gray); }
  .transmission-note {
    padding: 16px;
    font-size: 12px;
    line-height: 1.8;
    color: #333;
  }
  .transmission-note p { margin: 0 0 8px; }
  .transmission-note p:last-child { margin: 0; }
  .save-indicator {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    background: var(--green);
    color: var(--navy);
    border: 1px solid var(--green);
  }
  .save-indicator.show { opacity: 1; }
  .save-indicator.local { background: #fffbeb; color: #92400e; border-color: #f59e0b; }
</style>
</head>

<div class="header">
  <img id="header-logo" alt="ESPN">
  <h1>CUSA Campus Survey — Production Compliance Dashboard</h1>
  <div class="subtitle">2025–26 Standards</div>
  <a href="index.html" style="margin-left:auto;padding:6px 14px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;">← Hub</a>
</div>

<div class="tab-bar">

  <button class="tab-btn" data-tab="editor">School Editor</button>
  <button class="tab-btn" data-tab="audit">Audit Log</button>
</div>

<div class="content" id="content"></div>

// For other sports (Tennis, Track, etc.), we still use total cameras as there is no per-sport field.
function getCamerasForSport(school, sport) {
  const key = PER_SPORT_CAM_FIELDS[sport];
  if (key) return Number(school[key]) || 0;
  return Number(school.cameras) || 0;
}

function hasPerSportField(sport) {
  return !!PER_SPORT_CAM_FIELDS[sport];

function withinRecentWindow(iso) {
  if (!iso) return false;
  const t = new Date(iso).getTime();
  if (isNaN(t)) return false;
  const ageDays = (Date.now() - t) / 86400000;
  return ageDays >= 0 && ageDays <= RECENT_UPDATE_DAYS;
}
function isManuallyMarked(school) {
  return withinRecentWindow(school?.manually_marked_at);
}
function isAutoUpdated(school) {
  return withinRecentWindow(school?.updated_at);
}
function isRecentlyUpdated(school) {
  return isAutoUpdated(school) || isManuallyMarked(school);
}

function formatUpdatedDate(school) {
  const lines = [];
  if (school?.updated_at) {
    const d = new Date(school.updated_at);
    if (!isNaN(d.getTime())) lines.push('Last edit: ' + d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }));
  }
  if (school?.manually_marked_at) {
    const d = new Date(school.manually_marked_at);
    if (!isNaN(d.getTime())) lines.push('Admin marked: ' + d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }));
  }
  return lines.length ? lines.join('  •  ') : 'Never updated';
}

function loadSchools() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_SCHOOLS));
}

function saveSchools() {
  // Local-only fallback (no Supabase). Used when called outside the saveSchool flow.
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.schools));
    showSaved('local');
  } catch(e) {}
}

function showSaved(target) {
  // target: 'cloud' (default) → ☁️ Saved to database
  //         'local'           → 💻 Saved locally only (no database connection)
  const el = document.getElementById('save-indicator');
  if (target === 'local') {
    el.textContent = '💻 Saved locally only (offline)';
    el.classList.add('local');
  } else {
    el.textContent = '☁️ Saved to database ✓';
    el.classList.remove('local');
  }
  el.classList.add('show');
  clearTimeout(showSaved._t);
  showSaved._t = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ── Password protection ── */
async function hashPassword(pw) {
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function hasPasswordSet() {
  return !!localStorage.getItem(PW_HASH_KEY);
}

async function setPassword(pw) {
  const h = await hashPassword(pw);
  localStorage.setItem(PW_HASH_KEY, h);
}

async function verifyPassword(pw) {
  const stored = localStorage.getItem(PW_HASH_KEY);
  if (!stored) return false;
  const h = await hashPassword(pw);
  return h === stored;
}

function lockCompliance() {
  state.unlocked = false;
  state.espnAccess = false;
  localStorage.removeItem(UNLOCK_KEY);
  localStorage.removeItem(ESPNACCESS_KEY);
  state.isAdmin = false;
  state.authorizedSchoolEmail = null;
  state.editingIdx = null;
}

function unlockCompliance() {
  state.unlocked = true;
  localStorage.setItem(UNLOCK_KEY, 'true');
}

function unlockESPN() {
  state.espnAccess = true;
  localStorage.setItem(ESPNACCESS_KEY, 'true');
}

function clearPassword() {
  localStorage.removeItem(PW_HASH_KEY);
  lockCompliance();
}

function seedDefaultPassword() {
  if (!localStorage.getItem(PW_HASH_KEY)) {
    localStorage.setItem(PW_HASH_KEY, DEFAULT_PW_HASH);
  }
}

async function saveSchool(school) {
  school.updatedBy = state.isAdmin ? ADMIN_EMAIL : (state.authorizedSchoolEmail || null);
  if (_db) {
    let result;
    const row = toDbRow(school);
    // Never let a general save overwrite an existing pw_hash with null
    if (!row.pw_hash) delete row.pw_hash;
    if (school.id) {
      result = await _db.from('schools').update(row).eq('id', school.id);
    } else {
      result = await _db.from('schools').insert(row).select('id').single();
      if (result.data?.id) school.id = result.data.id;
    }
    if (result.error) {
      console.error('Supabase save error:', result.error);
      showToast('⚠ Supabase save failed: ' + (result.error.message || result.error.code), true);
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.schools)); } catch(e) {}
      showSaved('local');
      return false;
    }
    showSaved('cloud');
    return true;
  } else {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.schools)); } catch(e) {}
    showSaved('local');
    return true;
  }
}

async function saveSchoolPassword(school) {
  if (!school.pw_hash) return false;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.schools)); } catch(e) {}
  if (!_db) {
    showToast('⚠ Supabase not connected — password saved locally only.', true);
    return false;
  }
  // If no ID in local state, look up by school name
  if (!school.id) {
    const { data } = await _db.from('schools').select('id').eq('name', school.name).single();
    if (data?.id) {
      school.id = data.id;
    } else {
      showToast('⚠ School "' + school.name + '" not found in Supabase. Make sure the seed SQL has been run.', true);
      return false;
    }
  }
  const result = await _db.from('schools')
    .update({ pw_hash: school.pw_hash })
    .eq('id', school.id)
    .select('id, pw_hash');
  if (result.error) {
    showToast('⚠ Password save failed: ' + (result.error.message || result.error.code), true);
    return false;
  }
  if (!result.data?.length) {
    showToast('⚠ Password save failed: school not found in Supabase.', true);
    return false;
  }
  return true;
}

function showToast(msg, isError = false) {
  let toast = document.getElementById('db-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'db-toast';
    toast.style.cssText = 'position:fixed;bottom:60px;right:20px;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:400;max-width:380px;word-break:break-word;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.background = isError ? '#991b1b' : 'var(--navy)';
  toast.style.color = '#fff';
  toast.style.display = 'block';
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { toast.style.display = 'none'; }, isError ? 6000 : 2000);
}

function setupRealtime() {
  if (!_db) return;
  _db.channel('schools-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'schools' }, payload => {
      if (payload.eventType === 'UPDATE' && payload.new) {
        const updated = fromDbRow(payload.new);
        const idx = state.schools.findIndex(s => s.id === updated.id);
        if (idx !== -1) {
          if (idx !== state.editingIdx) state.schools[idx] = updated;
        }
        render();
      } else if (payload.eventType === 'INSERT' && payload.new) {
        const exists = state.schools.find(s => s.id === payload.new.id);
        if (!exists) { state.schools.push(fromDbRow(payload.new)); render(); }
      } else if (payload.eventType === 'DELETE' && payload.old?.id) {
        state.schools = state.schools.filter(s => s.id !== payload.old.id);
        if (state.editingIdx !== null && state.schools[state.editingIdx]?.id === payload.old.id) {
          state.editingIdx = null;
        }
        render();
      }
    })
    .subscribe();
}

/* ── Helpers ── */
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function checkStatus(school, check) {
  const val = school[check.key];
  if (check.bool) return { pass: val === true, display: val ? "Yes" : "No" };
  return { pass: Number(val) >= check.min, display: String(val) };
}

function countPassing(school) {
  return EQUIP_CHECKS.reduce((n, c) => n + (checkStatus(school, c).pass ? 1 : 0), 0);
}

/* ── Rendering ── */
function render() {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.activeTab);
  });
  const content = document.getElementById('content');
  if (state.activeTab === 'compliance') {
    content.innerHTML = renderCompliance();
    wireCompliance();
  }
  else if (state.activeTab === 'sports') {
    content.innerHTML = renderSports();
    wireCompliance();
  }
  else if (state.activeTab === 'reference') content.innerHTML = renderReference();
  else if (state.activeTab === 'editor') {
    content.innerHTML = renderEditor();
    wireEditor();
  }
  else if (state.activeTab === 'audit') {
    content.innerHTML = renderAuditLog();
    wireAuditLog();
  }
}

function wireCompliance() {
  // Protected tab gate — Admin and ESPN toggle panels
  document.getElementById('gate-admin-btn')?.addEventListener('click', () => {
    document.getElementById('gate-admin-form').style.display = 'block';
    document.getElementById('gate-espn-form').style.display = 'none';

    document.getElementById('gate-admin-form').style.display = 'none';
    document.getElementById('gate-espn-pw')?.focus();
  });
  const adminGateSubmit = async () => {
    const pw = document.getElementById('gate-admin-pw')?.value || '';
    const err = document.getElementById('gate-admin-err');
    const ok = await verifyPassword(pw);
    if (ok) { unlockCompliance(); state.isAdmin = true; render(); }
    else { err.textContent = 'Incorrect admin password.'; err.style.display = 'block'; document.getElementById('gate-admin-pw').value = ''; }
  };
  document.getElementById('gate-admin-submit')?.addEventListener('click', adminGateSubmit);
  document.getElementById('gate-admin-pw')?.addEventListener('keydown', e => { if (e.key === 'Enter') adminGateSubmit(); });
  const espnGateSubmit = async () => {
    const pw = document.getElementById('gate-espn-pw')?.value || '';
    const err = document.getElementById('gate-espn-err');
    const h = await hashPassword(pw);
    if (h === ESPN_PW_HASH) { unlockESPN(); render(); }
    else { err.textContent = 'Incorrect ESPN password.'; err.style.display = 'block'; document.getElementById('gate-espn-pw').value = ''; }
  };
  document.getElementById('gate-espn-submit')?.addEventListener('click', espnGateSubmit);
  document.getElementById('gate-espn-pw')?.addEventListener('keydown', e => { if (e.key === 'Enter') espnGateSubmit(); });

  // Setup password flow
  const setupBtn = document.getElementById('pw-setup-submit');
  if (setupBtn) {
    const submit = async () => {
      const pw1 = document.getElementById('pw-new').value;
      const pw2 = document.getElementById('pw-confirm').value;
      const err = document.getElementById('pw-error');
      if (!pw1 || pw1.length < 4) {
        err.textContent = 'Password must be at least 4 characters.';
        err.style.display = 'block'; return;
      }
      if (pw1 !== pw2) {
        err.textContent = 'Passwords do not match.';
        err.style.display = 'block'; return;
      }
      await setPassword(pw1);
      unlockCompliance();
      if (state.pendingEditIdx !== null) {
        state.editingIdx = state.pendingEditIdx;
        state.pendingEditIdx = null;
      }
      render();
    };
    setupBtn.addEventListener('click', submit);
    ['pw-new','pw-confirm'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    });
    document.getElementById('pw-new').focus();
  }

  // Enter password / sign-in flow
  const submitBtn = document.getElementById('pw-submit');
  if (submitBtn) {
    const isEditorGate = state.pendingEditIdx !== null;
    const submit = async () => {
      const pw = document.getElementById('pw-enter').value;
      const err = document.getElementById('pw-error');

      if (isEditorGate) {
        // School login — verify email matches this school, then check school's pw_hash
        const email = document.getElementById('pw-email')?.value?.trim().toLowerCase() || '';
        const schoolToEdit = state.schools[state.pendingEditIdx];
        const schoolEmail = (schoolToEdit?.auth_email || '').toLowerCase();
        if (!email) { err.textContent = 'Enter your school email address.'; err.style.display = 'block'; return; }
        if (!pw) { err.textContent = 'Enter your password.'; err.style.display = 'block'; return; }
        if (email !== schoolEmail) {
          err.textContent = `${email} is not authorized to edit ${schoolToEdit?.name || 'this school'}.`;
          err.style.display = 'block'; return;
        }
        if (!schoolToEdit.pw_hash) {
          err.textContent = 'No password set for this school. Contact kking@conferenceusa.com.';
          err.style.display = 'block'; return;
        }
        const h = await hashPassword(pw);
        if (h === schoolToEdit.pw_hash) {
          state.authorizedSchoolEmail = email;
          state.editingIdx = state.pendingEditIdx;
          state.pendingEditIdx = null;
          render();
        } else {
          err.textContent = 'Incorrect password.';
          err.style.display = 'block';
          document.getElementById('pw-enter').value = '';
        }
      } else {
        // SHA-256 gate for compliance/sports tabs
        const ok = await verifyPassword(pw);
        if (ok) {
          unlockCompliance();
          render();
        } else {
          err.textContent = 'Incorrect password.';
          err.style.display = 'block';
          document.getElementById('pw-enter').value = '';

    document.getElementById('pw-admin-btn')?.addEventListener('click', () => {

      document.getElementById('pw-espn-panel').style.display = 'none';

      document.getElementById('pw-espn-panel').style.display = 'block';
      document.getElementById('pw-admin-panel').style.display = 'none';
      document.getElementById('pw-espn-pw')?.focus();
    });
    const espnEditSubmit = async () => {
      const pw = document.getElementById('pw-espn-pw')?.value || '';
      const err = document.getElementById('pw-espn-err');
      const h = await hashPassword(pw);
      if (h === ESPN_PW_HASH) {
        unlockESPN();
        state.editingIdx = state.pendingEditIdx;
        state.pendingEditIdx = null;
        render();
      } else {
        err.textContent = 'Incorrect ESPN password.';
        err.style.display = 'block';
        document.getElementById('pw-espn-pw').value = '';
      }
    };
    document.getElementById('pw-espn-submit')?.addEventListener('click', espnEditSubmit);
    document.getElementById('pw-espn-pw')?.addEventListener('keydown', e => { if (e.key === 'Enter') espnEditSubmit(); });
  }

  // Unlocked footer buttons
  document.getElementById('lock-now')?.addEventListener('click', () => {
    lockCompliance();
    render();
  });
  document.getElementById('change-pw')?.addEventListener('click', () => {
    if (!confirm('Clear the current password and set a new one?')) return;
    clearPassword();
    render();
  });
  document.getElementById('export-xlsx')?.addEventListener('click', exportCompliance);
  document.getElementById('toggle-highlight')?.addEventListener('click', () => {
    state.highlightUpdated = !state.highlightUpdated;
    localStorage.setItem(HIGHLIGHT_UPDATED_KEY, state.highlightUpdated);
    render();
  });
}

function exportCompliance() {
  if (typeof XLSX === 'undefined') {
    alert('Excel export library failed to load. Please check your internet connection and refresh.');
    return;
  }
  const schools = state.schools;
  const today = new Date().toISOString().slice(0,10);

  // Style helpers
  const navyFill = {patternType:'solid', fgColor:{rgb:'00263A'}};
  const espnRedFill = {patternType:'solid', fgColor:{rgb:'EF4035'}};
  const grayFill = {patternType:'solid', fgColor:{rgb:'BFCED6'}};
  const passFill = {patternType:'solid', fgColor:{rgb:'C6EFCE'}};
  const failFill = {patternType:'solid', fgColor:{rgb:'FFC7CE'}};
  const warnFill = {patternType:'solid', fgColor:{rgb:'FFEB9C'}};
  const whiteText = {color:{rgb:'FFFFFF'}, bold:true, name:'Arial', sz:11};
  const navyText = {color:{rgb:'00263A'}, bold:true, name:'Arial', sz:10};
  const passText = {color:{rgb:'006100'}, bold:true, name:'Arial', sz:10};
  const failText = {color:{rgb:'9C0006'}, bold:true, name:'Arial', sz:10};
  const warnText = {color:{rgb:'9C5700'}, bold:true, name:'Arial', sz:10};
  const normalText = {name:'Arial', sz:10};
  const border = {
    top:{style:'thin',color:{rgb:'CCCCCC'}}, bottom:{style:'thin',color:{rgb:'CCCCCC'}},
    left:{style:'thin',color:{rgb:'CCCCCC'}}, right:{style:'thin',color:{rgb:'CCCCCC'}}
  };
  const cellCenter = {alignment:{horizontal:'center', vertical:'center', wrapText:true}, border};
  const cellLeft = {alignment:{horizontal:'left', vertical:'center', wrapText:true}, border};

  const mkCell = (v, style={}) => ({v: v == null ? '' : v, t:'s', s:{...style, border}});
  const mkNum = (v, style={}) => ({v: Number(v) || 0, t:'n', s:{...style, border}});

  // Build rows
  const rows = [];

  // Title row (row 0)
  rows.push([{v:`ESPN 2025-26 EQUIPMENT COMPLIANCE DASHBOARD — Exported ${today}`, t:'s',
    s:{fill:espnRedFill, font:{...whiteText, sz:14}, alignment:{horizontal:'center'}, border}}]);
  // Spacer
  rows.push([{v:'', s:{border}}]);

  // Header row
  const headerRow = [mkCell('ESPN Minimum Requirement', {fill:navyFill, font:whiteText, alignment:{horizontal:'center', wrapText:true}})];
  schools.forEach(s => headerRow.push(mkCell(s.name, {fill:navyFill, font:whiteText, alignment:{horizontal:'center', wrapText:true}})));
  rows.push(headerRow);

  // Check rows
  EQUIP_CHECKS.forEach(check => {
    const labelText = check.bool ? check.label : `${check.label} (≥${check.min})`;
    const row = [mkCell(labelText, {fill:grayFill, font:navyText, alignment:{horizontal:'left', wrapText:true}})];
    schools.forEach(s => {
      const st = checkStatus(s, check);
      const style = st.pass
        ? {fill:passFill, font:passText, alignment:{horizontal:'center'}}
        : {fill:failFill, font:failText, alignment:{horizontal:'center'}};
      row.push(check.bool ? mkCell(st.display, style) : mkNum(Number(st.display), style));
    });
    rows.push(row);
  });

  // Total passing row
  const totalRow = [mkCell(`TOTAL PASSING (of ${EQUIP_CHECKS.length})`, {fill:grayFill, font:{...navyText, sz:11}, alignment:{horizontal:'left'}})];
  schools.forEach(s => {
    const n = countPassing(s);
    let style;
    if (n >= 12) style = {fill:passFill, font:{...passText, sz:12}, alignment:{horizontal:'center'}};
    else if (n >= 9) style = {fill:warnFill, font:{...warnText, sz:12}, alignment:{horizontal:'center'}};
    else style = {fill:failFill, font:{...failText, sz:12}, alignment:{horizontal:'center'}};
    totalRow.push(mkCell(`${n}/${EQUIP_CHECKS.length}`, style));
  });
  rows.push(totalRow);

  // Spacer
  rows.push([{v:'', s:{}}]);

  // Lens detail section
  const lensHeader = [mkCell('LENS DETAIL (40x+ Requirement)', {fill:navyFill, font:whiteText, alignment:{horizontal:'center'}})];
  schools.forEach(() => lensHeader.push({v:'', s:{fill:navyFill, border}}));
  rows.push(lensHeader);

  const lensRow = [mkCell('Longest Lens Available', {fill:grayFill, font:navyText, alignment:{horizontal:'left'}})];
  schools.forEach(s => {
    const style = s.has40xLens
      ? {fill:passFill, font:{...normalText, color:{rgb:'006100'}}, alignment:{horizontal:'center', wrapText:true}}
      : {fill:failFill, font:{...normalText, color:{rgb:'9C0006'}}, alignment:{horizontal:'center', wrapText:true}};
    lensRow.push(mkCell(s.lensDetail || 'Not specified', style));
  });
  rows.push(lensRow);

  // Build worksheet
  const ws = XLSX.utils.aoa_to_sheet(rows.map(r => r.map(c => c.v)));

  // Apply styles
  rows.forEach((row, rIdx) => {
    row.forEach((cell, cIdx) => {
      const addr = XLSX.utils.encode_cell({r: rIdx, c: cIdx});
      if (ws[addr]) {
        ws[addr].s = cell.s;
        if (cell.t) ws[addr].t = cell.t;
      } else if (cell.v !== undefined && cell.v !== '') {
        ws[addr] = {v: cell.v, t: cell.t || 's', s: cell.s};
      }
    });
  });

  // Merge title row across all columns
  ws['!merges'] = [{s:{r:0,c:0}, e:{r:0,c:schools.length}}];
  // Merge lens header row
  const lensHdrRow = 3 + EQUIP_CHECKS.length + 2; // title + spacer + header + checks + total + spacer
  ws['!merges'].push({s:{r:lensHdrRow,c:0}, e:{r:lensHdrRow,c:schools.length}});

  // Column widths
  ws['!cols'] = [{wch:30}].concat(schools.map(() => ({wch:18})));
  // Row heights
  ws['!rows'] = [{hpt:24}, {hpt:8}, {hpt:36}]; // title, spacer, header
  for (let i = 0; i < EQUIP_CHECKS.length; i++) ws['!rows'].push({hpt:20});
  ws['!rows'].push({hpt:26}); // total
  ws['!rows'].push({hpt:8}); // spacer
  ws['!rows'].push({hpt:24}); // lens header
  ws['!rows'].push({hpt:44}); // lens detail

  // Build reference sheet
  const refRows = [
    [{v:'ESPN 2025-26 MINIMUM PRODUCTION STANDARDS', s:{fill:espnRedFill, font:{...whiteText, sz:13}, alignment:{horizontal:'center'}, border}}],
    [{v:''}],
    [{v:'GENERAL EQUIPMENT MINIMUMS', s:{fill:navyFill, font:whiteText, alignment:{horizontal:'center'}, border}}],
    ['Video Switcher','10 inputs, 2 keyers, 1 ME, 8 aux buses'],
    ['Resolution','720p or 1080i / 59.4 fps minimum'],
    ['Cameras','Min 4 w/ operator; 3 w/ ≥14x4.3 lens; 1 w/ ≥40x + extender'],
    ['Graphics','ESPN insert look — Ross XPression, Viz RT, or AJT'],
    ['Replay','Min 1 DVR unit, 4 input / 2 output'],
    ['Intercom','10–16 channels'],
    ['Audio Console','24 inputs, 8 sub mixers, 2 outputs'],
    ['Transmission','Haivision IP Encoder or LTN'],
    [{v:''}],
    [{v:'MINIMUM SPECS PER SPORT', s:{fill:navyFill, font:whiteText, alignment:{horizontal:'center'}, border}}],
    ['Sport','Min Cameras','Min Replay','Commentary','Graphics']
  ];
  Object.entries(SPORT_MINS).filter(([k]) => !["Ice Hockey","Swimming and Diving","Track and Field"].includes(k)).forEach(([sport, m]) => {
    refRows.push([sport, m.cam, m.rep, m.comm, m.gfx]);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(refRows.map(r => r.map(c => (c && typeof c === 'object' && 'v' in c) ? c.v : c)));
  ws2['!cols'] = [{wch:22},{wch:16},{wch:14},{wch:16},{wch:22}];
  ws2['!merges'] = [{s:{r:0,c:0},e:{r:0,c:4}}, {s:{r:2,c:0},e:{r:2,c:4}}, {s:{r:12,c:0},e:{r:12,c:4}}];

  // Create workbook
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Equipment Compliance');
  XLSX.utils.book_append_sheet(wb, ws2, 'ESPN Standards');

  // Write file
  const filename = `CUSA_ESPN_Compliance_${today}.xlsx`;
  XLSX.writeFile(wb, filename);
}

function exportSchoolEditor() {
  if (typeof XLSX === 'undefined') {
    alert('Excel export library failed to load. Please check your internet connection and refresh.');
    return;
  }
  if (!state.isAdmin) { alert('Admin only.'); return; }

  const schools = (state.schools || []).slice().sort((a,b) =>
    String(a.name||'').localeCompare(String(b.name||''))
  );
  const today = new Date().toISOString().slice(0,10);
  const yes = v => v ? 'Yes' : 'No';
  const dt  = v => v ? new Date(v).toLocaleString() : '';

  // Field order = how they appear in the editor, grouped by section.
  const FIELDS = [
    { key:'name',                label:'School' },
    { key:'conference',          label:'Conference' },
    { key:'auth_email',          label:'Contact Email' },
    { key:'sports',              label:'Sports',                  transform: v => Array.isArray(v) ? v.join(', ') : '' },

    { key:'swModel',             label:'Switcher Model' },
    { key:'swInputs',            label:'Switcher Inputs' },
    { key:'swKeyers',            label:'Switcher Keyers' },
    { key:'swMEs',               label:'Switcher MEs' },

    { key:'cameras',             label:'Total Cameras' },
    { key:'cameraModels',        label:'Camera Models' },
    { key:'cam_football',        label:'Cameras (Football)' },
    { key:'cam_basketball',      label:'Cameras (Basketball)' },
    { key:'cam_volleyball',      label:'Cameras (Volleyball)' },
    { key:'cam_soccer',          label:'Cameras (Soccer)' },
    { key:'cam_baseball',        label:'Cameras (Baseball)' },
    { key:'cam_softball',        label:'Cameras (Softball)' },

    { key:'has40xLens',          label:'Has 40x+ Lens',           transform: yes },
    { key:'lensDetail',          label:'Lens Detail' },
    { key:'has14xLens',          label:'Has 14x Lens',            transform: yes },

    { key:'replayModel',         label:'Replay Model' },
    { key:'replayUnits',         label:'Replay Units' },
    { key:'replayInputs',        label:'Replay Inputs' },
    { key:'replayOutputs',       label:'Replay Outputs' },

    { key:'audioModel',          label:'Audio Console' },
    { key:'audioInputs',         label:'Audio Inputs' },
    { key:'audioOutputs',        label:'Audio Outputs' },
    { key:'audioFaders',         label:'Audio Faders' },

    { key:'intercomModel',       label:'Intercom Model' },
    { key:'intercomCh',          label:'Intercom Channels' },

    { key:'gfxModel',            label:'Graphics Model' },
    { key:'gfxChannels',         label:'Graphics Channels' },
    { key:'gfxApproved',         label:'Graphics ESPN-Approved',  transform: yes },

    { key:'txDigital',           label:'Transmission' },
    { key:'txApproved',          label:'Transmission ESPN-Approved', transform: yes },
    { key:'backupPower',         label:'Backup Power',            transform: yes },

    { key:'mvSources',           label:'MV Sources' },
    { key:'mvSoftware',          label:'MV Software' },

    { key:'updated_at',          label:'Last Auto-Updated',       transform: dt },
    { key:'manually_marked_at',  label:'Last Marked Updated',     transform: dt }
  ];

  // Style helpers (match exportCompliance for consistency)
  const navyFill = {patternType:'solid', fgColor:{rgb:'00263A'}};
  const espnRedFill = {patternType:'solid', fgColor:{rgb:'EF4035'}};
  const headerFont = {color:{rgb:'FFFFFF'}, bold:true, name:'Arial', sz:11};
  const titleFont  = {color:{rgb:'FFFFFF'}, bold:true, name:'Arial', sz:14};
  const cellFont   = {name:'Arial', sz:10};
  const border = {
    top:{style:'thin',color:{rgb:'CCCCCC'}}, bottom:{style:'thin',color:{rgb:'CCCCCC'}},
    left:{style:'thin',color:{rgb:'CCCCCC'}}, right:{style:'thin',color:{rgb:'CCCCCC'}}
  };

  // Build the rows: title, spacer, header, one row per school
  const titleRow  = [{ v:`CUSA SCHOOL EDITOR — DATA EXPORT — ${today}`, t:'s',
                       s:{fill:espnRedFill, font:titleFont, alignment:{horizontal:'center'}, border} }];
  const spacerRow = [{ v:'', s:{} }];
  const headerRow = FIELDS.map(f => ({ v:f.label, t:'s',
                       s:{fill:navyFill, font:headerFont, alignment:{horizontal:'center', wrapText:true}, border} }));
  const dataRows  = schools.map(s => FIELDS.map(f => {
    const raw = s[f.key];
    const out = f.transform ? f.transform(raw) : (raw == null ? '' : raw);
    const isNum = typeof out === 'number' && Number.isFinite(out);
    return { v: out, t: isNum ? 'n' : 's',
             s: {font: cellFont, alignment: {horizontal: isNum ? 'center' : 'left', wrapText:true}, border} };
  }));

  const rows = [titleRow, spacerRow, headerRow, ...dataRows];

  // Build worksheet
  const ws = XLSX.utils.aoa_to_sheet(rows.map(r => r.map(c => c.v)));
  rows.forEach((row, rIdx) => {
    row.forEach((cell, cIdx) => {
      const addr = XLSX.utils.encode_cell({r: rIdx, c: cIdx});
      if (ws[addr]) {
        if (cell.s) ws[addr].s = cell.s;
        if (cell.t) ws[addr].t = cell.t;
      } else if (cell.v !== undefined && cell.v !== '') {
        ws[addr] = {v: cell.v, t: cell.t || 's', s: cell.s};
      }
    });
  });

  // Merge title row across every column
  ws['!merges'] = [{s:{r:0,c:0}, e:{r:0,c:FIELDS.length - 1}}];

  // Column widths — measured against header label, with a sensible floor/ceiling
  ws['!cols'] = FIELDS.map(f => ({ wch: Math.min(40, Math.max(14, f.label.length + 4)) }));
  // Row heights
  ws['!rows'] = [{hpt:26}, {hpt:8}, {hpt:36}].concat(schools.map(() => ({hpt:22})));
  // Freeze header (row 3 / index 3 = first data row)
  ws['!freeze'] = { ySplit: 3 };

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'School Editor Data');
  XLSX.writeFile(wb, `CUSA_School_Editor_${today}.xlsx`);
}

      const st = checkStatus(s, check);
      cells += `<td class="${st.pass ? 'status-pass' : 'status-fail'}">${escapeHtml(st.display)}</td>`;

        ${state.espnAccess ? '' : `<button class="btn blue" id="change-pw" style="font-size:11px;padding:6px 12px">Change Password</button>`}

function checkReplayDetail(s, mins) {
  if (mins.rep === 0) return { ok: true, reason: 'Replay not required for this sport' };
  const issues = [];
  if (s.replayUnits < 1) issues.push(`0 replay units`);
  if (s.replayInputs < 4) issues.push(`only ${s.replayInputs} inputs (need ≥4)`);
  if (s.replayOutputs < 2) issues.push(`only ${s.replayOutputs} outputs (need ≥2)`);
  if (issues.length === 0) return { ok: true, reason: `${s.replayUnits} unit(s), ${s.replayInputs}in/${s.replayOutputs}out — meets ESPN minimum` };
  return { ok: false, reason: issues.join(', ') };
}

function renderSports() {
  if (!hasPasswordSet()) return renderSetupPassword();
  if (!state.unlocked && !state.espnAccess) return renderProtectedTabGate();

  let out = `
    <div class="section-title" style="justify-content:space-between;width:100%">
      <div style="display:flex;align-items:center;gap:12px">
        <img src="${ESPN_LOGO}" alt="ESPN">
        <h2>Per-Sport Minimum Standards</h2>
      </div>
      <div style="display:flex;gap:8px">
        ${state.espnAccess ? '<span style="font-size:11px;font-weight:700;color:#EF4035;background:#fff3f3;border:1px solid #EF4035;border-radius:4px;padding:4px 10px;">ESPN Read-Only</span>' : ''}
        <button class="btn gray" id="lock-now" style="font-size:11px;padding:6px 12px">🔒 Lock</button>
        ${state.espnAccess ? '' : `<button class="btn blue" id="change-pw" style="font-size:11px;padding:6px 12px">Change Password</button>`}
      </div>
    </div>
    <p class="muted">Each CUSA-sponsored sport the school produces is checked against two requirements: camera count (sport-specific) and replay capability (ESPN general minimum). Sports outside the CUSA-sponsored set are not shown here.</p>
    <div class="card" style="margin-bottom:20px;border-left:4px solid var(--blue)">
      <div class="card-header" style="background:var(--blue);color:var(--navy)">How the Checks Work</div>
      <div style="padding:14px 18px;font-size:12px;line-height:1.7;color:#333">
        <p style="margin:0 0 8px"><strong>CUSA-sponsored sports:</strong> Football, Basketball, Volleyball, Soccer, Baseball, Softball.</p>
        <p style="margin:0 0 8px"><strong>Cameras — CUSA minimums:</strong> Football, Basketball, Volleyball, and Soccer require <strong>4 cameras</strong>. Baseball and Softball require <strong>3 cameras</strong> (high home, center field, low or high 1st base). The School Cams value comes directly from what each school enters in the <em>Sport-Specific Cameras</em> section of the School Editor. If a school hasn't entered a value yet, it shows as <strong>—</strong> and fails the check until filled in.</p>
        <p style="margin:0 0 8px"><strong>Replay:</strong> for sports that require replay, the school's replay system must meet <em>all three</em> of ESPN's general equipment minimums:</p>
        <ul style="margin:0 0 8px 20px;padding:0">
          <li>At least <strong>1 replay unit</strong></li>
          <li>At least <strong>4 replay inputs</strong></li>
          <li>At least <strong>2 replay outputs</strong></li>
        </ul>
        <p style="margin:0;color:#666;font-style:italic">If any one of those three is below minimum, replay fails for <strong>every</strong> sport that requires replay. The "Why?" column below shows which specific spec is the problem.</p>
      </div>
    </div>
  `;
  state.schools.forEach(s => {
    if (!s.sports || !s.sports.length) return;
    // Filter to CUSA-sponsored sports this school produces
    const displaySports = s.sports.filter(sp => CUSA_SPONSORED_SPORTS.includes(sp));
    if (!displaySports.length) return;
    // School-level equipment check
    const unitsOk = s.replayUnits >= 1;
    const inputsOk = s.replayInputs >= 4;
    const outputsOk = s.replayOutputs >= 2;
    const invBadge = (ok, txt) => `<span style="color:${ok ? 'var(--pass-fg)' : 'var(--fail-fg)'};font-weight:${ok ? '500' : '700'}">${ok ? '' : '✗ '}${txt}</span>`;

    let rows = '';
    displaySports.forEach(sport => {
      const mins = SPORT_MINS[sport] || {cam:2,rep:1,comm:"PxP",gfx:"Score"};
      const perSport = hasPerSportField(sport);
      const schoolCams = getCamerasForSport(s, sport);
      const notEntered = perSport && schoolCams === 0;
      const camOk = !notEntered && schoolCams >= mins.cam;
      const rep = checkReplayDetail(s, mins);

      // Why? text
      let camReason = null;
      if (notEntered) camReason = `Cams: per-sport value not entered in School Editor`;
      else if (!camOk) camReason = `Cams: only ${schoolCams} ${perSport ? 'per-sport' : 'total'} cams (need ≥${mins.cam})`;

      const whyParts = [];
      if (camReason) whyParts.push(camReason);
      if (!rep.ok) whyParts.push(`Replay: ${rep.reason}`);
      if (camOk && rep.ok) whyParts.push('All checks pass');
      const whyText = whyParts.join(' · ');
      const whyColor = (camOk && rep.ok) ? 'var(--pass-fg)' : 'var(--fail-fg)';

      const camDisplay = notEntered ? '—' : String(schoolCams);
      const camTitle = perSport
        ? (notEntered ? 'Not entered in School Editor' : 'Per-sport camera count from School Editor')
        : 'Total cameras (no per-sport field for this sport)';

      rows += `<tr>
        <td class="label">${escapeHtml(sport)}</td>
        <td style="text-align:center">${mins.cam}</td>
        <td class="${camOk ? 'status-pass' : 'status-fail'}" title="${camTitle}">${camDisplay}</td>
        <td class="${camOk ? 'status-pass' : 'status-fail'}">${camOk ? '✓ Meets' : '✗ Below'}</td>
        <td style="text-align:center">${mins.rep === 0 ? '—' : mins.rep}</td>
        <td class="${rep.ok ? 'status-pass' : 'status-fail'}">${mins.rep === 0 ? 'N/A' : (rep.ok ? '✓ Meets' : '✗ Below')}</td>
        <td style="font-size:11px;color:${whyColor};font-style:${(camOk && rep.ok) ? 'normal' : 'italic'}">${escapeHtml(whyText)}</td>
        <td style="text-align:center;color:#555">${escapeHtml(mins.comm)}</td>
      </tr>`;
    });

    // Per-sport camera summary for this school (no fallback to total)
    const perSportBadges = Object.entries(PER_SPORT_CAM_FIELDS)
      .filter(([sport]) => s.sports.includes(sport))
      .map(([sport, key]) => {
        const val = Number(s[key]) || 0;
        const min = SPORT_MINS[sport].cam;
        const ok = val >= min;
        const display = val > 0 ? `${sport.slice(0,3)}:${val}` : `${sport.slice(0,3)}:—`;
        return `<span style="color:${ok ? 'var(--pass-fg)' : 'var(--fail-fg)'};font-weight:${ok ? '500' : '700'}">${display}</span>`;
      }).join(' · ');

    out += `
      <div class="card">
        <div class="sport-school-header">
          <span class="name">${escapeHtml(s.name)}</span>
          <span class="inv">Total ${s.cameras} cams · Replay: ${invBadge(unitsOk, `${s.replayUnits} unit${s.replayUnits===1?'':'s'}`)} · ${invBadge(inputsOk, `${s.replayInputs} inputs`)} · ${invBadge(outputsOk, `${s.replayOutputs} outputs`)}</span>
        </div>
        ${perSportBadges ? `<div style="background:#fafafa;padding:8px 16px;font-size:11px;border-bottom:1px solid #eee;color:#555">Per-sport cams: ${perSportBadges}</div>` : ''}
        <table>
          <thead><tr>
            <th>Sport</th>
            <th style="text-align:center">Min Cams</th>
            <th style="text-align:center">School Cams</th>
            <th style="text-align:center">Cam Check</th>
            <th style="text-align:center">Replay Required</th>
            <th style="text-align:center">Replay Check</th>
            <th>Why?</th>
            <th style="text-align:center">Commentary</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  });
  return out;
}

/* ── Audit Log ── */
async function loadAuditLog() {
  if (!_db) { state.auditLog = []; render(); return; }
  const { data } = await _db
    .from('school_audit_log')
    .select('id, changed_at, changed_by, field_name, old_value, new_value, schools(name)')
    .order('changed_at', { ascending: false })
    .limit(200);
  state.auditLog = data || [];
  render();
}

function renderAuditLog() {
  if (!hasPasswordSet()) return renderSetupPassword();
  if (!state.unlocked && !state.espnAccess) return renderProtectedTabGate();

  if (state.auditLog === null) {
    loadAuditLog();
    return `<div class="empty-state" style="padding:60px">Loading audit log…</div>`;
  }

  const rows = state.auditLog.length ? state.auditLog.map(e => `
    <tr>
      <td style="white-space:nowrap;font-size:11px">${new Date(e.changed_at).toLocaleString()}</td>
      <td style="font-weight:600">${escapeHtml(e.schools?.name || '—')}</td>
      <td style="font-size:11px">${escapeHtml(e.changed_by || '—')}</td>
      <td>${escapeHtml(fieldLabel(e.field_name))}</td>
      <td style="color:var(--fail-fg);font-size:11px">${escapeHtml(e.old_value ?? '—')}</td>
      <td style="color:var(--pass-fg);font-size:11px">${escapeHtml(e.new_value ?? '—')}</td>
    </tr>`).join('') :
    `<tr><td colspan="6" style="text-align:center;color:#888;padding:32px">No changes recorded yet.</td></tr>`;

  return `
    <div class="section-title" style="justify-content:space-between;width:100%;margin-bottom:4px">
      <h2>Audit Log</h2>
      <button class="btn blue" id="audit-refresh" style="font-size:11px;padding:6px 12px">↻ Refresh</button>
    </div>
    <p class="muted">200 most recent field-level changes across all schools${!_db ? ' — connect Supabase to enable' : ''}.</p>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Timestamp</th><th>School</th><th>Changed By</th><th>Field</th>
          <th>Previous Value</th><th>New Value</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function wireAuditLog() {
  wireCompliance();
  document.getElementById('audit-refresh')?.addEventListener('click', () => {
    state.auditLog = null;
    render();
  });
}

/* ── Wiring ── */
function wireEditor() {
  if (state.pendingEditIdx !== null && !state.unlocked && !state.espnAccess) {
    wireCompliance();
    document.querySelectorAll('.school-card').forEach(card => {
      card.addEventListener('click', () => {
        state.pendingEditIdx = Number(card.dataset.idx);
        render();
      });
    });
    return;
  }

  document.querySelectorAll('.school-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.mark-toggle')) return;
      if (!state.unlocked && !state.espnAccess) {
        state.pendingEditIdx = Number(card.dataset.idx);
        render();
        return;
      }
      state.editingIdx = Number(card.dataset.idx);
      render();
    });
  });
  document.querySelectorAll('.school-card .mark-toggle').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const idx = +btn.dataset.markIdx;
      const school = state.schools[idx];
      if (!school) return;
      const prev = school.manually_marked_at;
      school.manually_marked_at = isManuallyMarked(school) ? null : new Date().toISOString();
      btn.disabled = true;
      const ok = await saveSchool(school);
      if (!ok) {
        school.manually_marked_at = prev;
        showToast('⚠ Could not save mark — reverted', true);
      }
      render();
    });
  });

  document.getElementById('add-school')?.addEventListener('click', async () => {
    const newSchool = {...blankSchool(), name: `New School ${state.schools.length + 1}`};
    state.schools.push(newSchool);
    state.editingIdx = state.schools.length - 1;
    await saveSchool(newSchool);
    render();
  });

  document.getElementById('export-editor')?.addEventListener('click', () => {
    exportSchoolEditor();
  });

  document.getElementById('save-school')?.addEventListener('click', async () => {
    if (state.editingIdx === null) return;
    await saveSchool(state.schools[state.editingIdx]);
  });

  document.getElementById('school-pw-set')?.addEventListener('click', async () => {
    const pw = document.getElementById('school-pw-new').value;
    const msg = document.getElementById('school-pw-msg');
    if (!pw || pw.length < 6) {
      msg.textContent = 'Password must be at least 6 characters.';
      msg.style.color = '#991b1b'; msg.style.display = 'block'; return;
    }
    const h = await hashPassword(pw);
    const school = state.schools[state.editingIdx];
    school.pw_hash = h;
    // Debug info shown in toast regardless of outcome
    const debugInfo = `id=${school.id || 'NONE'}, db=${!!_db}`;
    const ok = await saveSchoolPassword(school);
    if (ok) {
      showToast('✓ Password saved to Supabase — share it with the school contact.');
    }
    // If !ok, saveSchoolPassword already showed the specific error — don't overwrite it
    document.getElementById('school-pw-new').value = '';
    render();
  });

  document.getElementById('remove-school')?.addEventListener('click', async () => {
    if (state.editingIdx === null) return;
    const school = state.schools[state.editingIdx];
    if (!confirm(`Remove ${school.name}?`)) return;
    if (_db && school.id) {
      await _db.from('schools').delete().eq('id', school.id);
    }
    state.schools.splice(state.editingIdx, 1);
    state.editingIdx = null;
    if (!_db) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.schools)); } catch(e) {} }
    render();
  });

  document.querySelectorAll('[data-key]').forEach(input => {
    input.addEventListener('input', () => {
      if (state.editingIdx === null) return;
      const key = input.dataset.key;
      const val = input.type === 'number' ? Number(input.value) : input.value;
      state.schools[state.editingIdx][key] = val;
      if (input.type === 'number' && input.dataset.min !== undefined) {
        input.classList.toggle('below-min', val < Number(input.dataset.min));
      }
    });
    if (input.dataset.key === 'name') {
      input.addEventListener('blur', render);
    }
  });

  document.querySelectorAll('[data-toggle]').forEach(tog => {
    tog.addEventListener('click', () => {
      if (state.editingIdx === null) return;
      const key = tog.dataset.toggle;
      state.schools[state.editingIdx][key] = !state.schools[state.editingIdx][key];
      saveSchool(state.schools[state.editingIdx]);
      render();
    });
  });

  document.querySelectorAll('[data-sport]').forEach(chip => {
    chip.addEventListener('click', () => {
      if (state.editingIdx === null) return;
      const sport = chip.dataset.sport;
      const s = state.schools[state.editingIdx];
      s.sports = s.sports.includes(sport) ? s.sports.filter(x => x !== sport) : [...s.sports, sport];
      saveSchool(s);
      render();
    });
  });
}

/* ── Tab nav ── */
document.querySelectorAll('.tab-btn').forEach(b => {
  b.addEventListener('click', () => {
    state.activeTab = b.dataset.tab;
    if (b.dataset.tab === 'audit') state.auditLog = null;
    render();
  });
});

/* ── Boot ── */
async function boot() {
  seedDefaultPassword();
  initSupabase();

  if (_db) {
    const { data, error } = await _db.from('schools').select('*').order('name');
    if (!error && data?.length) state.schools = data.map(fromDbRow);
    setupRealtime();
  }

  render();
}

boot();
</script>

</html>
