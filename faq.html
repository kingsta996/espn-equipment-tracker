<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Hub — FAQ</title>
<style>
  :root {
    --navy: #00263A;
    --gray: #BFCED6;
    --white: #FFFFFF;
    --red: #E40046;
    --blue: #00B5E2;
    --green: #A7D500;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--navy); color: var(--white);
    font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    min-height: 100vh; padding: 32px 20px 60px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 10px; }
  .top h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.2px; }
  .top h1 small { display: block; color: var(--gray); font-weight: 500; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; margin-bottom: 4px; }
  .back { color: var(--blue); text-decoration: none; font-size: 12px; font-weight: 600; }
  .back:hover { color: var(--white); }
  .toolbar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  .toolbar input, .toolbar select {
    background: rgba(255,255,255,0.05); color: var(--white);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: inherit;
  }
  .toolbar input { flex: 1; min-width: 180px; }
  .toolbar input:focus, .toolbar select:focus { outline: 0; border-color: var(--blue); background: rgba(255,255,255,0.08); }
  .meta { color: rgba(255,255,255,0.5); font-size: 11px; margin-bottom: 10px; }
  .group { margin-bottom: 26px; }
  .group h2 {
    font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase;
    color: var(--blue); margin-bottom: 10px; font-weight: 700;
    padding-bottom: 6px; border-bottom: 1px solid rgba(0,181,226,0.18);
  }
  details.faq {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; margin-bottom: 8px; padding: 0;
    transition: border-color 0.15s;
  }
  details.faq[open] { border-color: rgba(0,181,226,0.35); background: rgba(0,181,226,0.05); }
  details.faq summary {
    list-style: none; padding: 12px 16px; cursor: pointer;
    font-size: 14px; font-weight: 600; display: flex; gap: 10px; align-items: center;
  }
  details.faq summary::-webkit-details-marker { display: none; }
  details.faq summary::before {
    content: '▸'; color: var(--blue); transition: transform 0.15s; font-size: 11px;
  }
  details.faq[open] summary::before { transform: rotate(90deg); }
  details.faq summary .q { flex: 1; }
  details.faq summary .slug-pill {
    font-size: 9.5px; color: rgba(255,255,255,0.45); font-family: 'SF Mono', 'Menlo', monospace;
    background: rgba(255,255,255,0.05); padding: 2px 7px; border-radius: 4px; letter-spacing: 0.4px;
  }
  details.faq .answer {
    padding: 0 16px 16px 30px; font-size: 13px; line-height: 1.6;
    color: rgba(255,255,255,0.85); white-space: pre-wrap; word-wrap: break-word;
  }
  details.faq .answer a { color: var(--blue); }
  .empty {
    text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 12px;
  }
  .empty h3 { font-size: 15px; color: var(--white); margin-bottom: 6px; }
  .footer { margin-top: 50px; text-align: center; color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; }
  .footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
  .footer a:hover { color: var(--white); }
  /* Highlight a deep-linked entry */
  details.faq:target { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(0,181,226,0.2); }
</style>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1><small>Production Hub</small>Frequently Asked Questions</h1>
    <a class="back" href="hub.html">← Production Hub</a>
  </div>
  <div class="toolbar">
    <input id="faqSearch" placeholder="Search questions, answers, keywords…" type="search" autofocus>
    <select id="faqCategory"><option value="">All categories</option></select>
  </div>
  <div class="meta" id="faqMeta">Loading…</div>
  <div id="faqList"></div>
  <div class="footer">
    Conference USA · ESPN+ · 2025–26 &nbsp;·&nbsp; <a href="hub.html">Production Hub</a> &nbsp;·&nbsp; <a href="mailto:kking@conferenceusa.com">Contact Keith</a>
  </div>
</div>
<script>
  var APP_KEY = 'production_hub';
  var _all = [];
  var _db = null;

  function db() {
    if (_db) return _db;
    if (typeof supabase !== 'undefined' && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
      _db = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }
    return _db;
  }

  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function renderAnswer(text) {
    var html = escHtml(text);
    // Linkify [text](url) markdown links and bare URLs.
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, t, u) {
      return '<a href="' + escHtml(u) + '" target="_blank" rel="noopener">' + escHtml(t) + '</a>';
    });
    html = html.replace(/(^|[\s(])((?:https?:\/\/)[^\s)<]+)/g, function (_, lead, u) {
      return lead + '<a href="' + escHtml(u) + '" target="_blank" rel="noopener">' + escHtml(u) + '</a>';
    });
    return html;
  }

  async function loadFaq() {
    var meta = document.getElementById('faqMeta');
    var d = db();
    if (!d) {
      meta.textContent = 'Database not available — open this page on the live site.';
      return;
    }
    try {
      var resp = await d.from('chat_faq')
        .select('slug, app, category, question, answer, keywords, view_count, updated_at')
        .in('app', [APP_KEY, 'both'])
        .eq('is_active', true)
        .order('sort_order', { ascending: true })
        .order('category', { ascending: true })
        .order('created_at', { ascending: true });
      if (resp.error) throw resp.error;
      _all = resp.data || [];
      buildCategoryDropdown();
      render();
      // Deep-link to a specific FAQ via #slug.
      var hash = (location.hash || '').replace(/^#/, '');
      if (hash) {
        var el = document.getElementById('faq-' + hash);
        if (el) {
          el.setAttribute('open', '');
          setTimeout(function () { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 60);
          incrementViewCount(hash);
        }
      }
    } catch (e) {
      meta.textContent = 'Failed to load FAQ: ' + (e.message || e);
    }
  }

  function buildCategoryDropdown() {
    var sel = document.getElementById('faqCategory');
    var cats = {};
    _all.forEach(function (f) { var c = (f.category || 'General').trim(); cats[c] = true; });
    var keys = Object.keys(cats).sort();
    sel.innerHTML = '<option value="">All categories</option>' +
      keys.map(function (k) { return '<option value="' + escHtml(k) + '">' + escHtml(k) + '</option>'; }).join('');
  }

  function matches(f, q) {
    if (!q) return true;
    var hay = ((f.question || '') + ' ' + (f.answer || '') + ' ' + ((f.keywords || []).join(' ')) + ' ' + (f.category || '')).toLowerCase();
    return q.toLowerCase().split(/\s+/).every(function (t) { return !t || hay.indexOf(t) !== -1; });
  }

  function render() {
    var q   = document.getElementById('faqSearch').value.trim();
    var cat = document.getElementById('faqCategory').value;
    var list = _all.filter(function (f) {
      if (cat && (f.category || 'General').trim() !== cat) return false;
      if (!matches(f, q)) return false;
      return true;
    });
    var meta = document.getElementById('faqMeta');
    var root = document.getElementById('faqList');
    if (!list.length) {
      meta.textContent = '0 entries';
      root.innerHTML = '<div class="empty"><h3>No matching FAQ entries</h3><div>Try a different search, or ask the support chat on the Hub home and Keith will curate the answer here.</div></div>';
      return;
    }
    meta.textContent = list.length + ' entr' + (list.length === 1 ? 'y' : 'ies');
    var groups = {};
    list.forEach(function (f) {
      var c = (f.category || 'General').trim();
      (groups[c] = groups[c] || []).push(f);
    });
    var out = '';
    Object.keys(groups).sort().forEach(function (c) {
      out += '<div class="group"><h2>' + escHtml(c) + '</h2>';
      groups[c].forEach(function (f) {
        out += '<details class="faq" id="faq-' + escHtml(f.slug) + '" data-slug="' + escHtml(f.slug) + '">' +
                 '<summary><span class="q">' + escHtml(f.question) + '</span><span class="slug-pill">' + escHtml(f.slug) + '</span></summary>' +
                 '<div class="answer">' + renderAnswer(f.answer || '') + '</div>' +
               '</details>';
      });
      out += '</div>';
    });
    root.innerHTML = out;
    // Track views when an entry is opened.
    root.querySelectorAll('details.faq').forEach(function (d) {
      d.addEventListener('toggle', function () {
        if (d.open) incrementViewCount(d.dataset.slug);
      });
    });
  }

  function incrementViewCount(slug) {
    var d = db(); if (!d || !slug) return;
    // Best-effort RPC-less increment: read current count, write back.
    d.from('chat_faq').select('view_count').eq('slug', slug).maybeSingle().then(function (r) {
      var n = (r && r.data && r.data.view_count) || 0;
      d.from('chat_faq').update({ view_count: n + 1 }).eq('slug', slug).then(function () {});
    });
  }

  document.getElementById('faqSearch').addEventListener('input', render);
  document.getElementById('faqCategory').addEventListener('change', render);
  window.addEventListener('hashchange', function () {
    var hash = (location.hash || '').replace(/^#/, '');
    if (hash) {
      var el = document.getElementById('faq-' + hash);
      if (el) { el.setAttribute('open', ''); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    }
  });
  loadFaq();
</script>
</body>
</html>
