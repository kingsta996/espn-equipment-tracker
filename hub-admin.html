<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Hub · Admin</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="claude-audit-ui.js"></script>
<style>
  :root {
    --navy: #00263A;
    --gray: #C7CDD1;
    --white: #FFFFFF;
    --red: #E40046;
    --blue: #00B5E2;
    --green: #A7D500;
    --espn-red: #EF4035;
    --gold: #FFD700;
    --light: #f0f2f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: var(--light); min-height: 100vh; color: #222; }

  /* ── Header ── */
  .header { background: linear-gradient(180deg, #002131 0%, var(--navy) 100%); border-bottom: 3px solid var(--gold); padding: 14px 22px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .header .cobrand { display: flex; align-items: center; gap: 14px; }
  .header .cusa-logo { height: 42px; width: auto; }
  .header .cobrand-x { font-family: 'Times New Roman', serif; font-size: 22px; font-weight: 300; color: var(--gold); opacity: 0.8; line-height: 1; }
  .header .claude-pill { background: #FAF5EE; border-radius: 999px; padding: 7px 16px; display: inline-flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
  .header .claude-logo { height: 22px; width: auto; display: block; }
  .header h1 { color: var(--white); font-size: 15px; margin: 0; flex: 1; font-weight: 700; letter-spacing: 0.3px; }
  .header h1 small { display: block; font-size: 9px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; opacity: 0.85; }
  .header a { color: var(--gray); font-size: 11px; text-decoration: none; white-space: nowrap; }
  .header a:hover { color: var(--white); }
  .header .who { color: rgba(255,255,255,0.8); font-size: 11px; font-weight: 600; }
  .header .signout { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .header .signout:hover { background: rgba(255,255,255,0.25); }
  @media (max-width: 640px) { .header .cusa-logo { height: 32px; } .header .claude-logo { height: 18px; } .header h1 { font-size: 13px; flex-basis: 100%; order: 2; } }

  /* ── Buttons ── */
  .btn { padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; transition: filter 0.15s; white-space: nowrap; }
  .btn:hover:not(:disabled) { filter: brightness(0.9); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-clear { background: #888; color: var(--white); }
  .btn-save  { background: var(--green); color: var(--navy); }

  /* ── Tab bar ── */
  .tab-bar { background: var(--white); border-bottom: 3px solid var(--gold); display: flex; overflow-x: auto; }
  .tab-bar button { padding: 11px 22px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; background: transparent; color: var(--navy); border-bottom: 3px solid transparent; transition: all 0.15s; white-space: nowrap; font-family: inherit; margin-bottom: -3px; }
  .tab-bar button.active { background: var(--navy); color: var(--gold); border-bottom-color: var(--gold); }
  .tab-bar button:hover:not(.active) { background: #f5f5f5; }

  /* ── Content ── */
  .content { padding: 0; max-width: 1400px; margin: 0 auto; }
  .tab-content { display: none; padding: 0; }
  .tab-content.active { display: block; }

  /* ── Password modal — full-page gate ── */
  .pw-overlay { display: none; position: fixed; inset: 0; background: rgba(0,38,58,0.7); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .pw-overlay.open { display: flex; }
  .pw-box { background: #fff; border-radius: 12px; padding: 32px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .pw-box h2 { font-size: 18px; color: var(--navy); margin-bottom: 6px; }
  .pw-box p { font-size: 12px; color: #666; margin-bottom: 20px; }
  .pw-input { width: 100%; padding: 10px 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 12px; }
  .pw-input:focus { outline: none; border-color: var(--gold); }
  .pw-err { color: var(--espn-red); font-size: 12px; margin-bottom: 10px; min-height: 16px; }
  .pw-actions { display: flex; gap: 8px; justify-content: center; }
  .pw-actions button { padding: 10px 22px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; }
  .pw-actions .cancel { background: #eee; color: #555; }
  .pw-actions .submit { background: var(--navy); color: #fff; }

  @media (max-width: 640px) {
    .btn { justify-content: center; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="cobrand">
    <img class="cusa-logo"   src="Logos/Hub/cusa-stacked-white.png" alt="Conference USA" onerror="this.style.display='none'">
    <span class="cobrand-x" aria-hidden="true">×</span>
    <span class="claude-pill"><img class="claude-logo" src="Logos/Hub/claude-logo.png" alt="Claude"></span>
  </div>
  <h1><small>Production Hub · Cobranded</small>Admin Console</h1>
  <span class="who" id="currentUser"></span>
  <a href="hub.html">← Hub</a>
  <a href="box-audit.html">🛡 Box Audit</a>
  <button class="signout" onclick="signOut()">🔒 Sign Out</button>
</div>

<!-- Password gate -->
<div class="pw-overlay open" id="pwOverlay">
  <div class="pw-box">
    <h2>🛡 Hub Admin</h2>
    <p>Legacy admin only — same password as the WSC Portal / Compliance admin.</p>
    <input class="pw-input" id="pwInput" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitPw()">
    <div class="pw-err" id="pwErr"></div>
    <div class="pw-actions">
      <button class="cancel" onclick="window.location.href='hub.html'">Cancel</button>
      <button class="submit" id="pwSubmit" onclick="submitPw()">Sign In</button>
    </div>
  </div>
</div>

<!-- Tab bar -->
<div class="tab-bar" id="tabBar" style="display:none">
  <button class="active" data-tab="creative-hub">🎨 Creative Hub Override</button>
  <button data-tab="claude-audit">🛡 Claude Audit</button>
</div>

<!-- Content -->
<div class="content">
  <div id="creative-hub" class="tab-content active"></div>
  <div id="claude-audit"  class="tab-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* ─────────────────────────────────────────────────────────────── */
  var SUPER_EMAIL  = 'kking@conferenceusa.com';
  // Distinct admin accounts. Each entry maps a password hash to an identity so
  // audit/activity logs show WHO performed an action. Add additional admins by
  // appending to this array (also update the matching list in hub.html).
  var ADMIN_USERS  = [
    { hash: '9a874f8b06ebb0eb63336db78b70ca149513a237de8395d8e858ee8f0c702ae2', email: 'kking@conferenceusa.com', display_name: 'Keith King' },
    { hash: 'ee0579f300f3d10b330e1b9a9d122d6638f9ab54a2fa6c28dd8e5e972c0fadf1', email: 'bcarter@gxait.com',        display_name: 'GXA IT — B. Carter' }
  ];
  var ALLOWED_EMAILS = ADMIN_USERS.map(function (u) { return u.email; });
  var SESSION_KEY  = 'cusa_hub_admin_user';

  var _db = null;
  var _currentUser = null;

  function initSupabase() {
    if (_db) return _db;
    if (typeof supabase !== 'undefined' && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
      _db = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }
    return _db;
  }

  async function hashPw(s) {
    var buf = new TextEncoder().encode(s);
    var h = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(h)).map(function (b) { return b.toString(16).padStart(2,'0'); }).join('');
  }

  function logActivity(action, target, details, app) {
    if (!_db) return;
    var u = _currentUser;
    var row = {
      email: (u && u.email) || 'unknown',
      display_name: (u && u.display_name) || null,
      app: app || 'hub-admin',
      action: action,
      target: target || null,
      details: details || null
    };
    _db.from('admin_activity_log').insert(row).then(function (res) {
      if (res && res.error) console.warn('logActivity failed:', res.error);
    });
  }

  /* ── AUTH ── */

  async function submitPw() {
    var pw  = document.getElementById('pwInput').value;
    var err = document.getElementById('pwErr');
    var btn = document.getElementById('pwSubmit');
    err.textContent = '';
    if (!pw) { err.textContent = 'Password required.'; return; }
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      var h = await hashPw(pw);
      var match = ADMIN_USERS.find(function (u) { return u.hash === h; });
      if (!match) {
        err.textContent = 'Incorrect password.';
        btn.disabled = false; btn.textContent = 'Sign In';
        return;
      }
      _currentUser = { email: match.email, display_name: match.display_name };
      try { localStorage.setItem(SESSION_KEY, JSON.stringify(_currentUser)); } catch (_) {}
      btn.disabled = false; btn.textContent = 'Sign In';
      onSignedIn();
    } catch (e) {
      err.textContent = 'Sign-in failed: ' + (e.message || e);
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  function signOut() {
    try { localStorage.removeItem(SESSION_KEY); } catch (_) {}
    location.reload();
  }

  function onSignedIn() {
    document.getElementById('pwOverlay').classList.remove('open');
    document.getElementById('tabBar').style.display = 'flex';
    document.getElementById('currentUser').textContent = _currentUser.display_name + ' · ' + _currentUser.email;
    initSupabase();
    // Default tab.
    switchTab('creative-hub');
  }

  function bootAuth() {
    try {
      var raw = localStorage.getItem(SESSION_KEY);
      if (raw) {
        var u = JSON.parse(raw);
        if (u && u.email && ALLOWED_EMAILS.indexOf(u.email) !== -1) {
          _currentUser = u;
          onSignedIn();
          return;
        }
      }
    } catch (_) {}
    setTimeout(function () { document.getElementById('pwInput').focus(); }, 80);
  }

  /* ── TABS ── */

  function switchTab(name) {
    document.querySelectorAll('.tab-bar button').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === name); });
    document.querySelectorAll('.tab-content').forEach(function (c) { c.classList.toggle('active', c.id === name); });
    if (name === 'creative-hub') renderCreativeHubOverride();
    if (name === 'claude-audit') renderClaudeAuditTab();
  }

  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.tab-bar button').forEach(function (b) {
      b.addEventListener('click', function () { switchTab(b.dataset.tab); });
    });
    bootAuth();
  });

  /* ─────────────────────────────────────────────────────────────── */
  /* ── Claude Audit ── */

  function renderClaudeAuditTab() {
    if (typeof ClaudeAudit === 'undefined' || !ClaudeAudit.init) {
      document.getElementById('claude-audit').innerHTML = '<div style="padding:24px;opacity:0.6">Claude Audit module not loaded.</div>';
      return;
    }
    ClaudeAudit.init({
      db:            _db,
      container:     document.getElementById('claude-audit'),
      hubLabel:      'Production Hub',
      repoLabel:     'espn-equipment-tracker',
      repoFilter:    '%/ESPN Equipment Tracker%',
      getUser:       function () { return _currentUser; },
      allowedEmails: ALLOWED_EMAILS
    });
  }

  /* ─────────────────────────────────────────────────────────────── */
  /* ── Creative Hub state override ── */
  // Three sections, in order of urgency:
  //   1. Pending Save Requests — championship "request global" submissions
  //      that need approve / reject.
  //   2. Global State — one row per page in creative_hub_global_state, what
  //      every signed-in user sees on page load.
  //   3. Per-User State — creative_hub_state, individual local overrides.
  var _chSelected  = null;
  var _chgSelected = null;
  var _chrSelected = null;

  function _chEsc(s)     { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function _chAttr(s)    { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
  function _chFmtAgo(iso){ try { return new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); } catch (_) { return iso || ''; } }
  function _chMsg(text, ok)  { var el = document.getElementById('ch-msg');  if (!el) return; el.textContent = text || ''; el.style.color = ok ? '#080' : '#c00'; }
  function _chgMsg(text, ok) { var el = document.getElementById('chg-msg'); if (!el) return; el.textContent = text || ''; el.style.color = ok ? '#080' : '#c00'; }
  function _chrMsg(text, ok) { var el = document.getElementById('chr-msg'); if (!el) return; el.textContent = text || ''; el.style.color = ok ? '#080' : '#c00'; }

  async function renderCreativeHubOverride() {
    var container = document.getElementById('creative-hub');
    if (!container.querySelector('#ch-users-list')) {
      container.innerHTML =
        '<div style="padding:18px">' +
          '<h3 style="margin-bottom:6px;color:var(--navy);font-size:15px">Creative Hub State Override</h3>' +
          '<div style="font-size:12px;color:#555;margin-bottom:14px">Manage shared global state, approve save requests, and override individual users\' local state.</div>' +
          // Pending Save Requests
          '<div style="background:#fff7e6;border:1px solid #f0c674;border-radius:6px;padding:12px;margin-bottom:18px">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
              '<h4 style="font-size:13px;color:#8a5a00;margin:0">📨 Pending Save Requests</h4>' +
              '<span id="chr-msg" style="font-size:11px"></span>' +
            '</div>' +
            '<div id="chr-list" style="font-size:12px"></div>' +
            '<div id="chr-detail" style="margin-top:10px;display:none">' +
              '<div style="font-size:11px;color:#666;margin-bottom:4px">Snapshot from <strong id="chr-detail-meta"></strong></div>' +
              '<textarea id="chr-detail-json" rows="10" readonly style="width:100%;font-family:Menlo,monospace;font-size:11px;padding:6px;border:1px solid #ccc;border-radius:4px;background:#fafafa"></textarea>' +
              '<div style="margin-top:6px;display:flex;gap:8px">' +
                '<button class="btn btn-save"  id="chr-approve" style="background:#1f6c33;color:#fff">✓ Approve (promote to global)</button>' +
                '<button class="btn btn-clear" id="chr-reject">✕ Reject</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
          // Global State
          '<h4 style="font-size:13px;color:var(--navy);margin-bottom:8px">🌐 Global State (what everyone sees)</h4>' +
          '<div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;margin-bottom:24px">' +
            '<div style="flex:0 0 260px">' +
              '<div id="chg-list" style="max-height:300px;overflow:auto;border:1px solid #ddd;border-radius:6px;padding:8px;background:#fff;font-size:12px"></div>' +
            '</div>' +
            '<div style="flex:1;min-width:360px">' +
              '<div style="font-size:12px;color:#444;margin-bottom:6px">Selected: <span id="chg-selected-label" style="color:#888">none</span></div>' +
              '<textarea id="chg-state-edit" rows="14" style="width:100%;font-family:Menlo,monospace;font-size:11px;padding:8px;border:1px solid #ccc;border-radius:6px" placeholder="Pick a page on the left to load its global state."></textarea>' +
              '<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">' +
                '<button class="btn btn-save"  id="chg-save"  disabled>💾 Save edited JSON</button>' +
                '<button class="btn btn-clear" id="chg-clear" disabled>🗑 Delete global row</button>' +
                '<span id="chg-msg" style="font-size:11px"></span>' +
              '</div>' +
            '</div>' +
          '</div>' +
          // Per-User State
          '<h4 style="font-size:13px;color:var(--navy);margin-bottom:8px">👤 Per-User Local State</h4>' +
          '<div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap">' +
            '<div style="flex:0 0 320px">' +
              '<div id="ch-users-list" style="max-height:400px;overflow:auto;border:1px solid #ddd;border-radius:6px;padding:8px;background:#fff;font-size:12px"></div>' +
            '</div>' +
            '<div style="flex:1;min-width:360px">' +
              '<div style="font-size:12px;color:#444;margin-bottom:6px">Selected: <span id="ch-selected-label" style="color:#888">none</span></div>' +
              '<textarea id="ch-state-edit" rows="14" style="width:100%;font-family:Menlo,monospace;font-size:11px;padding:8px;border:1px solid #ccc;border-radius:6px" placeholder="Pick a user/page on the left to load state."></textarea>' +
              '<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">' +
                '<button class="btn btn-save"  id="ch-save"      disabled>💾 Save edited JSON</button>' +
                '<button class="btn"           id="ch-push-mine" disabled style="background:#0077B5;color:#fff">⬆ Push my state to this user</button>' +
                '<button class="btn btn-clear" id="ch-clear"     disabled>🗑 Delete row</button>' +
                '<span id="ch-msg" style="font-size:11px"></span>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      container.querySelector('#ch-save').addEventListener('click',      chSaveCurrent);
      container.querySelector('#ch-push-mine').addEventListener('click', chPushMine);
      container.querySelector('#ch-clear').addEventListener('click',     chClearCurrent);
      container.querySelector('#chg-save').addEventListener('click',     chgSaveCurrent);
      container.querySelector('#chg-clear').addEventListener('click',    chgClearCurrent);
      container.querySelector('#chr-approve').addEventListener('click',  chrApproveSelected);
      container.querySelector('#chr-reject').addEventListener('click',   chrRejectSelected);
    }
    await Promise.all([chrReload(), chgReloadList(), chReloadList()]);
  }

  async function chReloadList() {
    var list = document.getElementById('ch-users-list');
    if (!list) return;
    if (!_db) { list.innerHTML = '<em style="color:#888">DB not connected.</em>'; return; }
    list.innerHTML = '<em style="color:#888">Loading…</em>';
    try {
      var results = await Promise.all([
        _db.from('creative_hub_users').select('email, display_name, is_active').order('email'),
        _db.from('creative_hub_state').select('email, page_key, updated_at').order('email').order('page_key'),
      ]);
      var users  = results[0].data || [];
      var states = results[1].data || [];
      var grouped = new Map();
      users.forEach(function (u) { grouped.set(u.email, { user: u, rows: [] }); });
      states.forEach(function (s) {
        if (!grouped.has(s.email)) grouped.set(s.email, { user: { email: s.email, display_name: s.email, is_active: false }, rows: [] });
        grouped.get(s.email).rows.push(s);
      });
      if (!grouped.size) { list.innerHTML = '<em style="color:#888">No editors yet. Run the creative_hub_state migration.</em>'; return; }
      var html = '';
      grouped.forEach(function (entry, email) {
        var user = entry.user;
        var rows = entry.rows;
        var inactive = user.is_active === false;
        html += '<div style="margin-bottom:10px">' +
                  '<div><strong>' + _chEsc(user.display_name || email) + '</strong>' +
                  (inactive ? ' <span style="font-size:10px;color:#c00">(inactive)</span>' : '') +
                  ' <span style="color:#888;font-size:11px">' + _chEsc(email) + '</span></div>';
        if (!rows.length) {
          html += '<div style="font-size:11px;color:#bbb;margin-left:10px;margin-top:2px">no saved state</div>';
        } else {
          html += '<div style="margin-left:10px;margin-top:4px;display:flex;flex-direction:column;gap:2px">';
          rows.forEach(function (r) {
            html += '<a href="#" class="ch-row" data-email="' + _chAttr(r.email) + '" data-page="' + _chAttr(r.page_key) + '" style="font-size:12px;color:#0077B5;text-decoration:none;padding:3px 6px;border-radius:4px">' +
                      _chEsc(r.page_key) + ' <span style="color:#888;font-size:10px">(' + _chEsc(_chFmtAgo(r.updated_at)) + ')</span>' +
                    '</a>';
          });
          html += '</div>';
        }
        html += '</div>';
      });
      list.innerHTML = html;
      list.querySelectorAll('.ch-row').forEach(function (a) {
        a.addEventListener('click', async function (e) {
          e.preventDefault();
          list.querySelectorAll('.ch-row').forEach(function (x) { x.style.background = ''; });
          a.style.background = '#dbe7f0';
          await chSelect(a.dataset.email, a.dataset.page);
        });
      });
    } catch (e) {
      list.innerHTML = '<em style="color:#c00">Failed: ' + _chEsc(e.message || String(e)) + '</em>';
    }
  }

  async function chSelect(email, pageKey) {
    _chSelected = { email: email, page_key: pageKey };
    document.getElementById('ch-selected-label').textContent = email + ' → ' + pageKey;
    var ta = document.getElementById('ch-state-edit');
    ta.value = 'Loading…';
    document.getElementById('ch-save').disabled      = true;
    document.getElementById('ch-push-mine').disabled = true;
    document.getElementById('ch-clear').disabled     = true;
    _chMsg('');
    try {
      var resp = await _db.from('creative_hub_state')
        .select('state, updated_at').eq('email', email).eq('page_key', pageKey).maybeSingle();
      if (resp.error) throw resp.error;
      ta.value = JSON.stringify(resp.data ? resp.data.state : null, null, 2);
      document.getElementById('ch-save').disabled      = false;
      document.getElementById('ch-push-mine').disabled = false;
      document.getElementById('ch-clear').disabled     = !resp.data;
    } catch (e) {
      ta.value = 'Failed to load: ' + (e.message || e);
    }
  }

  async function chSaveCurrent() {
    if (!_chSelected) return;
    var ta = document.getElementById('ch-state-edit');
    var parsed;
    try { parsed = JSON.parse(ta.value); }
    catch (e) { _chMsg('Invalid JSON: ' + e.message); return; }
    _chMsg('Saving…', true);
    try {
      var resp = await _db.from('creative_hub_state').upsert({
        email: _chSelected.email, page_key: _chSelected.page_key,
        state: parsed, updated_at: new Date().toISOString(),
      }, { onConflict: 'email,page_key' });
      if (resp.error) throw resp.error;
      logActivity('edit', 'creative-hub:' + _chSelected.email + '/' + _chSelected.page_key, 'Saved override JSON', 'creative-hub');
      _chMsg('Saved.', true);
      chReloadList();
    } catch (e) { _chMsg('Save failed: ' + (e.message || e)); }
  }

  async function chPushMine() {
    if (!_chSelected) return;
    var myEmail = (_currentUser && _currentUser.email) || '';
    if (!myEmail)                                                    { _chMsg('Sign in first.'); return; }
    if (myEmail.toLowerCase() === _chSelected.email.toLowerCase())   { _chMsg('Target is yourself.'); return; }
    if (!confirm('Overwrite ' + _chSelected.email + "'s " + _chSelected.page_key + ' state with your saved state for that page?')) return;
    _chMsg('Pushing…', true);
    try {
      var mineResp = await _db.from('creative_hub_state')
        .select('state').eq('email', myEmail).eq('page_key', _chSelected.page_key).maybeSingle();
      if (mineResp.error) throw mineResp.error;
      var mine = mineResp.data;
      if (!mine) { _chMsg('You have no saved state for ' + _chSelected.page_key + '.'); return; }
      var resp = await _db.from('creative_hub_state').upsert({
        email: _chSelected.email, page_key: _chSelected.page_key,
        state: mine.state, updated_at: new Date().toISOString(),
      }, { onConflict: 'email,page_key' });
      if (resp.error) throw resp.error;
      logActivity('edit', 'creative-hub:' + _chSelected.email + '/' + _chSelected.page_key, 'Pushed ' + myEmail + ' state to ' + _chSelected.email, 'creative-hub');
      _chMsg('Pushed.', true);
      await chSelect(_chSelected.email, _chSelected.page_key);
      chReloadList();
    } catch (e) { _chMsg('Push failed: ' + (e.message || e)); }
  }

  async function chClearCurrent() {
    if (!_chSelected) return;
    if (!confirm('Delete ' + _chSelected.email + "'s " + _chSelected.page_key + ' state? They will see defaults next page load.')) return;
    _chMsg('Deleting…', true);
    try {
      var resp = await _db.from('creative_hub_state').delete()
        .eq('email', _chSelected.email).eq('page_key', _chSelected.page_key);
      if (resp.error) throw resp.error;
      logActivity('delete', 'creative-hub:' + _chSelected.email + '/' + _chSelected.page_key, 'Deleted state row', 'creative-hub');
      _chMsg('Deleted.', true);
      document.getElementById('ch-state-edit').value = '';
      document.getElementById('ch-selected-label').textContent = 'none';
      document.getElementById('ch-save').disabled      = true;
      document.getElementById('ch-push-mine').disabled = true;
      document.getElementById('ch-clear').disabled     = true;
      _chSelected = null;
      chReloadList();
    } catch (e) { _chMsg('Delete failed: ' + (e.message || e)); }
  }

  /* ── Global state section ── */
  async function chgReloadList() {
    var list = document.getElementById('chg-list');
    if (!list) return;
    if (!_db) { list.innerHTML = '<em style="color:#888">DB not connected.</em>'; return; }
    list.innerHTML = '<em style="color:#888">Loading…</em>';
    try {
      var resp = await _db.from('creative_hub_global_state')
        .select('page_key, updated_at, updated_by_email').order('page_key');
      if (resp.error) throw resp.error;
      var data = resp.data;
      if (!data || !data.length) {
        list.innerHTML = '<em style="color:#888">No global state saved yet. Pages start with defaults until an admin saves.</em>';
        return;
      }
      var html = '<div style="display:flex;flex-direction:column;gap:3px">';
      data.forEach(function (r) {
        html += '<a href="#" class="chg-row" data-page="' + _chAttr(r.page_key) + '" style="font-size:12px;color:#0077B5;text-decoration:none;padding:5px 8px;border-radius:4px">' +
                  '<strong>' + _chEsc(r.page_key) + '</strong>' +
                  '<div style="color:#888;font-size:10px;margin-top:1px">' + _chEsc(_chFmtAgo(r.updated_at)) + ' · by ' + _chEsc(r.updated_by_email || 'unknown') + '</div>' +
                '</a>';
      });
      html += '</div>';
      list.innerHTML = html;
      list.querySelectorAll('.chg-row').forEach(function (a) {
        a.addEventListener('click', async function (e) {
          e.preventDefault();
          list.querySelectorAll('.chg-row').forEach(function (x) { x.style.background = ''; });
          a.style.background = '#dbe7f0';
          await chgSelect(a.dataset.page);
        });
      });
    } catch (e) {
      list.innerHTML = '<em style="color:#c00">Failed: ' + _chEsc(e.message || String(e)) + '</em>';
    }
  }

  async function chgSelect(pageKey) {
    _chgSelected = { page_key: pageKey };
    document.getElementById('chg-selected-label').textContent = pageKey;
    var ta = document.getElementById('chg-state-edit');
    ta.value = 'Loading…';
    document.getElementById('chg-save').disabled  = true;
    document.getElementById('chg-clear').disabled = true;
    _chgMsg('');
    try {
      var resp = await _db.from('creative_hub_global_state')
        .select('state, updated_at, updated_by_email').eq('page_key', pageKey).maybeSingle();
      if (resp.error) throw resp.error;
      ta.value = JSON.stringify(resp.data ? resp.data.state : null, null, 2);
      document.getElementById('chg-save').disabled  = false;
      document.getElementById('chg-clear').disabled = !resp.data;
    } catch (e) { ta.value = 'Failed to load: ' + (e.message || e); }
  }

  async function chgSaveCurrent() {
    if (!_chgSelected) return;
    var ta = document.getElementById('chg-state-edit');
    var parsed;
    try { parsed = JSON.parse(ta.value); }
    catch (e) { _chgMsg('Invalid JSON: ' + e.message); return; }
    _chgMsg('Saving…', true);
    try {
      var resp = await _db.from('creative_hub_global_state').upsert({
        page_key: _chgSelected.page_key, state: parsed,
        updated_at: new Date().toISOString(),
        updated_by_email: (_currentUser && _currentUser.email) || null,
      }, { onConflict: 'page_key' });
      if (resp.error) throw resp.error;
      logActivity('edit', 'creative-hub:GLOBAL/' + _chgSelected.page_key, 'Saved global state JSON', 'creative-hub');
      _chgMsg('Saved.', true);
      chgReloadList();
    } catch (e) { _chgMsg('Save failed: ' + (e.message || e)); }
  }

  async function chgClearCurrent() {
    if (!_chgSelected) return;
    if (!confirm('Delete the global state for "' + _chgSelected.page_key + '"? Every user will see defaults until someone saves a new global version.')) return;
    _chgMsg('Deleting…', true);
    try {
      var resp = await _db.from('creative_hub_global_state').delete()
        .eq('page_key', _chgSelected.page_key);
      if (resp.error) throw resp.error;
      logActivity('delete', 'creative-hub:GLOBAL/' + _chgSelected.page_key, 'Deleted global state row', 'creative-hub');
      _chgMsg('Deleted.', true);
      document.getElementById('chg-state-edit').value = '';
      document.getElementById('chg-selected-label').textContent = 'none';
      document.getElementById('chg-save').disabled  = true;
      document.getElementById('chg-clear').disabled = true;
      _chgSelected = null;
      chgReloadList();
    } catch (e) { _chgMsg('Delete failed: ' + (e.message || e)); }
  }

  /* ── Pending Save Requests section ── */
  async function chrReload() {
    var list = document.getElementById('chr-list');
    if (!list) return;
    if (!_db) { list.innerHTML = '<em style="color:#888">DB not connected.</em>'; return; }
    list.innerHTML = '<em style="color:#888">Loading…</em>';
    try {
      var resp = await _db.from('creative_hub_save_requests')
        .select('id, page_key, requester_email, requested_at, note')
        .eq('status', 'pending').order('requested_at', { ascending: false });
      if (resp.error) throw resp.error;
      var data = resp.data;
      if (!data || !data.length) {
        list.innerHTML = '<em style="color:#888">No pending requests.</em>';
        document.getElementById('chr-detail').style.display = 'none';
        _chrSelected = null;
        return;
      }
      var html = '<div style="display:flex;flex-direction:column;gap:4px">';
      data.forEach(function (r) {
        html += '<a href="#" class="chr-row" data-id="' + _chAttr(r.id) + '" style="font-size:12px;color:#0077B5;text-decoration:none;padding:6px 8px;border-radius:4px;background:rgba(255,255,255,0.5)">' +
                  '<strong>' + _chEsc(r.page_key) + '</strong>' +
                  '<span style="color:#666"> · ' + _chEsc(r.requester_email) + '</span>' +
                  '<span style="color:#888;font-size:10px"> · ' + _chEsc(_chFmtAgo(r.requested_at)) + '</span>' +
                  (r.note ? '<div style="color:#444;font-size:11px;margin-top:2px;font-style:italic">"' + _chEsc(r.note) + '"</div>' : '') +
                '</a>';
      });
      html += '</div>';
      list.innerHTML = html;
      list.querySelectorAll('.chr-row').forEach(function (a) {
        a.addEventListener('click', async function (e) {
          e.preventDefault();
          list.querySelectorAll('.chr-row').forEach(function (x) { x.style.background = 'rgba(255,255,255,0.5)'; });
          a.style.background = '#ffe8a8';
          await chrSelect(a.dataset.id);
        });
      });
    } catch (e) {
      list.innerHTML = '<em style="color:#c00">Failed: ' + _chEsc(e.message || String(e)) + '</em>';
    }
  }

  async function chrSelect(id) {
    _chrSelected = { id: id };
    var detail = document.getElementById('chr-detail');
    detail.style.display = 'block';
    document.getElementById('chr-detail-meta').textContent = 'Loading…';
    document.getElementById('chr-detail-json').value = '';
    try {
      var resp = await _db.from('creative_hub_save_requests')
        .select('page_key, requester_email, requested_at, state, note').eq('id', id).maybeSingle();
      if (resp.error) throw resp.error;
      var data = resp.data;
      if (!data) { _chrMsg('Request not found.'); return; }
      document.getElementById('chr-detail-meta').textContent = data.requester_email + ' for ' + data.page_key + ' · ' + _chFmtAgo(data.requested_at);
      document.getElementById('chr-detail-json').value = JSON.stringify(data.state, null, 2);
      _chrSelected.state   = data.state;
      _chrSelected.pageKey = data.page_key;
      _chrSelected.email   = data.requester_email;
    } catch (e) { _chrMsg('Load failed: ' + (e.message || e)); }
  }

  async function chrApproveSelected() {
    if (!_chrSelected || !_chrSelected.state) return;
    if (!confirm('Promote ' + _chrSelected.email + "'s submission for " + _chrSelected.pageKey + ' to GLOBAL? This becomes the version everyone sees.')) return;
    _chrMsg('Promoting…', true);
    try {
      var meEmail = (_currentUser && _currentUser.email) || null;
      var nowIso  = new Date().toISOString();
      var r1 = await _db.from('creative_hub_global_state').upsert({
        page_key: _chrSelected.pageKey, state: _chrSelected.state,
        updated_at: nowIso, updated_by_email: meEmail,
      }, { onConflict: 'page_key' });
      if (r1.error) throw r1.error;
      var r2 = await _db.from('creative_hub_save_requests').update({
        status: 'approved', processed_by_email: meEmail, processed_at: nowIso,
      }).eq('id', _chrSelected.id);
      if (r2.error) throw r2.error;
      logActivity('approve', 'creative-hub:GLOBAL/' + _chrSelected.pageKey, 'Promoted request from ' + _chrSelected.email, 'creative-hub');
      _chrMsg('Approved + promoted.', true);
      _chrSelected = null;
      document.getElementById('chr-detail').style.display = 'none';
      await Promise.all([chrReload(), chgReloadList()]);
    } catch (e) { _chrMsg('Approve failed: ' + (e.message || e)); }
  }

  async function chrRejectSelected() {
    if (!_chrSelected) return;
    if (!confirm('Reject ' + _chrSelected.email + "'s submission for " + _chrSelected.pageKey + '? Their local copy is unaffected; the request is just dismissed.')) return;
    _chrMsg('Rejecting…', true);
    try {
      var resp = await _db.from('creative_hub_save_requests').update({
        status: 'rejected',
        processed_by_email: (_currentUser && _currentUser.email) || null,
        processed_at: new Date().toISOString(),
      }).eq('id', _chrSelected.id);
      if (resp.error) throw resp.error;
      logActivity('reject', 'creative-hub:request/' + _chrSelected.pageKey, 'Rejected request from ' + _chrSelected.email, 'creative-hub');
      _chrMsg('Rejected.', true);
      _chrSelected = null;
      document.getElementById('chr-detail').style.display = 'none';
      await chrReload();
    } catch (e) { _chrMsg('Reject failed: ' + (e.message || e)); }
  }
</script>
</body>
</html>
