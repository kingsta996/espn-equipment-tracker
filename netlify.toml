[build]
  command = "bash build.sh"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Cross-origin isolation just for commercials.html so FFmpeg.wasm can use
# SharedArrayBuffer for the slate-prepend pipeline. Other Hub pages don't
# need (and shouldn't pay for) this isolation.
#
# - COEP=credentialless is more lenient than require-corp: cross-origin
#   resources don't need to advertise CORP, they just lose credentials
#   on no-cors fetches. Still enables crossOriginIsolated.
# - COOP=same-origin-allow-popups keeps SAB available while letting us
#   pop the Box File Request URL into a new tab via window.open().
[[headers]]
  for = "/commercials.html"
  [headers.values]
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy   = "same-origin-allow-popups"

# Proxy the WSC / Wowza blob storage so HLS.js can play it from the browser.
# Wowza's blob endpoints return no Access-Control-Allow-Origin header, so a
# direct fetch from the WSC Capture Portal fails CORS. Rewrites are
# same-origin from the browser's perspective so no CORS preflight is needed.
[[redirects]]
  from = "/wsc-blob/*"
  to = "https://wowzaprodeus2.blob.core.windows.net/:splat"
  status = 200
  force = true

# Container listing endpoint (for auto-discovering which encoder slots are
# currently flowing). Same-origin via this rewrite; the upstream blob list
# is publicly readable.
[[redirects]]
  from = "/wsc-blob-list/*"
  to = "https://wowzaprodeus2.blob.core.windows.net/:splat"
  status = 200
  force = true

# WSC ingest encoder HLS (CUSA1–10/15). Server is HTTP-only on port 1935,
# so it would be blocked as mixed content from an HTTPS Netlify page.
# Rewrite makes it same-origin HTTPS at /wsc-encoder/<encoderId>/manifest.m3u8.
[[redirects]]
  from = "/wsc-encoder/*"
  to = "http://wsc-rtmp-sus.southcentralus.cloudapp.azure.com:1935/CUSA/:splat"
  status = 200
  force = true
