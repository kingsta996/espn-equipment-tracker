<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUSA Master Roster</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="config.js"></script>
<style>
  :root {
    --navy: #00263A;
    --gray: #BFCED6;
    --white: #FFFFFF;
    --red: #E40046;
    --blue: #00B5E2;
    --green: #A7D500;
    --espn-red: #EF4035;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f4f6f8; font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; min-height: 100vh; color: #222; }

  /* Header — matches viewership.html / schedule.html / commercials.html */
  .header {
    background: var(--navy);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    border-bottom: 3px solid var(--espn-red);
  }
  .header img { height: 26px; filter: brightness(0) invert(1); }
  .header h1 { color: var(--white); font-size: 16px; margin: 0; flex: 1; font-weight: 700; }
  .header a { color: var(--gray); font-size: 11px; text-decoration: none; white-space: nowrap; padding: 4px 10px; border-radius: 5px; }
  .header a:hover { color: var(--white); background: rgba(255,255,255,0.08); }
  .hdr-fallback { color: var(--white); font-weight: 900; letter-spacing: -0.5px; font-size: 18px; }

  main { max-width: 1500px; margin: 0 auto; padding: 22px; }
  .controls {
    background: #fff; padding: 16px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px;
  }
  .controls label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .controls select, .controls button, .controls input {
    padding: 8px 12px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 6px;
    font-family: inherit; background: #fff;
  }
  .controls select:disabled, .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--navy); color: #fff; border: 0; padding: 9px 16px; cursor: pointer; font-weight: 600; }
  .btn-primary:not(:disabled):hover { background: #001f30; }
  .btn-export { background: var(--green); color: var(--navy); border: 0; padding: 9px 16px; cursor: pointer; font-weight: 700; }
  .btn-export:not(:disabled):hover { background: #95c200; }
  .status {
    flex: 1; min-width: 200px; font-size: 12px; color: #555; text-align: right;
  }
  .status.ok { color: #166534; font-weight: 600; }
  .status.err { color: #991b1b; font-weight: 600; }
  .table-wrap {
    background: #fff; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    overflow: auto; max-height: calc(100vh - 240px);
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead { background: var(--navy); color: #fff; position: sticky; top: 0; z-index: 1; }
  thead th { padding: 10px 8px; text-align: left; font-weight: 600; font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase; white-space: nowrap; }
  tbody td { border-bottom: 1px solid #eef0f2; padding: 0; }
  tbody td input {
    width: 100%; padding: 8px; border: 0; background: transparent;
    font-family: inherit; font-size: 12px; color: #222;
  }
  tbody td input:focus { outline: 2px solid var(--blue); outline-offset: -2px; background: #fff; }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:hover { background: rgba(0,181,226,0.06); }
  .empty {
    padding: 80px 20px; text-align: center; color: #888; font-size: 14px;
  }
  .empty h3 { color: #444; margin-bottom: 8px; font-size: 16px; }
  .row-actions { width: 40px; text-align: center; }
  .remove-btn {
    background: transparent; border: 0; color: #c00; cursor: pointer; font-size: 14px; padding: 4px 6px;
  }
  .remove-btn:hover { background: rgba(239,64,53,0.1); border-radius: 4px; }
  .add-row-bar {
    background: #fff; padding: 12px 16px; border-top: 1px solid #eef0f2;
    display: flex; align-items: center; gap: 10px; font-size: 12px; color: #666;
  }
  .add-row-bar button {
    background: var(--blue); color: #fff; border: 0; padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-weight: 600; font-size: 12px;
  }
  .add-row-bar button:hover { background: #009ec8; }
  .stub-msg {
    background: #fff8e1; border: 1px solid #fbcf00; border-radius: 8px;
    padding: 16px; margin: 16px 0; color: #6b4c00; font-size: 13px;
  }

  /* Parse-status bar — visible indicator for any URL/link fetch */
  .parse-status {
    display: none;
    background: #fff; border: 1px solid #d1d5db; border-radius: 8px;
    padding: 12px 14px; margin-bottom: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .parse-status.active { display: block; }
  .parse-status .ps-label {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--navy); font-weight: 600;
    margin-bottom: 8px;
  }
  .parse-status .ps-spinner {
    width: 14px; height: 14px;
    border: 2px solid #e5e7eb;
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: ps-spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes ps-spin { to { transform: rotate(360deg); } }
  .parse-status .ps-bar {
    position: relative; height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden;
  }
  .parse-status .ps-bar::before {
    content: ''; position: absolute; top: 0; bottom: 0; left: -30%; width: 30%;
    background: var(--blue); border-radius: 2px;
    animation: ps-indet 1.4s ease-in-out infinite;
  }
  @keyframes ps-indet {
    0%   { left: -30%; }
    100% { left: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="Logos/Hub/cusa%20espn%20cobrand%201C%20white.png"
       alt="CUSA ESPN"
       onerror="this.style.display='none'; document.querySelector('.hdr-fallback').style.display='inline'">
  <span class="hdr-fallback" style="display:none">CUSA × ESPN</span>
  <h1>📋 Master Roster</h1>
  <a href="hub.html">← Hub</a>
</div>

<main>
  <div class="controls">
    <label for="schoolSel">School</label>
    <select id="schoolSel"></select>
    <label for="sportSel">Sport</label>
    <select id="sportSel"></select>
    <button id="loadBtn" class="btn-primary">📥 Load from Master Roster</button>
    <button id="downloadBtn" class="btn-export" disabled>⬇ Download Excel</button>
    <span class="status" id="status">Pick a school and sport, then load the roster (from Master Roster or a school URL).</span>
  </div>
  <div class="controls" style="margin-top:0">
    <label for="rosterUrl">Or pull from URL</label>
    <input type="url" id="rosterUrl" placeholder="https://fiusports.com/sports/baseball/roster" style="flex:1;min-width:260px;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px">
    <button id="pullBtn" class="btn-primary">🌐 Pull from URL</button>
  </div>

  <div id="parseStatus" class="parse-status">
    <div class="ps-label"><div class="ps-spinner"></div><span id="parseStatusLabel">Working…</span></div>
    <div class="ps-bar"></div>
  </div>

  <div id="content" class="table-wrap">
    <div class="empty">
      <h3>No roster loaded</h3>
      <p>Select a school and sport above and click <strong>Load Roster</strong> to pull data from the Master Roster scraper.</p>
    </div>
  </div>
</main>

<script>
  /* ── Constants ── */
  const MASTER_ROSTER_SHEET_ID = '1NpjMZH0p70pYAnZ_BkqxevJ5XoZDoeucZq4nF1cAw50';

  // "Pull from URL" backend. Default tries a chain of public CORS proxies —
  // many SideArm-powered college athletics sites (UAB, etc.) block one or
  // more proxies, so we fall through the list until one works. If every
  // proxy fails for a specific school, an admin can opt into the Apps-Script
  // fallback by running this in the browser console:
  //   localStorage.setItem('cusa_roster_use_apps_script', 'true')
  //   localStorage.setItem('cusa_roster_scraper_url', '<APPS SCRIPT URL>')
  // (See apps-script/roster-scraper.gs for the script + deploy steps.)
  const CORS_PROXIES = [
    { name: 'corsproxy.io',       build: u => 'https://corsproxy.io/?' + encodeURIComponent(u) },
    { name: 'allorigins.win',     build: u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u) },
    { name: 'codetabs.com',       build: u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u) }
  ];
  const APPS_SCRIPT_FLAG = 'cusa_roster_use_apps_script';
  const APPS_SCRIPT_URL_KEY = 'cusa_roster_scraper_url';

  // Map school-roster header names → the canonical 8-key shape we use
  // internally. We try patterns in order and pick the first match — this
  // means a school that surfaces a brand-new header like "Acad. Yr." or
  // "Eligibility" gets recognized without code changes. Anchors (^…$) keep
  // unrelated columns ("Years / at UAB") from being misidentified.
  const HEADER_PATTERNS = [
    { re: /^(#|no\.?|number|jersey(\s*#)?)$/i,                                                  key: '#' },
    { re: /^(full\s*name|name|player(\s+name)?)$/i,                                             key: 'name' },
    { re: /^(pos\.?|position)$/i,                                                               key: 'position' },
    { re: /^(height|ht\.?)$/i,                                                                  key: 'height' },
    { re: /^(weight|wt\.?|lbs?)$/i,                                                             key: 'weight' },
    { re: /^(class|yr\.?|cl\.?|year|academic\s+year|acad\.?\s*yr\.?|acad\.?\s*year|eligibility)$/i, key: 'class' },
    { re: /^hometown(\s*\/\s*(high\s*school|previous\s*school|last\s*school))?$/i,             key: 'hometown' },
    { re: /^high\s*school$/i,                                                                   key: 'hometown' },
    { re: /^(previous(\s+school)?|last\s+school|transfer(\s+from)?|prev\.?)$/i,                key: 'previous school' },
    { re: /^(bats|b)$/i,                                                                        key: 'bats' },
    { re: /^(throws|t)$/i,                                                                      key: 'throws' },
    { re: /^b\s*\/\s*t$/i,                                                                      key: 'bats_throws' }
  ];

  function detectHeader(header) {
    const norm = String(header || '').replace(/\s+/g, ' ').trim().toLowerCase();
    if (!norm) return null;
    for (const p of HEADER_PATTERNS) {
      if (p.re.test(norm)) return p.key;
    }
    return null;
  }
  // The Master Roster sheet has one data tab; School + Sport columns identify
  // each row. We fetch the whole tab once per Load Roster click and filter
  // client-side. Cheap (~3500 rows total) and avoids depending on whoever
  // last touched the dropdowns inside the Google Sheet.
  const MASTER_ROSTER_TAB = 'Master Roster';
  const SCHOOLS = [
    'Delaware','FIU','Jacksonville State','Kennesaw State','Liberty',
    'Middle Tennessee','Missouri State','New Mexico State','Sam Houston','Western Kentucky'
  ];
  // Map UI school name → exact value in the Master Roster sheet's School column.
  const SCHOOL_TO_DATA_NAME = {
    'Western Kentucky': 'WKU'
  };
  const SPORTS = ['Football','MBB','WBB','Baseball','Softball','Soccer','Volleyball'];

  /* ── Sport-specific configuration ───────────────────────────────────────
     Each entry describes:
       template      Path to the xlsx template (committed to repo).
       dataStartRow  1-indexed row where player data begins in the Roster tab.
       columns       Array describing the editable columns we render in the
                     HTML table AND write back into the template. Each entry:
                       { label, key, col, transform?, width? }
                     - label: header shown in the table
                     - key:   property name on the parsed row object
                     - col:   1-indexed Excel column to write to in the Roster
                     - transform: optional fn to convert source → cell value
       fromSource   Function: (row, allRows) → object with the keys above.
                    Receives the parsed CSV row (lowercase-keyed) and may
                    derive values (e.g. split first/last name).
  */

  const FOOTBALL_POSITION_MAP = {
    'quarterback': 'QB', 'wide receiver': 'WR', 'tight end': 'TE',
    'running back': 'RB', 'fullback': 'FB', 'halfback': 'HB',
    'offensive line': 'OL', 'offensive lineman': 'OL', 'center': 'C',
    'offensive guard': 'OG', 'offensive tackle': 'OT',
    'left guard': 'LG', 'left tackle': 'LT', 'right guard': 'RG', 'right tackle': 'RT',
    'defensive line': 'DL', 'defensive lineman': 'DL', 'nose tackle': 'NT',
    'defensive tackle': 'DT', 'defensive end': 'DE',
    'linebacker': 'LB', 'middle linebacker': 'MLB', 'outside linebacker': 'OLB', 'inside linebacker': 'ILB',
    'defensive back': 'DB', 'cornerback': 'CB', 'safety': 'S',
    'free safety': 'FS', 'strong safety': 'SS',
    'kicker': 'K', 'punter': 'P',
    'kick returner': 'KR', 'punt returner': 'PR',
    'long snapper': 'LS', 'holder': 'H',
    'place kicker': 'K', 'placekicker': 'K'
  };

  const CLASS_TO_YEAR = {
    'fr': 1, 'fr.': 1, 'freshman': 1, 'rs fr': 1, 'rs fr.': 1, 'r-fr': 1, 'r-fr.': 1,
    'so': 2, 'so.': 2, 'sophomore': 2, 'rs so': 2, 'rs so.': 2, 'r-so': 2, 'r-so.': 2,
    'jr': 3, 'jr.': 3, 'junior': 3, 'rs jr': 3, 'rs jr.': 3, 'r-jr': 3, 'r-jr.': 3,
    'sr': 4, 'sr.': 4, 'senior': 4, 'rs sr': 4, 'rs sr.': 4, 'r-sr': 4, 'r-sr.': 4,
    'gr': 5, 'gr.': 5, 'graduate': 5
  };

  function splitName(full) {
    const t = (full || '').trim();
    if (!t) return { first: '', last: '' };
    const idx = t.indexOf(' ');
    if (idx === -1) return { first: t, last: '' };
    return { first: t.slice(0, idx), last: t.slice(idx + 1) };
  }

  function classToYear(s) {
    const k = (s || '').trim().toLowerCase();
    return CLASS_TO_YEAR[k] != null ? CLASS_TO_YEAR[k] : (s || '');
  }

  // Sort rows by jersey number ascending. Blank or non-numeric jerseys go last.
  function jerseyNum(v) {
    const m = String(v ?? '').match(/-?\d+/);
    return m ? parseInt(m[0], 10) : Number.POSITIVE_INFINITY;
  }
  function sortByJersey(rows) {
    rows.sort((a, b) => jerseyNum(a.jersey) - jerseyNum(b.jersey));
  }

  function trimHometown(s) {
    // Source: "Mooresville, N.C. / Mooresville" → "Mooresville, N.C."
    const t = (s || '').trim();
    const slash = t.indexOf(' / ');
    return slash >= 0 ? t.slice(0, slash).trim() : t;
  }

  function footballPosition(s) {
    const k = (s || '').trim().toLowerCase();
    return FOOTBALL_POSITION_MAP[k] || (s || '').trim();
  }

  // Soccer source is messy (D/Defender/DF/Defense/MD all mean Defender;
  // combos like "Midfield/Forward" or "MF/D" appear too). Collapse to one
  // of GK/D/M/F. Combos: take the first segment.
  const SOCCER_POSITION_MAP = {
    'gk': 'GK', 'goalkeeper': 'GK', 'goal keeper': 'GK', 'keeper': 'GK', 'g': 'GK',
    'd': 'D', 'df': 'D', 'def': 'D', 'defender': 'D', 'defense': 'D', 'md': 'D', 'back': 'D',
    'm': 'M', 'mf': 'M', 'mid': 'M', 'midfield': 'M', 'midfielder': 'M',
    'f': 'F', 'fw': 'F', 'fwd': 'F', 'forward': 'F', 'striker': 'F', 'attacker': 'F'
  };
  function soccerPosition(s) {
    const raw = (s || '').trim();
    if (!raw) return '';
    // Combos with /, comma, or " or " — take first segment.
    const first = raw.split(/[\/,]| or /i)[0].trim().toLowerCase();
    return SOCCER_POSITION_MAP[first] || raw.toUpperCase();
  }

  // The Master Roster tab returns numeric jersey numbers as floats ('1.0',
  // '27.0'). Strip the trailing '.0' so the cell looks like a jersey number.
  function cleanNum(v) {
    if (v == null || v === '') return '';
    const s = String(v).trim();
    if (/^-?\d+\.0+$/.test(s)) return s.replace(/\.0+$/, '');
    return s;
  }

  // Basketball: G / F / C plus combos like G/F, F/C, Guard/Forward, etc.
  const BASKETBALL_POSITION_MAP = {
    'g': 'G', 'guard': 'G',
    'f': 'F', 'forward': 'F',
    'c': 'C', 'center': 'C'
  };
  function basketballPosition(s) {
    const raw = (s || '').trim();
    if (!raw) return '';
    return raw.split('/')
      .map(p => p.trim().toLowerCase())
      .map(p => BASKETBALL_POSITION_MAP[p] || p.toUpperCase())
      .join('/');
  }

  // Volleyball: template recognizes OPP/OH/MB/S/L. Source data also uses
  // RS (Right Side, → OPP), DS (Defensive Specialist, → L), MH (Middle
  // Hitter, → MB), and combos like "OH/RS" or "DS/L" (take first segment).
  const VB_POSITION_MAP = {
    'oh': 'OH', 'outside': 'OH', 'outside hitter': 'OH', 'o': 'OH',
    'mb': 'MB', 'middle': 'MB', 'middle blocker': 'MB', 'mh': 'MB',
    's':  'S',  'setter': 'S',
    'l':  'L',  'libero': 'L',
    'opp': 'OPP', 'opposite': 'OPP', 'opposite hitter': 'OPP',
    'rs': 'OPP', 'right side': 'OPP', 'right side hitter': 'OPP', 'rsh': 'OPP',
    'ds': 'L',  'defensive specialist': 'L'
  };
  function vbPosition(s) {
    const raw = (s || '').trim();
    if (!raw) return '';
    const first = raw.split(/[\/,]| or /i)[0].trim().toLowerCase();
    return VB_POSITION_MAP[first] || raw.toUpperCase();
  }

  // Baseball / Softball share the Diamond template. Source data uses a mix
  // of abbreviations and long names. Combos (INF/OF, RHP/INF, C/UTL) take
  // the first segment. Specific base codes (1B, 2B, 3B, SS, DH) pass through.
  const DIAMOND_POSITION_MAP = {
    'p': 'P', 'pitcher': 'P',
    'rhp': 'RHP', 'right handed pitcher': 'RHP', 'right-handed pitcher': 'RHP',
    'lhp': 'LHP', 'left handed pitcher': 'LHP', 'left-handed pitcher': 'LHP',
    'c': 'C', 'catcher': 'C',
    'inf': 'INF', 'if': 'INF', 'infield': 'INF', 'infielder': 'INF',
    'of': 'OF', 'outfield': 'OF', 'outfielder': 'OF',
    'utl': 'UTL', 'ut': 'UTL', 'util': 'UTL', 'utility': 'UTL',
    '1b': '1B', '2b': '2B', '3b': '3B', 'ss': 'SS', 'dh': 'DH'
  };
  function diamondPosition(s) {
    const raw = (s || '').trim();
    if (!raw) return '';
    const first = raw.split(/[\/,]| or /i)[0].trim().toLowerCase();
    return DIAMOND_POSITION_MAP[first] || raw.toUpperCase();
  }

  // CBB template's row-2 hint says "Enter FR, SO, JR, or SR" — so the Year
  // column wants text abbreviations, not numbers like the football template.
  function classToYearText(s) {
    const k = (s || '').trim().toLowerCase();
    if (/^(r[-\s]?fr|fr|freshman)/.test(k)) return 'FR';
    if (/^(r[-\s]?so|so|sophomore)/.test(k)) return 'SO';
    if (/^(r[-\s]?jr|jr|junior)/.test(k))    return 'JR';
    if (/^(r[-\s]?sr|sr|senior)/.test(k))    return 'SR';
    if (/^(gr|graduate)/.test(k))            return 'GR';
    return (s || '').trim();
  }

  /* ── Sport config ── */
  const SPORT_CONFIG = {
    'Football': {
      template: 'templates/master-roster/football.xlsx',
      dataStartRow: 3,
      columns: [
        { label: 'Jersey',     key: 'jersey',   col: 1,  width: 70 },
        { label: 'Display',    key: 'display',  col: 2,  width: 70 },
        { label: 'First Name', key: 'first',    col: 3,  width: 130 },
        { label: 'Last Name',  key: 'last',     col: 4,  width: 140 },
        { label: 'POS',        key: 'pos',      col: 5,  width: 70 },
        { label: 'Height',     key: 'height',   col: 6,  width: 80 },
        { label: 'Weight',     key: 'weight',   col: 7,  width: 70 },
        { label: 'Hometown',   key: 'hometown', col: 8,  width: 200 },
        { label: 'Year',       key: 'year',     col: 9,  width: 70 },
        { label: 'Bio Fact',   key: 'bio',      col: 10, width: 220 }
      ],
      fromSource: (r) => {
        const { first, last } = splitName(r['name']);
        const num = cleanNum(r['#']);
        return {
          jersey:   num,
          display:  num,
          first, last,
          pos:      footballPosition(r['position']),
          height:   r['height'] || '',
          weight:   cleanNum(r['weight']),
          hometown: trimHometown(r['hometown']),
          year:     classToYear(r['class']),
          bio:      (r['previous school'] || '').trim().toUpperCase()
        };
      }
    },
    'Soccer': {
      template: 'templates/master-roster/soccer.xlsx',
      dataStartRow: 4, // Soccer template puts column headers on row 3, data starts row 4
      columns: [
        { label: 'Jersey',       key: 'jersey',   col: 1,  width: 70 },
        { label: 'Display',      key: 'display',  col: 2,  width: 70 },
        { label: 'First Name',   key: 'first',    col: 3,  width: 130 },
        { label: 'Last Name',    key: 'last',     col: 4,  width: 140 },
        { label: 'POS',          key: 'pos',      col: 5,  width: 70 },
        { label: 'Height',       key: 'height',   col: 6,  width: 80 },
        { label: 'Weight',       key: 'weight',   col: 7,  width: 70 },
        { label: 'Birthday',     key: 'birthday', col: 8,  width: 100 },
        { label: 'Hometown',     key: 'hometown', col: 9,  width: 200 },
        { label: 'Year',         key: 'year',     col: 10, width: 70 },
        { label: 'Major',        key: 'major',    col: 11, width: 140 },
        { label: 'Bio Dropline', key: 'bio',      col: 12, width: 220 },
        { label: 'Goals',        key: 'goals',    col: 13, width: 80 }
      ],
      fromSource: (r) => {
        const { first, last } = splitName(r['name']);
        const num = cleanNum(r['#']);
        return {
          jersey:   num,
          display:  num,
          first, last,
          pos:      soccerPosition(r['position']),
          height:   r['height'] || '',
          weight:   cleanNum(r['weight']),
          birthday: '',
          hometown: trimHometown(r['hometown']),
          year:     classToYear(r['class']),
          major:    '',
          bio:      (r['previous school'] || '').trim().toUpperCase(),
          goals:    ''
        };
      }
    }
    /* Baseball / Softball / Volleyball — confirm one at a time. */
  };

  // MBB and WBB share the same template + same column shape. Both registered
  // against one config object so any future tweak only happens in one place.
  const BASKETBALL_CONFIG = {
    template: 'templates/master-roster/basketball.xlsx',
    dataStartRow: 4,
    columns: [
      { label: 'Jersey',         key: 'jersey',   col: 1,  width: 70 },
      { label: 'Display',        key: 'display',  col: 2,  width: 70 },
      { label: 'First Name',     key: 'first',    col: 3,  width: 130 },
      { label: 'Last Name',      key: 'last',     col: 4,  width: 140 },
      { label: 'POS',            key: 'pos',      col: 5,  width: 70 },
      { label: 'Height',         key: 'height',   col: 6,  width: 80 },
      { label: 'Weight',         key: 'weight',   col: 7,  width: 70 },
      { label: 'Birthday',       key: 'birthday', col: 8,  width: 100 },
      { label: 'Hometown',       key: 'hometown', col: 9,  width: 200 },
      { label: 'Year',           key: 'year',     col: 10, width: 70 },
      { label: 'Major',          key: 'major',    col: 11, width: 140 },
      { label: 'Bio Dropline',   key: 'bio',      col: 12, width: 220 },
      { label: 'ESPN 100 Rank',  key: 'rank',     col: 13, width: 110 }
    ],
    fromSource: (r) => {
      const { first, last } = splitName(r['name']);
      const num = cleanNum(r['#']);
      return {
        jersey:   num,
        display:  num,
        first, last,
        pos:      basketballPosition(r['position']),
        height:   r['height'] || '',
        weight:   cleanNum(r['weight']),
        birthday: '',
        hometown: trimHometown(r['hometown']),
        year:     classToYearText(r['class']),
        major:    '',
        bio:      (r['previous school'] || '').trim().toUpperCase(),
        rank:     ''
      };
    }
  };
  SPORT_CONFIG['MBB'] = BASKETBALL_CONFIG;
  SPORT_CONFIG['WBB'] = BASKETBALL_CONFIG;

  // Baseball + Softball share the Diamond template. Note: the template's
  // Roster tab is normally computed from a MAIN tab via VLOOKUPs, but we
  // overwrite the Roster cells with hardcoded values directly — same pattern
  // as the other sports. The MAIN tab gets dropped in the export anyway.
  // Source data has no Bats/Throws columns, so those export blank for the
  // user to fill in before sending the file off.
  const DIAMOND_CONFIG = {
    template: 'templates/master-roster/diamond.xlsx',
    dataStartRow: 4,
    columns: [
      { label: 'Jersey',        key: 'jersey',   col: 1,  width: 70 },
      { label: 'Display',       key: 'display',  col: 2,  width: 70 },
      { label: 'First Name',    key: 'first',    col: 3,  width: 130 },
      { label: 'Last Name',     key: 'last',     col: 4,  width: 140 },
      { label: 'POS',           key: 'pos',      col: 5,  width: 70 },
      { label: 'Bats',          key: 'bats',     col: 6,  width: 70 },
      { label: 'Throws',        key: 'throws',   col: 7,  width: 70 },
      { label: 'Height',        key: 'height',   col: 8,  width: 80 },
      { label: 'Weight',        key: 'weight',   col: 9,  width: 70 },
      { label: 'Birthday',      key: 'birthday', col: 10, width: 100 },
      { label: 'Hometown',      key: 'hometown', col: 11, width: 200 },
      { label: 'Year',          key: 'year',     col: 12, width: 70 },
      { label: 'Major',         key: 'major',    col: 13, width: 140 },
      { label: 'Bio Dropline',  key: 'bio',      col: 14, width: 220 },
      { label: 'ESPN 100 Rank', key: 'rank',     col: 15, width: 110 }
    ],
    fromSource: (r) => {
      const { first, last } = splitName(r['name']);
      const num = cleanNum(r['#']);
      return {
        jersey:   num,
        display:  num,
        first, last,
        pos:      diamondPosition(r['position']),
        bats:     '',
        throws:   '',
        height:   r['height'] || '',
        weight:   cleanNum(r['weight']),
        birthday: '',
        hometown: trimHometown(r['hometown']),
        year:     classToYear(r['class']),  // numeric (1=FR, 2=SO, 3=JR, 4=SR/GR)
        major:    '',
        bio:      (r['previous school'] || '').trim().toUpperCase(),
        rank:     ''
      };
    }
  };
  SPORT_CONFIG['Baseball'] = DIAMOND_CONFIG;
  SPORT_CONFIG['Softball'] = DIAMOND_CONFIG;

  SPORT_CONFIG['Volleyball'] = {
    template: 'templates/master-roster/volleyball.xlsx',
    dataStartRow: 4,
    columns: [
      { label: 'Jersey',         key: 'jersey',   col: 1,  width: 70 },
      { label: 'Display',        key: 'display',  col: 2,  width: 70 },
      { label: 'First Name',     key: 'first',    col: 3,  width: 130 },
      { label: 'Last Name',      key: 'last',     col: 4,  width: 140 },
      { label: 'POS',            key: 'pos',      col: 5,  width: 70 },
      { label: 'Height',         key: 'height',   col: 6,  width: 80 },
      { label: 'Weight',         key: 'weight',   col: 7,  width: 70 },
      { label: 'Birthday',       key: 'birthday', col: 8,  width: 100 },
      { label: 'Hometown',       key: 'hometown', col: 9,  width: 200 },
      { label: 'Year',           key: 'year',     col: 10, width: 70 },
      { label: 'Major',          key: 'major',    col: 11, width: 140 },
      { label: 'Bio Dropline',   key: 'bio',      col: 12, width: 220 },
      { label: 'ESPN 100 Rank',  key: 'rank',     col: 13, width: 110 }
    ],
    fromSource: (r) => {
      const { first, last } = splitName(r['name']);
      const num = cleanNum(r['#']);
      return {
        jersey:   num,
        display:  num,
        first, last,
        pos:      vbPosition(r['position']),
        height:   r['height'] || '',
        weight:   cleanNum(r['weight']),
        birthday: '',
        hometown: trimHometown(r['hometown']),
        year:     classToYear(r['class']),  // numeric (1=FR, 2=SO, 3=JR, 4=SR)
        major:    '',
        bio:      (r['previous school'] || '').trim().toUpperCase(),
        rank:     ''
      };
    }
  };

  /* ── State ── */
  let _rows = [];          // editable row objects
  let _config = null;      // current sport config
  let _currentSchool = '';
  let _currentSport = '';

  /* ── Init ── */
  document.addEventListener('DOMContentLoaded', () => {
    const schoolSel = document.getElementById('schoolSel');
    SCHOOLS.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      schoolSel.appendChild(opt);
    });
    const sportSel = document.getElementById('sportSel');
    SPORTS.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sportSel.appendChild(opt);
    });
    document.getElementById('loadBtn').addEventListener('click', loadRoster);
    document.getElementById('downloadBtn').addEventListener('click', downloadExcel);
    document.getElementById('pullBtn').addEventListener('click', pullFromURL);
    document.getElementById('rosterUrl').addEventListener('keydown', e => {
      if (e.key === 'Enter') pullFromURL();
    });
  });

  /* ── Pull from URL ─────────────────────────────────────────────────────
     Default backend: a public CORS proxy that fetches the school's roster
     page so we can parse the HTML and find the table whose headers contain
     '#' + 'Full Name'. The Apps Script script in apps-script/roster-scraper.gs
     is kept as a fallback you can opt into per browser via localStorage.
  */
  async function pullFromURL() {
    const url = (document.getElementById('rosterUrl').value || '').trim();
    const sport = document.getElementById('sportSel').value;
    const school = document.getElementById('schoolSel').value;
    const cfg = SPORT_CONFIG[sport];
    if (!url) { setStatus('Paste a roster URL first.', 'err'); return; }
    if (!cfg) { setStatus(`${sport} isn't wired up.`, 'err'); return; }
    if (!/^https?:\/\//i.test(url)) { setStatus('URL must start with http:// or https://.', 'err'); return; }

    setStatus(`Scraping ${url}…`);
    startParseStatus(`Scraping ${url}…`);
    document.getElementById('pullBtn').disabled = true;
    document.getElementById('loadBtn').disabled = true;

    try {
      const useAppsScript = localStorage.getItem(APPS_SCRIPT_FLAG) === 'true';
      const scraped = useAppsScript ? await fetchViaAppsScript(url) : await fetchViaCorsProxy(url);
      updateParseStatus(`Parsing roster table…`);

      // Map scraped headers → our canonical 8-key shape via pattern detection.
      // Track which columns couldn't be matched so we can surface them in the
      // status line — that way an admin notices when a school's site uses a
      // header we haven't accounted for.
      const canonKeys = scraped.headers.map(detectHeader);
      const unmapped = scraped.headers.filter((h, i) => !canonKeys[i] && String(h || '').trim() !== '');
      if (unmapped.length) console.warn('[roster] Unmapped headers:', unmapped);

      const sourceRows = scraped.rows.map(row => {
        const obj = {};
        canonKeys.forEach((k, i) => {
          if (!k) return;
          if (k === 'bats_throws') {
            // Some pages combine "Bats/Throws" as one column like "R/R"
            const parts = String(row[i] || '').split('/');
            obj['bats']   = (parts[0] || '').trim();
            obj['throws'] = (parts[1] || '').trim();
          } else {
            obj[k] = row[i];
          }
        });
        return obj;
      }).filter(r => (r['name'] || '').toString().trim() !== '');

      if (!sourceRows.length) {
        throw new Error('Found a matching table but no usable rows.');
      }

      _rows = sourceRows.map(cfg.fromSource);
      sortByJersey(_rows);
      _config = cfg;
      _currentSchool = school;
      _currentSport = sport;
      renderTable();
      document.getElementById('downloadBtn').disabled = !_rows.length;
      const unmappedNote = unmapped.length
        ? ` (skipped: ${unmapped.map(h => `"${h}"`).join(', ')})`
        : '';
      setStatus(
        `Loaded ${_rows.length} player${_rows.length === 1 ? '' : 's'} from URL (table ${scraped.tableNum})${unmappedNote}.`,
        'ok'
      );
    } catch (err) {
      console.error(err);
      setStatus('Pull failed: ' + (err.message || err), 'err');
    } finally {
      document.getElementById('pullBtn').disabled = false;
      document.getElementById('loadBtn').disabled = false;
      endParseStatus();
    }
  }

  /* CORS-proxy path: fetch the page raw, parse with DOMParser, walk every
     <table> in document order until one matches. Document order = the same
     numbering IMPORTHTML uses for its "table N" parameter, so a roster the
     user previously found at table 3 will report tableNum=3 here too.

     Tries each proxy in CORS_PROXIES in order; the first successful fetch
     wins. School athletics sites often block one or two proxies but rarely
     all three. */
  async function fetchHtmlViaProxies(url) {
    const failures = [];
    for (const proxy of CORS_PROXIES) {
      try {
        setStatus(`Scraping ${url} (via ${proxy.name})…`);
        updateParseStatus(`Fetching via ${proxy.name}…`);
        const res = await fetch(proxy.build(url));
        if (!res.ok) {
          failures.push(`${proxy.name}: HTTP ${res.status}`);
          continue;
        }
        const html = await res.text();
        if (html.length < 200) {
          failures.push(`${proxy.name}: empty response`);
          continue;
        }
        return html;
      } catch (err) {
        failures.push(`${proxy.name}: ${err.message || 'fetch failed'}`);
      }
    }
    throw new Error(
      'All CORS proxies failed:\n  · ' + failures.join('\n  · ') +
      '\n\nThe school site may be blocking proxies. See apps-script/roster-scraper.gs to enable the Apps Script fallback.'
    );
  }

  async function fetchViaCorsProxy(url) {
    const html = await fetchHtmlViaProxies(url);
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const tables = doc.querySelectorAll('table');
    if (!tables.length) throw new Error('No <table> elements found on the page.');

    for (let i = 0; i < tables.length; i++) {
      const trs = Array.from(tables[i].querySelectorAll('tr'));
      if (!trs.length) continue;
      const headerCells = Array.from(trs[0].querySelectorAll('th, td'));
      const headers = headerCells.map(c => normalizeText(c.textContent));
      const lower = headers.map(h => h.toLowerCase());
      const hasNum  = lower.includes('#') || lower.includes('no.') || lower.includes('jersey');
      const hasName = lower.some(h => h === 'full name' || h === 'name' || h === 'player' || h === 'player name');
      if (!hasNum || !hasName) continue;

      const rows = trs.slice(1).map(tr =>
        Array.from(tr.querySelectorAll('th, td')).map(c => normalizeText(c.textContent))
      ).filter(r => r.some(c => c !== ''));
      return { headers, rows, tableNum: i + 1 };
    }
    throw new Error('No table with "#" + "Full Name" headers found on the page.');
  }

  function normalizeText(s) {
    return String(s || '').replace(/\s+/g, ' ').trim();
  }

  /* Apps Script fallback — opt-in via localStorage flag. See top of file. */
  async function fetchViaAppsScript(url) {
    const scriptUrl = (localStorage.getItem(APPS_SCRIPT_URL_KEY) || '').trim();
    if (!scriptUrl) {
      throw new Error('Apps Script fallback enabled but cusa_roster_scraper_url is not set in localStorage.');
    }
    const res = await fetch(`${scriptUrl}?url=${encodeURIComponent(url)}`, { redirect: 'follow' });
    if (!res.ok) throw new Error(`Apps Script returned HTTP ${res.status}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Apps Script returned no data');
    return { headers: data.headers, rows: data.rows, tableNum: data.tableNum };
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (cls ? ' ' + cls : '');
  }

  /* Parse-status bar — visible indicator any URL/link fetch must surface. */
  function startParseStatus(msg) {
    const el = document.getElementById('parseStatus');
    const lbl = document.getElementById('parseStatusLabel');
    if (lbl) lbl.textContent = msg || 'Working…';
    if (el) el.classList.add('active');
  }
  function updateParseStatus(msg) {
    const lbl = document.getElementById('parseStatusLabel');
    if (lbl) lbl.textContent = msg;
  }
  function endParseStatus() {
    const el = document.getElementById('parseStatus');
    if (el) el.classList.remove('active');
  }

  /* ── Load Roster from Google Sheets gviz CSV ── */
  async function loadRoster() {
    const school = document.getElementById('schoolSel').value;
    const sport = document.getElementById('sportSel').value;
    const cfg = SPORT_CONFIG[sport];

    if (!cfg) {
      _config = null; _rows = [];
      document.getElementById('downloadBtn').disabled = true;
      document.getElementById('content').innerHTML = `
        <div class="stub-msg">
          <strong>${sport} not yet wired up.</strong><br>
          Football is implemented as Phase 1 — the other sports plug in via the <code>SPORT_CONFIG</code> object once their column mappings are confirmed.
        </div>`;
      setStatus(`${sport} – not yet implemented`, 'err');
      return;
    }

    setStatus(`Fetching ${school} ${sport}…`);
    startParseStatus(`Fetching Master Roster for ${school} ${sport}…`);
    document.getElementById('loadBtn').disabled = true;

    try {
      const url = `https://docs.google.com/spreadsheets/d/${MASTER_ROSTER_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(MASTER_ROSTER_TAB)}`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Sheet fetch failed (HTTP ${res.status}). Make sure the Master Roster sheet is "Anyone with the link → Viewer" and has a tab named "${MASTER_ROSTER_TAB}".`);
      updateParseStatus('Parsing CSV from Google Sheets…');
      const csvText = await res.text();
      const wb = XLSX.read(csvText, { type: 'string', raw: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rawRows = XLSX.utils.sheet_to_json(ws, { defval: '', blankrows: false });
      // Lowercase-key the rows so SPORT_CONFIG.fromSource can look up reliably.
      const lower = rawRows.map(r => {
        const out = {};
        Object.keys(r).forEach(k => { out[String(k).trim().toLowerCase()] = r[k]; });
        return out;
      });
      // Filter to the selected school + sport. Map UI school name to the
      // exact value used in the Master Roster sheet's School column.
      const dataSchool = SCHOOL_TO_DATA_NAME[school] || school;
      const filtered = lower.filter(r =>
        String(r['school'] || '').trim() === dataSchool &&
        String(r['sport']  || '').trim() === sport
      );
      if (!filtered.length) {
        throw new Error(`No rows found for ${school} ${sport} in the Master Roster (looking for School="${dataSchool}", Sport="${sport}").`);
      }
      _rows = filtered.map(cfg.fromSource);
      sortByJersey(_rows);
      _config = cfg;
      _currentSchool = school;
      _currentSport = sport;
      renderTable();
      document.getElementById('downloadBtn').disabled = !_rows.length;
      setStatus(`Loaded ${_rows.length} player${_rows.length === 1 ? '' : 's'} for ${school} ${sport}.`, 'ok');
    } catch (err) {
      console.error(err);
      document.getElementById('content').innerHTML = `<div class="empty"><h3>Failed to load roster</h3><p>${escapeHtml(err.message || String(err))}</p></div>`;
      document.getElementById('downloadBtn').disabled = true;
      setStatus('Load failed', 'err');
    } finally {
      document.getElementById('loadBtn').disabled = false;
      endParseStatus();
    }
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  /* ── Render editable table ── */
  function renderTable() {
    const c = document.getElementById('content');
    const cols = _config.columns;
    const headers = cols.map(c => `<th style="min-width:${c.width || 100}px">${c.label}</th>`).join('') + '<th class="row-actions"></th>';
    const body = _rows.map((row, idx) => `
      <tr data-idx="${idx}">
        ${cols.map(c => `<td><input type="text" data-key="${c.key}" value="${escapeHtml(row[c.key])}"></td>`).join('')}
        <td class="row-actions"><button class="remove-btn" data-action="remove" title="Remove player">✕</button></td>
      </tr>`).join('');
    c.innerHTML = `
      <table>
        <thead><tr>${headers}</tr></thead>
        <tbody>${body || `<tr><td colspan="${cols.length + 1}" class="empty">No players in this roster.</td></tr>`}</tbody>
      </table>
      <div class="add-row-bar">
        <span>${_rows.length} player${_rows.length === 1 ? '' : 's'} · edit any cell to change before download</span>
        <button id="addRowBtn">+ Add Player</button>
      </div>
    `;
    // Wire input edits
    c.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', () => {
        const idx = +inp.closest('tr').dataset.idx;
        const key = inp.dataset.key;
        if (_rows[idx]) _rows[idx][key] = inp.value;
      });
    });
    c.querySelectorAll('button[data-action="remove"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = +btn.closest('tr').dataset.idx;
        _rows.splice(idx, 1);
        renderTable();
      });
    });
    document.getElementById('addRowBtn')?.addEventListener('click', () => {
      const empty = {};
      _config.columns.forEach(c => empty[c.key] = '');
      _rows.push(empty);
      renderTable();
    });
  }

  /* ── Download — load template, write Roster cells, save ── */
  async function downloadExcel() {
    if (!_config || !_rows.length) return;
    const btn = document.getElementById('downloadBtn');
    btn.disabled = true; btn.textContent = '⏳ Building…';
    try {
      const tplRes = await fetch(_config.template, { cache: 'no-store' });
      if (!tplRes.ok) throw new Error(`Template not found at ${_config.template}`);
      const buf = await tplRes.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellStyles: true, cellFormula: true });
      if (!wb.Sheets['Roster']) throw new Error('Template is missing a "Roster" sheet');
      const ws = wb.Sheets['Roster'];

      // Sort by jersey number so the exported roster reads in numerical order.
      sortByJersey(_rows);

      // Write each row's mapped fields into the configured columns, starting
      // at dataStartRow. We DO NOT touch any other cells, so formulas, styles,
      // headers, and validations in the template stay intact.
      _rows.forEach((row, i) => {
        const rExcel = _config.dataStartRow + i;
        _config.columns.forEach(col => {
          const addr = XLSX.utils.encode_cell({ r: rExcel - 1, c: col.col - 1 });
          const v = row[col.key];
          if (v === '' || v == null) {
            // Clear cell so old template sample data doesn't bleed through.
            ws[addr] = { t: 's', v: '' };
          } else if (typeof v === 'number') {
            ws[addr] = { t: 'n', v };
          } else {
            ws[addr] = { t: 's', v: String(v) };
          }
        });
      });

      // Trim every column past the last data column defined in the sport's
      // config. For Football that's J (col 10); everything from K onward —
      // formula columns (Position lookup, Year text, Headshot path, …), the
      // position abbreviation table in AB-AD, and any helper columns — gets
      // stripped. This also removes the cross-sheet formulas that would
      // otherwise produce #REF! errors after we drop the other tabs below.
      const maxCol = Math.max(..._config.columns.map(c => c.col)); // 1-indexed
      Object.keys(ws).forEach(key => {
        if (key[0] === '!') return;
        const addr = XLSX.utils.decode_cell(key);
        if (addr.c >= maxCol) delete ws[key];
      });
      if (ws['!cols']) ws['!cols'] = ws['!cols'].slice(0, maxCol);
      if (ws['!merges']) ws['!merges'] = ws['!merges'].filter(m => m.s.c < maxCol);

      // Reset the sheet range to A1:<lastDataCol><lastDataRow>.
      const lastRow = _config.dataStartRow + _rows.length - 1;
      ws['!ref'] = XLSX.utils.encode_range({
        s: { r: 0, c: 0 },
        e: { r: lastRow - 1, c: maxCol - 1 }
      });

      // Drop every other sheet — the export is a single Roster tab.
      wb.SheetNames = ['Roster'];
      wb.Sheets = { 'Roster': ws };

      const today = new Date().toISOString().split('T')[0];
      const safeSchool = _currentSchool.replace(/[^A-Za-z0-9]+/g, '_');
      const filename = `${safeSchool}_${_currentSport}_Roster_${today}.xlsx`;
      XLSX.writeFile(wb, filename, { bookType: 'xlsx', cellStyles: true });
      setStatus(`✓ Downloaded ${filename}`, 'ok');
    } catch (err) {
      console.error(err);
      alert('Download failed: ' + (err.message || err));
      setStatus('Download failed', 'err');
    } finally {
      btn.disabled = false; btn.textContent = '⬇ Download Excel';
    }
  }
</script>
