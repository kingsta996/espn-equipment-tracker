<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUSA ESPN Viewership Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root {
    --navy: #00263A;
    --gray: #BFCED6;
    --white: #FFFFFF;
    --red: #E40046;
    --blue: #00B5E2;
    --green: #A7D500;
    --espn-red: #EF4035;
    --light: #f0f2f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background: var(--light); min-height: 100vh; color: #222; }

  .header {
    background: var(--navy);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    border-bottom: 3px solid var(--espn-red);
  }
  .header img { height: 26px; filter: brightness(0) invert(1); }
  .header h1 { color: var(--white); font-size: 16px; margin: 0; flex: 1; font-weight: 700; }
  .header a { color: var(--gray); font-size: 11px; text-decoration: none; white-space: nowrap; padding: 4px 10px; border-radius: 5px; }
  .header a:hover { color: var(--white); background: rgba(255,255,255,0.08); }
  .header a.admin-link { color: #fff; background: rgba(239,64,53,0.85); padding: 5px 12px; border-radius: 6px; font-weight: 700; font-size: 11px; }
  .header a.admin-link:hover { background: var(--espn-red); }

  .meta-bar {
    background: var(--white);
    border-bottom: 1px solid #ddd;
    padding: 10px 20px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 11px;
  }
  .meta-bar .label { font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.5px; }
  .meta-bar .value { color: #555; }
  .meta-bar select {
    border: 1px solid var(--gray);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 700;
    color: var(--espn-red);
    font-family: inherit;
    background: #fff;
    cursor: pointer;
  }
  .meta-bar .divider { color: #ccc; }

  .content { padding: 24px 20px; max-width: 1400px; margin: 0 auto; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }

  .search-bar {
    background: var(--white);
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .search-field { flex: 1; min-width: 180px; }
  .search-field label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 11px; color: var(--navy); text-transform: uppercase; letter-spacing: 0.5px; }
  .search-field input, .search-field select {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--gray);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .search-field input:focus, .search-field select:focus { outline: none; border-color: var(--blue); }

  .btn {
    padding: 7px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(0.9); }
  .btn-primary { background: var(--espn-red); color: var(--white); }
  .btn-export { background: var(--navy); color: var(--white); }
  .btn-clear { background: #888; color: var(--white); }

  .status {
    margin-bottom: 12px;
    padding: 8px 14px;
    background: var(--white);
    border: 1px solid var(--gray);
    border-radius: 6px;
    font-size: 12px;
    color: var(--navy);
    font-weight: 600;
    display: inline-block;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--navy);
    color: var(--white);
    padding: 18px 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,38,58,0.15);
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.75;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--espn-red); }

  .table-container {
    overflow-x: auto;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-bottom: 20px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--navy); color: var(--white); }
  th { padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid #eee; }
  tbody tr:hover { background: #f8f9fa; }
  tbody tr:nth-child(even) td { background: rgba(191,206,214,0.08); }
  .rank { font-weight: 700; color: var(--espn-red); font-size: 14px; }
  .number { font-family: 'Courier New', monospace; font-weight: 600; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--navy); opacity: 0.55; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; }

  @media (max-width: 640px) {
    .search-bar { flex-direction: column; align-items: stretch; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="Logos/Hub/cusa%20espn%20cobrand%201C%20white.png" alt="CUSA ESPN" onerror="this.style.display='none'">
  <h1>ESPN+ Viewership Tracker</h1>
  <a href="admin.html" class="admin-link">🔒 Admin Portal</a>
  <a href="index.html">← Hub</a>
</div>

<div id="metaBar" class="meta-bar" style="display:none;">
  <span class="label">Reporting Period:</span>
  <select id="metaPeriodSelect" onchange="saveSelectedPeriod(this.value)"></select>
  <span class="divider">|</span>
  <span class="label">Last Modified:</span>
  <span id="metaModified" class="value">—</span>
</div>

<div class="content">
  <div class="section-title">🔍 Search by School</div>

  <div class="search-bar">
    <div class="search-field" style="min-width:260px">
      <label>Select School</label>
      <select id="schoolSelect">
        <option value="">-- Select a School --</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-end">
      <button class="btn btn-primary" onclick="performSchoolSearch()">Search</button>
      <button class="btn btn-export" onclick="exportCurrentTab()">📤 Export Current Tab</button>
    </div>
  </div>

  <div id="status" class="status">Loading data…</div>

  <div id="schoolResults"></div>
</div>

<script>
  /* ── Constants ── */
  const CUSA_SCHOOLS = [
    'Delaware','Florida International','Jacksonville State','Kennesaw State',
    'Liberty','Middle Tennessee','Missouri State','New Mexico State','Sam Houston','Western Kentucky'
  ];
  const STORAGE_KEY = 'cusa_tracker_data';
  const PERIOD_KEY = 'cusa_tracker_period';

  /* ── State ── */
  let rawData = [];
  let _db = null;

  /* ── Helpers ── */
  function updateStatus(msg) {
    const el = document.getElementById('status');
    if (el) el.textContent = msg;
  }

  function parseDateForSort(v) {
    if (!v && v !== 0) return 0;
    if (typeof v === 'number') return v;
    try {
      if (typeof v === 'string' && v.includes('/')) {
        const [m, d, y] = v.split('/');
        return new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`).getTime();
      }
      const t = new Date(v).getTime();
      return isNaN(t) ? 0 : t;
    } catch { return 0; }
  }

  function formatDate(v) {
    if (!v) return '-';
    try {
      if (typeof v === 'string' && v.includes('/')) return v;
      const d = new Date(v);
      return isNaN(d.getTime()) ? String(v) : d.toLocaleDateString('en-US');
    } catch { return String(v); }
  }

  function formatDateForFilter(v) {
    if (!v) return '';
    try {
      if (typeof v === 'string' && v.includes('/')) {
        const [m,d,y] = v.split('/');
        return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      }
      const d = new Date(v);
      return isNaN(d.getTime()) ? '' : d.toISOString().split('T')[0];
    } catch { return ''; }
  }

  /* ── Supabase ── */
  function initSupabase() {
    if (typeof supabase !== 'undefined' && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
      _db = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }
  }

  function rowFromDb(r) {
    const base = r.extra_data || {};
    return {
      ...base,
      SPORT: r.sport,
      AIRING_TITLE: r.airing_title,
      DATE: r.event_date,
      AWAY_TEAM: r.away_team,
      HOME_TEAM: r.home_team,
      UNIQUE_VIEWERS: r.unique_viewers,
      TOTAL_MINUTES: r.total_minutes,
      MIN_PER_VIEWER: parseFloat(r.min_per_viewer),
      REPORT_PERIOD: r.report_period
    };
  }

  async function loadFromSupabase() {
    if (!_db) return false;
    try {
      let all = [];
      let from = 0;
      const PAGE = 1000;
      while (true) {
        const { data, error } = await _db.from('viewership_events').select('*').range(from, from + PAGE - 1);
        if (error) throw error;
        if (!data || data.length === 0) break;
        all = all.concat(data.map(rowFromDb));
        if (data.length < PAGE) break;
        from += PAGE;
      }
      rawData = all;
      return true;
    } catch(e) {
      console.error('Supabase load error:', e);
      return false;
    }
  }

  function loadFromLocalStorage() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) rawData = JSON.parse(stored);
    } catch(e) {}
  }

  async function loadLastModified() {
    if (!_db) return null;
    try {
      const { data, error } = await _db.from('viewership_events')
        .select('created_at').order('created_at', { ascending: false }).limit(1);
      if (error) throw error;
      return data && data[0] ? data[0].created_at : null;
    } catch(e) {
      console.error('last modified load error:', e);
      return null;
    }
  }

  /* ── Meta bar (period + last modified) ── */
  function getAllPeriods() {
    return [...new Set(rawData.map(r => r.REPORT_PERIOD).filter(p => p))].sort();
  }
  function getCurrentPeriod() {
    const periods = getAllPeriods();
    const saved = localStorage.getItem(PERIOD_KEY);
    return (saved && periods.includes(saved)) ? saved : (periods.length ? periods[periods.length - 1] : '');
  }
  function saveSelectedPeriod(val) {
    localStorage.setItem(PERIOD_KEY, val);
  }
  function updateMetaBar(modifiedIso) {
    const bar = document.getElementById('metaBar');
    if (!rawData.length) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    const periods = getAllPeriods();
    const selected = getCurrentPeriod();
    const sel = document.getElementById('metaPeriodSelect');
    sel.innerHTML = periods.length
      ? periods.map(p => `<option value="${p}" ${p === selected ? 'selected' : ''}>${p}</option>`).join('')
      : '<option value="">—</option>';
    document.getElementById('metaModified').textContent = modifiedIso
      ? new Date(modifiedIso).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' })
      : '—';
  }

  /* ── School search ── */
  function populateSchoolDropdown() {
    const sel = document.getElementById('schoolSelect');
    sel.innerHTML = '<option value="">-- Select a School --</option>';
    CUSA_SCHOOLS.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });
  }

  function getSchoolRankBySport(school, sportName) {
    const cusaSet = new Set(CUSA_SCHOOLS);
    const sportRows = rawData.filter(r => r.SPORT === sportName);
    const totals = {};
    sportRows.forEach(r => {
      [r.AWAY_TEAM, r.HOME_TEAM].filter(t => t && cusaSet.has(t)).forEach(t => {
        totals[t] = (totals[t] || 0) + (r.UNIQUE_VIEWERS || 0);
      });
    });
    const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]);
    const rank = sorted.findIndex(([t]) => t === school) + 1;
    return rank > 0 ? `#${rank} of ${sorted.length}` : '—';
  }

  function performSchoolSearch() {
    const school = document.getElementById('schoolSelect').value;
    if (!school) { alert('Please select a school'); return; }
    if (!rawData.length) { alert('No data loaded yet — please wait or contact admin'); return; }
    const schoolData = rawData.filter(r => r.AWAY_TEAM === school || r.HOME_TEAM === school)
      .sort((a,b) => parseDateForSort(a.DATE) - parseDateForSort(b.DATE));

    if (!schoolData.length) {
      document.getElementById('schoolResults').innerHTML = `<div class="empty-state"><h3>No events found for ${school}</h3></div>`;
      return;
    }

    const totalViewers = schoolData.reduce((s,r) => s + (r.UNIQUE_VIEWERS||0), 0);
    const avgViewers = Math.round(totalViewers / schoolData.length);
    const avgMin = (schoolData.reduce((s,r) => s + (r.MIN_PER_VIEWER||0), 0) / schoolData.length).toFixed(1);
    const sportBreakdown = {};
    schoolData.forEach(r => {
      const sp = r.SPORT || 'Unknown';
      if (!sportBreakdown[sp]) sportBreakdown[sp] = { count:0, viewers:0 };
      sportBreakdown[sp].count++;
      sportBreakdown[sp].viewers += r.UNIQUE_VIEWERS || 0;
    });
    const sports = Object.keys(sportBreakdown).sort();
    const periods = [...new Set(schoolData.map(r => r.REPORT_PERIOD).filter(Boolean))].sort();

    document.getElementById('schoolResults').innerHTML = `
      <h3 style="color:var(--navy);margin-bottom:16px;">${school}</h3>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Events</div><div class="stat-value">${schoolData.length}</div></div>
        <div class="stat-card"><div class="stat-label">Total Viewers</div><div class="stat-value">${totalViewers.toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-label">Avg Viewers/Event</div><div class="stat-value">${avgViewers.toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-label">Avg Min/Viewer</div><div class="stat-value">${avgMin}</div></div>
      </div>
      <h4 style="color:var(--navy);margin:20px 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;">By Sport</h4>
      <div class="table-container">
        <table><thead><tr><th>Sport</th><th>Events</th><th>Total Viewers</th><th>Avg Viewers</th><th>Overall Rank</th></tr></thead>
        <tbody>${Object.entries(sportBreakdown).map(([sp, st]) => `
          <tr><td><strong>${sp}</strong></td><td class="number">${st.count}</td>
          <td class="number">${st.viewers.toLocaleString()}</td>
          <td class="number">${Math.round(st.viewers/st.count).toLocaleString()}</td>
          <td class="rank">${getSchoolRankBySport(school, sp)}</td></tr>`).join('')}
        </tbody></table>
      </div>
      <h4 style="color:var(--navy);margin:20px 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;">All Events</h4>
      <div class="search-bar">
        <div class="search-field"><label>Search Matchup</label><input type="text" id="school-filter-matchup" placeholder="Team or matchup name…"></div>
        <div class="search-field"><label>Sport</label>
          <select id="school-filter-sport"><option value="">All Sports</option>${sports.map(s => `<option value="${s}">${s}</option>`).join('')}</select>
        </div>
        <div class="search-field"><label>Filter by Date</label><input type="date" id="school-filter-date"></div>
        <div class="search-field"><label>Report Period</label>
          <select id="school-filter-period"><option value="">All Periods</option>${periods.map(p => `<option value="${p}">${p}</option>`).join('')}</select>
        </div>
        <div class="search-field"><label>Min Viewers</label><input type="number" id="school-filter-viewers" placeholder="e.g. 500" min="0"></div>
        <div class="search-field"><label>Min Total Min</label><input type="number" id="school-filter-totalmin" placeholder="e.g. 1000" min="0"></div>
        <div class="search-field"><label>Min Min/Viewer</label><input type="number" id="school-filter-minviewer" placeholder="e.g. 20" min="0" step="0.1"></div>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <button class="btn btn-primary" onclick="filterSchoolEvents('${school}')">🔍 Filter</button>
          <button class="btn btn-clear" onclick="clearSchoolFilter('${school}')">Clear</button>
        </div>
      </div>
      <div id="schoolEventTable"></div>`;
    filterSchoolEvents(school);
  }

  function filterSchoolEvents(school) {
    const matchup = document.getElementById('school-filter-matchup').value.toLowerCase().trim();
    const sport = document.getElementById('school-filter-sport').value;
    const date = document.getElementById('school-filter-date').value;
    const period = document.getElementById('school-filter-period').value;
    const minV = parseFloat(document.getElementById('school-filter-viewers').value) || 0;
    const minTotalMin = parseFloat(document.getElementById('school-filter-totalmin').value) || 0;
    const minMinViewer = parseFloat(document.getElementById('school-filter-minviewer').value) || 0;
    let data = rawData.filter(r => r.AWAY_TEAM === school || r.HOME_TEAM === school)
      .sort((a,b) => parseDateForSort(a.DATE) - parseDateForSort(b.DATE));
    if (matchup) data = data.filter(r => (r.AIRING_TITLE||'').toLowerCase().includes(matchup) || (r.AWAY_TEAM||'').toLowerCase().includes(matchup) || (r.HOME_TEAM||'').toLowerCase().includes(matchup));
    if (sport) data = data.filter(r => r.SPORT === sport);
    if (date) data = data.filter(r => formatDateForFilter(r.DATE) === date);
    if (period) data = data.filter(r => r.REPORT_PERIOD === period);
    if (minV) data = data.filter(r => (r.UNIQUE_VIEWERS||0) >= minV);
    if (minTotalMin) data = data.filter(r => (r.TOTAL_MINUTES||0) >= minTotalMin);
    if (minMinViewer) data = data.filter(r => (r.MIN_PER_VIEWER||0) >= minMinViewer);
    const total = rawData.filter(r => r.AWAY_TEAM === school || r.HOME_TEAM === school).length;
    const el = document.getElementById('schoolEventTable');
    if (!data.length) { el.innerHTML = `<div class="empty-state"><h3>No events match your filter</h3></div>`; return; }
    el.innerHTML = `
      <div class="table-container">
        <table><thead><tr><th>#</th><th>Sport</th><th>Matchup</th><th>Date</th><th>Unique Viewers</th><th>Total Minutes</th><th>Min/Viewer</th><th>Report Period</th></tr></thead>
        <tbody>${data.map((ev, i) => `
          <tr><td class="rank">${i+1}</td><td>${ev.SPORT||'-'}</td><td>${ev.AIRING_TITLE||'-'}</td>
          <td>${formatDate(ev.DATE)}</td>
          <td class="number">${(ev.UNIQUE_VIEWERS||0).toLocaleString()}</td>
          <td class="number">${(ev.TOTAL_MINUTES||0).toLocaleString()}</td>
          <td class="number">${(ev.MIN_PER_VIEWER||0).toFixed(1)}</td>
          <td>${ev.REPORT_PERIOD||'-'}</td></tr>`).join('')}
        </tbody></table>
        ${data.length < total ? `<p style="padding:10px 12px;font-size:12px;color:#666;">Showing ${data.length} of ${total} events</p>` : ''}
      </div>`;
  }

  function clearSchoolFilter(school) {
    document.getElementById('school-filter-matchup').value = '';
    document.getElementById('school-filter-sport').value = '';
    document.getElementById('school-filter-date').value = '';
    document.getElementById('school-filter-period').value = '';
    document.getElementById('school-filter-viewers').value = '';
    document.getElementById('school-filter-totalmin').value = '';
    document.getElementById('school-filter-minviewer').value = '';
    filterSchoolEvents(school);
  }

  /* ── Styled Excel export ── */
  const EX_HEADER_STYLE = {
    font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11, name: 'Segoe UI' },
    fill: { patternType: 'solid', fgColor: { rgb: '00263A' } },
    alignment: { horizontal: 'left', vertical: 'center' },
    border: {
      top: { style: 'thin', color: { rgb: '00263A' } },
      bottom: { style: 'thin', color: { rgb: '00263A' } },
      left: { style: 'thin', color: { rgb: '00263A' } },
      right: { style: 'thin', color: { rgb: '00263A' } }
    }
  };
  function exCellStyle(rowIndex, isNumber) {
    return {
      font: { sz: 11, name: 'Segoe UI', color: { rgb: rowIndex === 0 ? 'EF4035' : '222222' } },
      fill: { patternType: 'solid', fgColor: { rgb: rowIndex % 2 === 0 ? 'FFFFFF' : 'F4F7FA' } },
      alignment: { horizontal: isNumber ? 'right' : 'left', vertical: 'center' },
      border: { bottom: { style: 'thin', color: { rgb: 'EEEEEE' } } }
    };
  }
  function buildStyledSheet(rows, columns) {
    const aoa = [
      columns.map(c => c.label),
      ...rows.map(row => columns.map(c => row[c.key]))
    ];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    for (let C = 0; C < columns.length; C++) {
      const a = XLSX.utils.encode_cell({ r: 0, c: C });
      if (ws[a]) ws[a].s = EX_HEADER_STYLE;
    }
    for (let R = 0; R < rows.length; R++) {
      for (let C = 0; C < columns.length; C++) {
        const a = XLSX.utils.encode_cell({ r: R + 1, c: C });
        const cell = ws[a];
        if (!cell) continue;
        const fmt = columns[C].format;
        const isNum = fmt === 'integer' || fmt === 'decimal1';
        if (fmt === 'integer') { cell.t = 'n'; cell.z = '#,##0'; }
        else if (fmt === 'decimal1') { cell.t = 'n'; cell.z = '#,##0.0'; }
        cell.s = exCellStyle(R, isNum);
      }
    }
    ws['!cols'] = columns.map(c => ({ wch: c.width || 15 }));
    ws['!rows'] = [{ hpt: 22 }, ...rows.map(() => ({ hpt: 18 }))];
    return ws;
  }

  function exportCurrentTab() {
    const school = document.getElementById('schoolSelect').value;
    if (!school) { alert('Please select a school and search first'); return; }
    const schoolData = rawData.filter(r => r.AWAY_TEAM === school || r.HOME_TEAM === school)
      .sort((a,b) => parseDateForSort(a.DATE) - parseDateForSort(b.DATE));
    if (!schoolData.length) { alert('No data to export'); return; }

    const cols = [
      { key: 'rank', label: '#', format: 'integer', width: 5 },
      { key: 'sport', label: 'Sport', width: 22 },
      { key: 'matchup', label: 'Matchup', width: 38 },
      { key: 'date', label: 'Date', width: 12 },
      { key: 'viewers', label: 'Unique Viewers', format: 'integer', width: 16 },
      { key: 'minutes', label: 'Total Minutes', format: 'integer', width: 16 },
      { key: 'mpv', label: 'Min/Viewer', format: 'decimal1', width: 12 },
      { key: 'period', label: 'Report Period', width: 16 }
    ];
    const rows = schoolData.map((g, i) => ({
      rank: i+1,
      sport: g.SPORT || '-',
      matchup: g.AIRING_TITLE || '-',
      date: formatDate(g.DATE),
      viewers: g.UNIQUE_VIEWERS || 0,
      minutes: g.TOTAL_MINUTES || 0,
      mpv: +(g.MIN_PER_VIEWER || 0).toFixed(1),
      period: g.REPORT_PERIOD || '-'
    }));
    const ws = buildStyledSheet(rows, cols);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, school.substring(0,30));
    XLSX.writeFile(wb, `CUSA_${school.replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.xlsx`);
    updateStatus(`Exported ${schoolData.length} events for ${school}`);
  }

  /* ── Init ── */
  document.addEventListener('DOMContentLoaded', async () => {
    populateSchoolDropdown();
    initSupabase();
    const ok = await loadFromSupabase();
    if (!ok) loadFromLocalStorage();
    if (rawData.length) {
      updateStatus(`${rawData.length.toLocaleString()} events available — select a school to begin`);
      const lastMod = await loadLastModified();
      updateMetaBar(lastMod);
    } else {
      updateStatus('No data available yet. Please ask the admin to import the latest report.');
      updateMetaBar(null);
    }
  });
</script>

</body>
</html>
